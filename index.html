function FlappyGame({onExit}){
  const canvasRef=useRef(null);
  const stateRef=useRef(null);
  const rafRef=useRef(null);
  const [screen,setScreen]=useState("worldselect");
  const [selectedWorld,setSelectedWorld]=useState(0);
  const [progress,setProgress]=useState(loadFlappyProgress);
  const [score,setScore]=useState(0);
  const [finalScore,setFinalScore]=useState(0);
  const [isFinale,setIsFinale]=useState(false);
  const [worldCleared,setWorldCleared]=useState(false);

  const W=360,H=540;

  const startGame=useCallback((worldId)=>{
    const world=WORLDS[worldId];
    const gs={
      world:worldId,
      plane:{x:80,y:H/2,vy:0,rotation:0},
      obstacles:[],
      particles:[],
      score:0,
      obstacleTimer:0,
      obstacleInterval:95,
      finaleTriggered:false,
      finaleCleared:false,
      dead:false,
      started:false,
      frameCount:0,
      groundY:H-50,
      speed:world.speed,
      gapSize:world.gapSize,
      windmillAngle:0,
      beamAngle:0,
      bgOffset:0,
    };
    stateRef.current=gs;
    setScore(0);
    setIsFinale(false);
    setScreen("playing");
  },[]);

  const flap=useCallback(()=>{
    const gs=stateRef.current;
    if(!gs)return;
    if(!gs.started){gs.started=true;return;}
    if(gs.dead)return;
    gs.plane.vy=-6.4;
  },[]);

  useEffect(()=>{
    if(screen!=="playing")return;
    const canvas=canvasRef.current;
    if(!canvas)return;
    const ctx=canvas.getContext("2d");
    const world=WORLDS[selectedWorld];

    const spawnObstacle=(gs,isFinale)=>{
      const gapY=80+Math.random()*(gs.groundY-160-gs.gapSize);
      const type=isFinale?"finale":world.id;
      gs.obstacles.push({x:W+10,gapY,gapSize:isFinale?gs.gapSize-20:gs.gapSize,type,passed:false,angle:0,born:gs.frameCount});
    };

    const drawPlane=(ctx,plane)=>{
      ctx.save();
      ctx.translate(plane.x,plane.y);
      ctx.rotate(Math.min(Math.max(plane.rotation,-0.5),0.5));
      ctx.font="22px serif";
      ctx.textAlign="center";
      ctx.textBaseline="middle";
      ctx.fillText("✈️",0,0);
      ctx.restore();
    };

    const drawObstacle=(ctx,obs,gs)=>{
      const w=WORLDS[gs.world];
      const topH=obs.gapY;
      const botY=obs.gapY+obs.gapSize;
      const botH=gs.groundY-botY;
      ctx.fillStyle=w.obstacleColor;

      if(obs.type==="finale"&&gs.world===0){
        ctx.fillStyle="#546e7a";
        ctx.fillRect(obs.x-16,0,32,topH-14);
        ctx.beginPath();ctx.moveTo(obs.x-5,topH-14);ctx.lineTo(obs.x,topH-28);ctx.lineTo(obs.x+5,topH-14);ctx.fill();
        ctx.fillRect(obs.x-16,botY,32,botH);
        ctx.beginPath();ctx.moveTo(obs.x-5,botY+14);ctx.lineTo(obs.x,botY+28);ctx.lineTo(obs.x+5,botY+14);ctx.fill();
      } else if(gs.world===0){
        ctx.fillRect(obs.x-22,0,44,topH);
        for(let i=0;i<3;i++){ctx.fillRect(obs.x-20+i*16,topH-12,10,12);}
        ctx.fillRect(obs.x-22,botY,44,botH);
        for(let i=0;i<3;i++){ctx.fillRect(obs.x-20+i*16,botY,10,12);}
      } else if(obs.type==="finale"&&gs.world===1){
        ctx.fillStyle="#7b5e3a";
        ctx.beginPath();ctx.arc(obs.x,topH,22,Math.PI,0);ctx.lineTo(obs.x+22,0);ctx.lineTo(obs.x-22,0);ctx.fill();
        ctx.beginPath();ctx.arc(obs.x,botY,22,0,Math.PI);ctx.lineTo(obs.x+22,gs.groundY);ctx.lineTo(obs.x-22,gs.groundY);ctx.fill();
        ctx.strokeStyle="#ffd54f";ctx.lineWidth=2;
        ctx.beginPath();ctx.moveTo(obs.x-2,topH);ctx.lineTo(obs.x+1,topH+obs.gapSize/2);ctx.lineTo(obs.x-1,botY);ctx.stroke();
      } else if(gs.world===1){
        ctx.fillStyle="#7b5e3a";
        ctx.fillRect(obs.x-20,0,40,topH-18);
        ctx.beginPath();ctx.arc(obs.x,topH-18,20,Math.PI,0);ctx.fill();
        ctx.fillRect(obs.x-20,botY+18,40,botH-18);
        ctx.beginPath();ctx.arc(obs.x,botY+18,20,0,Math.PI);ctx.fill();
      } else if(obs.type==="finale"&&gs.world===2){
        ctx.fillStyle="#3e2723";
        ctx.beginPath();ctx.moveTo(obs.x,0);ctx.lineTo(obs.x-26,topH);ctx.lineTo(obs.x+26,topH);ctx.fill();
        ctx.beginPath();ctx.moveTo(obs.x-26,topH);ctx.lineTo(obs.x+26,topH);ctx.lineTo(obs.x,topH-10);ctx.fill();
        ctx.beginPath();ctx.moveTo(obs.x,gs.groundY);ctx.lineTo(obs.x-26,botY);ctx.lineTo(obs.x+26,botY);ctx.fill();
        ctx.beginPath();ctx.moveTo(obs.x-26,botY);ctx.lineTo(obs.x+26,botY);ctx.lineTo(obs.x,botY+10);ctx.fill();
      } else if(gs.world===2){
        ctx.fillStyle="#6d4c41";
        ctx.fillRect(obs.x-22,0,44,topH);
        for(let seg=0;seg<Math.floor(topH/20);seg++){ctx.fillStyle="#5d4037";ctx.fillRect(obs.x-20,seg*20,40,2);}
        ctx.fillStyle="#6d4c41";
        ctx.fillRect(obs.x-22,botY,44,botH);
        for(let seg=0;seg<Math.floor(botH/20);seg++){ctx.fillStyle="#5d4037";ctx.fillRect(obs.x-20,botY+seg*20,40,2);}
      } else if(obs.type==="finale"&&gs.world===3){
        const ang=gs.windmillAngle;
        ctx.fillStyle="#558b2f";
        ctx.fillRect(obs.x-10,0,20,topH-30);
        ctx.fillRect(obs.x-10,botY+30,20,botH-30);
        const cx=obs.x,cy=(topH+botY)/2;
        ctx.save();ctx.translate(cx,cy);ctx.rotate(ang);
        for(let b=0;b<4;b++){
          ctx.save();ctx.rotate(b*Math.PI/2);
          ctx.fillStyle="#8bc34a";
          ctx.fillRect(-5,-40,10,40);
          ctx.restore();
        }
        ctx.restore();
        ctx.fillStyle="#795548";ctx.beginPath();ctx.arc(cx,cy,7,0,Math.PI*2);ctx.fill();
      } else if(gs.world===3){
        ctx.fillStyle="#a5d6a7";
        for(let p=-1;p<=1;p++){ctx.fillRect(obs.x+p*18-5,0,10,topH-8);ctx.fillRect(obs.x+p*18-7,topH-16,14,8);}
        for(let p=-1;p<=1;p++){ctx.fillRect(obs.x+p*18-5,botY+8,10,botH-8);ctx.fillRect(obs.x+p*18-7,botY,14,8);}
      } else if(obs.type==="finale"&&gs.world===4){
        ctx.fillStyle="#b0bec5";
        ctx.fillRect(obs.x-14,0,28,topH-20);
        ctx.fillRect(obs.x-14,botY+20,28,botH-20);
        ctx.fillStyle="#ffd54f";
        ctx.fillRect(obs.x-24,topH-20,48,8);
        ctx.fillRect(obs.x-24,botY+12,48,8);
        const bAng=gs.beamAngle;
        ctx.save();ctx.translate(obs.x,(topH+botY)/2);
        ctx.globalAlpha=0.18;ctx.fillStyle="#fff176";
        ctx.beginPath();ctx.moveTo(0,0);
        const bx=Math.cos(bAng)*120,by=Math.sin(bAng)*120;
        ctx.lineTo(bx-20*Math.sin(bAng),by+20*Math.cos(bAng));
        ctx.lineTo(bx+20*Math.sin(bAng),by-20*Math.cos(bAng));
        ctx.closePath();ctx.fill();
        ctx.globalAlpha=1;ctx.restore();
      } else if(gs.world===4){
        ctx.fillStyle="#b0bec5";
        ctx.fillRect(obs.x-18,0,36,topH);
        for(let s=0;s<Math.floor(topH/30);s++){
          if(s%2===0){ctx.fillStyle="#ef9a9a";ctx.fillRect(obs.x-18,s*30,36,15);}
        }
        ctx.fillStyle="#b0bec5";
        ctx.fillRect(obs.x-18,botY,36,botH);
        for(let s=0;s<Math.floor(botH/30);s++){
          if(s%2===0){ctx.fillStyle="#ef9a9a";ctx.fillRect(obs.x-18,botY+s*30,36,15);}
        }
      }
    };

    const drawBgLayer=(ctx,gs)=>{
      const tileW=W;
      const ox=-(gs.bgOffset%tileW);
      const gy=gs.groundY;
      ctx.save();
      if(gs.world===0){
        ctx.fillStyle="rgba(8,4,30,0.5)";
        const blds=[[10,95,36],[50,70,28],[82,125,48],[134,88,36],[174,112,44],[222,78,33],[258,102,40],[302,68,33],[338,90,22]];
        for(let rep=0;rep<3;rep++){
          const bx=ox+rep*tileW;
          blds.forEach(([x,h,wd])=>{
            ctx.fillRect(bx+x,gy-h,wd,h);
            if(h>100)ctx.fillRect(bx+x+wd/2-2,gy-h-18,3,18);
          });
          ctx.fillStyle="rgba(255,200,80,0.12)";
          blds.forEach(([x,h,wd])=>{
            for(let wy=gy-h+10;wy<gy-12;wy+=16){
              for(let wx=bx+x+5;wx<bx+x+wd-5;wx+=10){ctx.fillRect(wx,wy,4,7);}
            }
          });
          ctx.fillStyle="rgba(8,4,30,0.5)";
        }
      } else if(gs.world===1){
        ctx.fillStyle="rgba(60,30,10,0.35)";
        const blds=[[5,58,44],[54,72,38],[96,52,40],[140,68,46],[190,62,38],[232,78,44],[280,58,40],[325,65,35]];
        for(let rep=0;rep<3;rep++){
          const bx=ox+rep*tileW;
          blds.forEach(([x,h,wd])=>{
            ctx.fillRect(bx+x,gy-h,wd,h);
            ctx.beginPath();ctx.moveTo(bx+x,gy-h);ctx.lineTo(bx+x+wd/2,gy-h-18);ctx.lineTo(bx+x+wd,gy-h);ctx.closePath();ctx.fill();
          });
        }
      } else if(gs.world===2){
        ctx.fillStyle="rgba(25,8,0,0.45)";
        for(let rep=0;rep<3;rep++){
          const bx=ox+rep*tileW;
          ctx.beginPath();
          ctx.moveTo(bx,gy);
          ctx.bezierCurveTo(bx+40,gy-55,bx+85,gy-58,bx+115,gy-22);
          ctx.bezierCurveTo(bx+145,gy+10,bx+195,gy-68,bx+235,gy-38);
          ctx.bezierCurveTo(bx+275,gy-8,bx+318,gy-48,bx+tileW,gy-28);
          ctx.lineTo(bx+tileW,gy+2);ctx.closePath();ctx.fill();
        }
      } else if(gs.world===3){
        ctx.fillStyle="rgba(20,50,15,0.4)";
        const trees=[[15,75],[58,92],[98,80],[145,88],[188,72],[228,85],[272,78],[316,90]];
        for(let rep=0;rep<3;rep++){
          const bx=ox+rep*tileW;
          trees.forEach(([x,h])=>{
            const tw=30;
            ctx.fillRect(bx+x+tw/2-4,gy-38,8,38);
            ctx.beginPath();ctx.moveTo(bx+x,gy-38);ctx.lineTo(bx+x+tw/2,gy-h);ctx.lineTo(bx+x+tw,gy-38);ctx.closePath();ctx.fill();
            ctx.beginPath();ctx.moveTo(bx+x-5,gy-50);ctx.lineTo(bx+x+tw/2,gy-h-18);ctx.lineTo(bx+x+tw+5,gy-50);ctx.closePath();ctx.fill();
          });
        }
      } else {
        ctx.fillStyle="rgba(0,90,140,0.2)";
        for(let rep=0;rep<3;rep++)ctx.fillRect(ox+rep*tileW,gy-75,tileW,75);
        ctx.strokeStyle="rgba(255,255,255,0.18)";ctx.lineWidth=2;
        for(let rep=0;rep<3;rep++){
          const bx=ox+rep*tileW;
          [0,22,44].forEach(yo=>{
            ctx.beginPath();ctx.moveTo(bx,gy-52+yo);
            for(let wx=0;wx<tileW;wx+=36){
              ctx.quadraticCurveTo(bx+wx+9,gy-62+yo,bx+wx+18,gy-52+yo);
              ctx.quadraticCurveTo(bx+wx+27,gy-42+yo,bx+wx+36,gy-52+yo);
            }
            ctx.stroke();
          });
        }
      }
      ctx.restore();
    };

    const checkCollision=(plane,obs,groundY)=>{
      const pr=14;
      const px=plane.x,py=plane.y;
      if(py+pr>groundY||py-pr<0)return true;
      const ox=obs.x,ow=26;
      if(px+pr>ox-ow&&px-pr<ox+ow){
        if(py-pr<obs.gapY||py+pr>obs.gapY+obs.gapSize)return true;
      }
      if(WORLDS[stateRef.current.world].id===3&&obs.type==="finale"){
        const cx=obs.x,cy=(obs.gapY+obs.gapY+obs.gapSize)/2;
        const dx=px-cx,dy=py-cy;
        const dist=Math.sqrt(dx*dx+dy*dy);
        const angle=Math.atan2(dy,dx)-stateRef.current.windmillAngle;
        const normalizedAngle=((angle%(Math.PI/2))+(Math.PI/2))%(Math.PI/2);
        if(dist<42&&(normalizedAngle<0.18||normalizedAngle>1.39))return true;
      }
      return false;
    };

    const loop=()=>{
      const gs=stateRef.current;
      if(!gs)return;
      ctx.clearRect(0,0,W,H);

      const skyGrad=ctx.createLinearGradient(0,0,0,H);
      const gc=WORLDS[gs.world].grad;
      gc.forEach((c,i)=>skyGrad.addColorStop(i/(gc.length-1),c));
      ctx.fillStyle=skyGrad;
      ctx.fillRect(0,0,W,H);
      drawBgLayer(ctx,gs);

      ctx.fillStyle=WORLDS[gs.world].groundColor;
      ctx.fillRect(0,gs.groundY,W,H-gs.groundY);
      ctx.fillStyle=WORLDS[gs.world].grassColor;
      ctx.fillRect(0,gs.groundY,W,8);

      gs.bgOffset+=gs.speed*0.25;

      if(!gs.started){
        drawPlane(ctx,gs.plane);
        ctx.fillStyle="rgba(0,0,0,0.45)";ctx.fillRect(0,0,W,H);
        ctx.fillStyle="white";ctx.font="bold 22px system-ui";ctx.textAlign="center";
        ctx.fillText("Tap to Start!",W/2,H/2-20);
        ctx.font="16px system-ui";ctx.fillText(WORLDS[gs.world].desc,W/2,H/2+12);
        ctx.font="14px system-ui";ctx.fillStyle="rgba(255,255,255,0.75)";
        ctx.fillText(`World ${gs.world+1}: ${WORLDS[gs.world].name}`,W/2,H/2+38);
        rafRef.current=requestAnimationFrame(loop);return;
      }

      if(!gs.dead){
        gs.frameCount++;
        gs.plane.vy+=0.34;
        gs.plane.y+=gs.plane.vy;
        gs.plane.rotation=gs.plane.vy*0.07;

        gs.obstacleTimer++;
        if(!gs.finaleTriggered&&gs.score>=12){
          gs.finaleTriggered=true;
          gs.obstacles=[];gs.obstacleTimer=gs.obstacleInterval+1;
        }
        if(gs.obstacleTimer>=gs.obstacleInterval){
          spawnObstacle(gs,gs.finaleTriggered);
          gs.obstacleTimer=0;
          gs.obstacleInterval=80+Math.floor(Math.random()*30);
        }

        for(const obs of gs.obstacles){
          obs.x-=gs.speed;
          if(WORLDS[gs.world].id===3&&obs.type==="finale") gs.windmillAngle+=0.05;
          if(WORLDS[gs.world].id===4&&obs.type==="finale") gs.beamAngle+=0.03;
          if(!obs.passed&&obs.x<gs.plane.x-20){
            obs.passed=true;
            gs.score++;
            setScore(gs.score);
            if(obs.type==="finale"){gs.finaleCleared=true;}
          }
          if(!gs.dead&&checkCollision(gs.plane,obs,gs.groundY)){
            gs.dead=true;
          }
        }
        if(gs.plane.y+14>gs.groundY||gs.plane.y-14<0)gs.dead=true;

        gs.obstacles=gs.obstacles.filter(o=>o.x>-60);

        if(gs.finaleCleared&&gs.obstacles.length===0&&!gs.dead){
          const newProg={...progress};
          if(gs.world+1>newProg.unlockedWorld)newProg.unlockedWorld=gs.world+1;
          const hs=newProg.highScores||{};
          if(!hs[gs.world]||gs.score>hs[gs.world])hs[gs.world]=gs.score;
          newProg.highScores=hs;
          saveFlappyProgress(newProg);
          setProgress(newProg);
          setFinalScore(gs.score);
          setWorldCleared(true);
          setScreen("worldclear");
          return;
        }
      }

      for(const obs of gs.obstacles)drawObstacle(ctx,obs,gs);

      for(const p of gs.particles){p.x+=p.vx;p.y+=p.vy;p.life-=1;p.vy+=0.2;if(p.life>0){ctx.globalAlpha=p.life/20;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}}
      gs.particles=gs.particles.filter(p=>p.life>0);

      drawPlane(ctx,gs.plane);

      ctx.fillStyle="rgba(0,0,0,0.35)";ctx.fillRect(W/2-40,12,80,34);
      ctx.fillStyle="white";ctx.font="bold 20px system-ui";ctx.textAlign="center";
      ctx.fillText(gs.score,W/2,34);
      if(gs.finaleTriggered){
        ctx.fillStyle="#ffd54f";ctx.font="bold 13px system-ui";ctx.fillText("⭐ FINALE",W/2,52);
      }

      if(gs.dead){
        setFinalScore(gs.score);
        const newProg={...progress};
        const hs=newProg.highScores||{};
        if(!hs[gs.world]||gs.score>hs[gs.world])hs[gs.world]=gs.score;
        newProg.highScores=hs;
        saveFlappyProgress(newProg);
        setProgress(newProg);
        setWorldCleared(false);
        setScreen("gameover");
        return;
      }

      rafRef.current=requestAnimationFrame(loop);
    };

    rafRef.current=requestAnimationFrame(loop);
    return()=>{if(rafRef.current)cancelAnimationFrame(rafRef.current);};
  },[screen,selectedWorld]);

  useEffect(()=>{
    if(screen!=="playing")return;
    const canvas=canvasRef.current;
    if(!canvas)return;
    const onTap=(e)=>{e.preventDefault();flap();};
    canvas.addEventListener("touchstart",onTap,{passive:false});
    canvas.addEventListener("mousedown",onTap);
    const onKey=(e)=>{if(e.code==="Space"||e.code==="ArrowUp"){e.preventDefault();flap();}};
    window.addEventListener("keydown",onKey);
    return()=>{canvas.removeEventListener("touchstart",onTap);canvas.removeEventListener("mousedown",onTap);window.removeEventListener("keydown",onKey);};
  },[screen,flap]);

  const overlayStyle={position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.88)",zIndex:9999,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",overflowY:"auto",padding:"16px 0"};
  const btnStyle={padding:"14px 32px",borderRadius:14,border:"none",fontSize:16,fontWeight:700,cursor:"pointer",width:200};

  if(screen==="worldselect") return(
    <div style={overlayStyle}>
      <button onClick={onExit} style={{position:"absolute",top:16,right:18,background:"rgba(255,255,255,0.15)",border:"none",borderRadius:10,color:"white",fontSize:18,padding:"8px 14px",cursor:"pointer",fontWeight:700}}>✕ Exit</button>
      <div style={{fontSize:40,marginBottom:4}}>✈️</div>
      <div style={{color:"white",fontWeight:900,fontSize:26,marginBottom:4}}>Flappy Plane</div>
      <div style={{color:"rgba(255,255,255,0.6)",fontSize:13,marginBottom:22}}>Secret Coleman Family Edition</div>
      <div style={{width:"100%",maxWidth:340,display:"flex",flexDirection:"column",gap:10,padding:"0 16px"}}>
        {WORLDS.map((w,i)=>{
          const locked=i>progress.unlockedWorld;
          const hs=progress.highScores?.[i];
          return(
            <button key={i} onClick={()=>{if(!locked){setSelectedWorld(i);startGame(i);}}}
              style={{display:"flex",alignItems:"center",gap:14,padding:"14px 18px",borderRadius:16,border:`2px solid ${locked?"#444":w.color}`,
                background:locked?"#222":`${w.color}22`,cursor:locked?"not-allowed":"pointer",opacity:locked?0.45:1,textAlign:"left"}}>
              <span style={{fontSize:28}}>{w.emoji}</span>
              <div style={{flex:1}}>
                <div style={{color:locked?"#666":"white",fontWeight:700,fontSize:15}}>World {i+1}: {w.name}</div>
                <div style={{color:locked?"#555":"rgba(255,255,255,0.6)",fontSize:12}}>{locked?"🔒 Clear the previous world to unlock":w.desc}</div>
              </div>
              {hs&&<div style={{color:"#ffd54f",fontSize:12,fontWeight:700,textAlign:"right"}}>Best<br/>{hs}</div>}
            </button>
          );
        })}
      </div>
    </div>
  );

  if(screen==="gameover") return(
    <div style={overlayStyle}>
      <div style={{fontSize:48,marginBottom:8}}>💥</div>
      <div style={{color:"white",fontWeight:900,fontSize:28,marginBottom:4}}>Game Over</div>
      <div style={{color:"rgba(255,255,255,0.7)",fontSize:16,marginBottom:4}}>Score: <strong style={{color:"#ffd54f"}}>{finalScore}</strong></div>
      {(progress.highScores?.[selectedWorld]||0)>0&&<div style={{color:"rgba(255,255,255,0.5)",fontSize:13,marginBottom:20}}>Best: {progress.highScores[selectedWorld]}</div>}
      <div style={{display:"flex",flexDirection:"column",gap:10,alignItems:"center"}}>
        <button onClick={()=>startGame(selectedWorld)} style={{...btnStyle,background:"#2d7dd2",color:"white"}}>Try Again</button>
        <button onClick={()=>setScreen("worldselect")} style={{...btnStyle,background:"rgba(255,255,255,0.1)",color:"white",border:"1px solid #555"}}>World Select</button>
        <button onClick={onExit} style={{...btnStyle,background:"transparent",color:"rgba(255,255,255,0.5)",border:"none",width:"auto",padding:"10px 20px",fontSize:14}}>✕ Exit Game</button>
      </div>
    </div>
  );

  if(screen==="worldclear") return(
    <div style={overlayStyle}>
      <div style={{fontSize:52,marginBottom:8}}>{WORLDS[selectedWorld].emoji}</div>
      <div style={{color:"#ffd54f",fontWeight:900,fontSize:26,marginBottom:4}}>World Cleared! 🎉</div>
      <div style={{color:"white",fontSize:16,marginBottom:4,fontWeight:600}}>{WORLDS[selectedWorld].name} Complete</div>
      <div style={{color:"rgba(255,255,255,0.6)",fontSize:14,marginBottom:20}}>Score: {finalScore}</div>
      <div style={{display:"flex",flexDirection:"column",gap:10,alignItems:"center"}}>
        {selectedWorld<WORLDS.length-1&&(
          <button onClick={()=>{const nw=selectedWorld+1;setSelectedWorld(nw);startGame(nw);}}
            style={{...btnStyle,background:"#22c55e",color:"white"}}>
            Next World: {WORLDS[selectedWorld+1].name} {WORLDS[selectedWorld+1].emoji}
          </button>
        )}
        {selectedWorld===WORLDS.length-1&&<div style={{color:"#ffd54f",fontWeight:800,fontSize:18,marginBottom:8}}>🏆 ALL WORLDS CLEARED!</div>}
        <button onClick={()=>startGame(selectedWorld)} style={{...btnStyle,background:"rgba(255,255,255,0.1)",color:"white",border:"1px solid #555"}}>Replay {WORLDS[selectedWorld].name}</button>
        <button onClick={()=>setScreen("worldselect")} style={{...btnStyle,background:"transparent",color:"rgba(255,255,255,0.5)",border:"none",width:"auto",padding:"10px 20px",fontSize:14}}>World Select</button>
        <button onClick={onExit} style={{...btnStyle,background:"transparent",color:"rgba(255,255,255,0.35)",border:"none",width:"auto",padding:"10px 20px",fontSize:14}}>✕ Exit</button>
      </div>
    </div>
  );

  return(
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"#000",zIndex:9999,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
      <button onClick={onExit} style={{position:"absolute",top:16,right:16,background:"rgba(255,255,255,0.15)",border:"none",borderRadius:10,color:"white",fontSize:15,padding:"6px 12px",cursor:"pointer",fontWeight:700,zIndex:10}}>✕ Exit</button>
      <canvas ref={canvasRef} width={W} height={H} style={{borderRadius:12,maxWidth:"100%",maxHeight:"100dvh",touchAction:"none"}}/>
    </div>
  );
}

// ── SEARCH TAB ────────────────────────────────────────────────────────────────
function SearchTab({setTab,setDayIdx,setPackPerson,onFlappy}){
  const [q,setQ]=useState("");
  const results=[];

  if(q.trim().length>=2){
    const lq=q.toLowerCase();
    ITINERARY.forEach((day,di)=>{
      const matchItem=day.items.find(it=>it.text.toLowerCase().includes(lq));
      const headMatch=[day.title,day.summary,day.city,day.lodging||"",day.transit||""].some(t=>t.toLowerCase().includes(lq));
      if(matchItem||headMatch){
        results.push({cat:"Trip",label:`${day.emoji} ${day.label} · ${day.city}`,text:matchItem?matchItem.text:day.title,icon:matchItem?(TYPE_ICONS[matchItem.type]||"📍"):day.emoji,bColor:matchItem?TYPE_BORDER[matchItem.type]:"#6366f1",action:()=>{setDayIdx(di);setTab("trip");}});
      }
    });
    Object.entries(DEFAULT_PRETRIP).forEach(([date,tasks])=>{
      tasks.forEach(task=>{if(task.text.toLowerCase().includes(lq))results.push({cat:"Pre-trip",label:fmtDate(date),text:task.text,icon:TYPE_ICONS[task.type]||"📋",bColor:TYPE_BORDER[task.type]||"#3b82f6",action:()=>setTab("today")});});
    });
    STILL_NEEDED_ITEMS.forEach(text=>{
      if(text.toLowerCase().includes(lq))results.push({cat:"Needed",label:"Still to book",text,icon:"🎟️",bColor:"#a855f7",action:()=>setTab("today")});
    });
    Object.entries(MASTER_PACKING).forEach(([cat,items])=>{
      items.forEach(item=>{if(item.toLowerCase().includes(lq))results.push({cat:"Pack",label:cat,text:item,icon:"🎒",bColor:"#10b981",action:()=>{setPackPerson("General");setTab("pack");}});});
    });
    Object.entries(INDIVIDUAL_PACKING).forEach(([person,items])=>{
      items.forEach(item=>{if(item.toLowerCase().includes(lq))results.push({cat:`${person}'s Pack`,label:person,text:item,icon:"👜",bColor:"#10b981",action:()=>{setPackPerson(person);setTab("pack");}});});
    });
  }

  return(
    <div>
      <div style={{position:"relative",marginBottom:18}}>
        <span style={{position:"absolute",left:15,top:"50%",transform:"translateY(-50%)",fontSize:18,opacity:0.4,pointerEvents:"none"}}>🔍</span>
        <input value={q} onChange={e=>{const v=e.target.value;setQ(v);if(v.trim().toLowerCase()==="flappy"&&onFlappy)onFlappy();}} placeholder="Search activities, packing, tasks…" autoFocus
          style={{width:"100%",padding:"14px 45px 14px 48px",...S.card,borderRadius:16,fontSize:16,boxSizing:"border-box",border:"1.5px solid #e2e8f0"}}/>
        {q&&<button onClick={()=>setQ("")} style={{position:"absolute",right:13,top:"50%",transform:"translateY(-50%)",background:"#f1f5f9",border:"none",borderRadius:"50%",width:26,height:26,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,color:"#94a3b8",lineHeight:1,padding:0}}>×</button>}
      </div>

      {q.trim().length<2&&(
        <div style={{textAlign:"center",padding:"44px 20px",animation:"fadeUp 0.3s ease"}}>
          <div style={{width:72,height:72,borderRadius:22,background:"linear-gradient(135deg,#eff6ff,#dbeafe)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:36,margin:"0 auto 16px"}}>🔍</div>
          <div style={{fontSize:17,fontWeight:800,color:"#1e293b",marginBottom:6}}>Search everything</div>
          <div style={{fontSize:14,color:"#94a3b8",lineHeight:1.7}}>Trip activities · Packing items<br/>Pre-trip tasks · Bookings</div>
        </div>
      )}

      {q.trim().length>=2&&results.length===0&&(
        <div style={{textAlign:"center",padding:"44px 20px",animation:"fadeUp 0.2s ease"}}>
          <div style={{width:72,height:72,borderRadius:22,background:"#f8fafc",display:"flex",alignItems:"center",justifyContent:"center",fontSize:36,margin:"0 auto 16px"}}>🤷</div>
          <div style={{fontSize:17,fontWeight:800,color:"#1e293b",marginBottom:6}}>No results for "{q}"</div>
          <div style={{fontSize:14,color:"#94a3b8"}}>Try a different search term</div>
        </div>
      )}

      {results.length>0&&(
        <div style={{animation:"fadeUp 0.2s ease"}}>
          <div style={{...S.label,marginBottom:10}}>{results.length} result{results.length!==1?"s":""}</div>
          {results.map((r,i)=>(
            <div key={i} onClick={r.action} style={{...S.cardSm,padding:"13px 15px",marginBottom:8,cursor:"pointer",display:"flex",gap:12,alignItems:"flex-start",borderLeft:`4px solid ${r.bColor}`}}>
              <div style={{fontSize:22,flexShrink:0,marginTop:1}}>{r.icon}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
                  <span style={{fontSize:10,fontWeight:800,color:"white",background:r.bColor,borderRadius:6,padding:"2px 8px",flexShrink:0}}>{r.cat}</span>
                  <span style={{fontSize:11,color:"#94a3b8",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.label}</span>
                </div>
                <div style={{fontSize:14,color:"#1e293b",fontWeight:600,lineHeight:1.4}}>{r.text}</div>
              </div>
              <div style={{color:"#d1d5db",fontSize:18,flexShrink:0,marginTop:2}}>›</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── NEARBY TAB ────────────────────────────────────────────────────────────────
const QUICK_SEARCHES=[
  {e:"🍔",label:"Food",                  q:"restaurants",        bg:"#fff7ed",iconBg:"#fed7aa",tc:"#9a3412"},
  {e:"🛒",label:"Grocery",               q:"grocery store",      bg:"#f0fdf4",iconBg:"#bbf7d0",tc:"#166534"},
  {e:"⛽",label:"Gas",                   q:"gas station",        bg:"#eff6ff",iconBg:"#bfdbfe",tc:"#1e40af"},

// ── PLAN RENDERER ─────────────────────────────────────────────────────────────
function PlanRenderer({text,compact}){
  if(!text)return null;

  // Inline bold: **text** → <strong>
  function fmt(str){
    if(!str)return null;
    const parts=str.split(/\*\*(.+?)\*\*/);
    return parts.map((p,i)=>i%2===1?<strong key={i}>{p}</strong>:p);
  }

  // Strip ** and # so numbered headings match regardless of markdown decoration
  const stripMd=s=>s.replace(/\*\*/g,'').replace(/^#+\s*/,'').trim();
  const lines=text.split('\n');

  // Collect numbered sections
  const sections=[];
  let cur=null;
  for(const raw of lines){
    const stripped=stripMd(raw);
    const nm=stripped.match(/^(\d+)\.\s+(.+)$/);
    if(nm){
      if(cur)sections.push(cur);
      cur={num:nm[1],title:nm[2].trim(),body:[]};
    } else {
      if(cur)cur.body.push(raw);
    }
  }
  if(cur)sections.push(cur);

  function parseBody(bodyLines){
    const blocks=[],bullets=[];
    const flush=()=>{if(bullets.length){blocks.push({t:'bullets',items:[...bullets]});bullets.length=0;}};
    for(const raw of bodyLines){
      const line=raw.trim();
      if(!line||/^-{3,}$/.test(line)){flush();continue;}
      const plain=line.replace(/\*\*/g,'');
      let m;
      if((m=plain.match(/^Time:?\s*(.+)/i)))        {flush();blocks.push({t:'time',   text:m[1]});continue;}
      if((m=plain.match(/^Why\s+first:?\s*(.+)/i))) {flush();blocks.push({t:'why',    text:m[1]});continue;}
      if((m=plain.match(/^Family\s+tip:?\s*(.+)/i))){flush();blocks.push({t:'tip',    text:m[1]});continue;}
      if((m=plain.match(/^(?:Note|Tip|Pro\s+tip):?\s*(.+)/i))){flush();blocks.push({t:'tip',text:m[1]});continue;}
      if((m=plain.match(/^(?:Transit|Getting\s+there|Subway|Train|Bus|Drive|Walk|Parking|Directions?):?\s*(.+)/i))){flush();blocks.push({t:'transit',text:m[1]});continue;}
      if((m=line.match(/^[-*•]\s+(.+)/)))           {bullets.push(m[1]);continue;}
      flush();
      blocks.push({t:'para',text:line});
    }
    flush();
    return blocks;
  }

  // Fallback when AI didn't use numbered sections
  if(!sections.length){
    return(
      <div style={{display:'flex',flexDirection:'column',gap:2}}>
        {lines.map((raw,i)=>{
          const line=raw.trim();
          if(!line)return <div key={i} style={{height:4}}/>;
          if(/^-{3,}$/.test(line))return null;
          const bm=line.match(/^[-*•]\s+(.+)/);
          if(bm)return(
            <div key={i} style={{display:'flex',gap:7,alignItems:'flex-start'}}>
              <span style={{color:'#6366f1',fontSize:14,lineHeight:1,marginTop:3,flexShrink:0}}>•</span>
              <span style={{fontSize:compact?12:13,color:'#374151',lineHeight:1.6}}>{fmt(bm[1])}</span>
            </div>
          );
          return <div key={i} style={{fontSize:compact?12:13,color:'#374151',lineHeight:1.65}}>{fmt(line)}</div>;
        })}
      </div>
    );
  }

  return(
    <div style={{display:'flex',flexDirection:'column',gap:compact?8:10}}>
      {sections.map((sec,si)=>{
        const blocks=parseBody(sec.body);
        return(
          <div key={si} style={{background:'white',borderRadius:compact?10:12,overflow:'hidden',border:'1px solid #e8eaf0',boxShadow:'0 1px 4px rgba(0,0,0,0.06)'}}>
            {/* Step header */}
            <div style={{display:'flex',alignItems:'flex-start',gap:10,padding:compact?'9px 12px':'11px 13px',background:'linear-gradient(90deg,#f0f4ff,#f5f3ff)'}}>
              <div style={{minWidth:compact?22:26,height:compact?22:26,borderRadius:'50%',background:'linear-gradient(135deg,#4f46e5,#7c3aed)',color:'white',fontSize:compact?11:13,fontWeight:900,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,boxShadow:'0 2px 6px rgba(99,102,241,0.4)',marginTop:1}}>
                {sec.num}
              </div>
              <div style={{fontWeight:800,fontSize:compact?12:13.5,color:'#1e1b4b',lineHeight:1.35,paddingTop:compact?1:2}}>{fmt(sec.title)}</div>
            </div>
            {/* Step body */}
            {blocks.length>0&&(
              <div style={{padding:compact?'7px 12px 9px':'9px 13px 11px',display:'flex',flexDirection:'column',gap:compact?4:5}}>
                {blocks.map((b,bi)=>{
                  if(b.t==='time')return(
                    <div key={bi} style={{display:'flex',alignItems:'center'}}>
                      <span style={{fontSize:11,fontWeight:800,background:'linear-gradient(90deg,#ede9fe,#ddd6fe)',color:'#5b21b6',borderRadius:20,padding:'2px 9px',letterSpacing:'0.02em'}}>🕐 {b.text}</span>
                    </div>
                  );
                  if(b.t==='why')return <div key={bi} style={{fontSize:compact?11:12,color:'#4338ca',fontWeight:600,lineHeight:1.55}}>⭐ <em>{fmt(b.text)}</em></div>;
                  if(b.t==='tip')return <div key={bi} style={{fontSize:compact?11:12,color:'#92400e',fontWeight:600,lineHeight:1.55}}>💡 {fmt(b.text)}</div>;
                  if(b.t==='transit')return <div key={bi} style={{fontSize:compact?11:12,color:'#1e40af',fontWeight:600,lineHeight:1.55,background:'#eff6ff',borderRadius:7,padding:'4px 9px'}}>🚇 {fmt(b.text)}</div>;
                  if(b.t==='bullets')return(
                    <div key={bi} style={{paddingLeft:2}}>
                      {b.items.map((item,ii)=>(
                        <div key={ii} style={{display:'flex',gap:7,alignItems:'flex-start',marginBottom:ii<b.items.length-1?2:0}}>
                          <span style={{color:'#6366f1',fontSize:14,lineHeight:1,marginTop:compact?2:3,flexShrink:0}}>•</span>
                          <span style={{fontSize:compact?12:13,color:'#374151',lineHeight:1.6}}>{fmt(item)}</span>
                        </div>
                      ))}
                    </div>
                  );
                  if(b.t==='para')return <div key={bi} style={{fontSize:compact?12:13,color:'#374151',lineHeight:1.65}}>{fmt(b.text)}</div>;
                  return null;
                })}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

  const plan=dayPlans[day.date];

      )}
    </div>
  );

// ── GUIDED TOUR ───────────────────────────────────────────────────────────────
const TOUR_KEY="trip2026_tour_seen";
const TOUR_STEPS=[
  {target:"header",    title:"Welcome to the Trip App! 🌊",   body:"Your family's complete East Coast adventure companion — tasks, itinerary, packing, and more, all synced across every device."},
  {target:"tab-today", title:"Pre-Trip Tasks 📋",              body:"To-dos before the trip, sorted by due date. Check them off as you go — completed tasks stay visible, crossed out, at the bottom."},
  {target:"tab-trip",  title:"Day-by-Day Itinerary 🗺️",      body:"Browse every travel day. Star activities as Core, edit any item, and tap \"Plan My Day\" to get an AI-optimized route."},
  {target:"tab-pack",  title:"Packing Lists 🎒",               body:"Individual and shared packing lists for all five of you. Use the Smart Pack bar to bulk-add or remove items with plain language."},
  {target:"tab-nearby",title:"Nearby Search 📍",               body:"Location-aware quick searches tied to your trip day — find food, gas, and attractions near wherever you are."},
  {target:"tab-search",title:"Search Everything 🔍",           body:"Search across all tasks, packing items, and activities at once. Tap any result to jump straight to it."},
];

function GuidedTour({onClose}){
  const [step,setStep]=useState(0);
  const [rect,setRect]=useState(null);
  const cur=TOUR_STEPS[step];
  const isLast=step===TOUR_STEPS.length-1;

  useEffect(()=>{
    const measure=()=>{
      const el=document.querySelector(`[data-tour="${cur.target}"]`);
      if(el){const r=el.getBoundingClientRect();setRect({left:r.left,top:r.top,width:r.width,height:r.height});}
      else setRect(null);
    };
    requestAnimationFrame(measure);
    window.addEventListener("resize",measure);
    return()=>window.removeEventListener("resize",measure);
  },[step]);

  const finish=()=>{try{localStorage.setItem(TOUR_KEY,"1");}catch{}onClose();};
  const next=()=>{if(isLast)finish();else setStep(s=>s+1);};

  const PAD=6,vw=window.innerWidth,vh=window.innerHeight;
  const sr=rect?{
    l:Math.max(0,rect.left-PAD),
    t:Math.max(0,rect.top-PAD),
    r:Math.min(vw,rect.left+rect.width+PAD),
    b:Math.min(vh,rect.top+rect.height+PAD),
  }:null;
  const srW=sr?sr.r-sr.l:0,srH=sr?sr.b-sr.t:0;

  let ttTop,ttBottom,ttTransform="translateX(-50%)",arrowDir=null;
  if(sr){
    if(sr.b+220<vh){ttTop=sr.b+14;arrowDir="up";}
    else{ttBottom=vh-sr.t+14;arrowDir="down";}
  }else{ttTop="50%";ttTransform="translate(-50%,-50%)";}

  const panel={position:"fixed",background:"rgba(0,0,0,0.65)",zIndex:910};
  return(
    <div style={{position:"fixed",inset:0,zIndex:909}}>
      {sr?(
        <>
          <div onClick={finish} style={{...panel,top:0,left:0,right:0,height:sr.t}}/>
          <div onClick={finish} style={{...panel,top:sr.b,left:0,right:0,bottom:0}}/>
          <div onClick={finish} style={{...panel,top:sr.t,left:0,width:sr.l,height:srH}}/>
          <div onClick={finish} style={{...panel,top:sr.t,left:sr.r,right:0,height:srH}}/>
          <div style={{position:"fixed",top:sr.t,left:sr.l,width:srW,height:srH,borderRadius:14,border:"2px solid rgba(255,255,255,0.4)",zIndex:911,pointerEvents:"none"}}/>
        </>
      ):(
        <div onClick={finish} style={{...panel,inset:0}}/>
      )}
      <div style={{position:"fixed",left:"50%",transform:ttTransform,top:ttTop,bottom:ttBottom,width:"min(340px,calc(100vw - 36px))",zIndex:912}}>
        <div style={{background:"white",borderRadius:20,padding:"20px 20px 16px",boxShadow:"0 20px 60px rgba(0,0,0,0.45)",position:"relative"}}>
          {arrowDir&&<div style={{position:"absolute",[arrowDir==="up"?"top":"bottom"]:-10,left:"50%",transform:"translateX(-50%)",width:0,height:0,borderLeft:"10px solid transparent",borderRight:"10px solid transparent",[arrowDir==="up"?"borderBottom":"borderTop"]:"10px solid white"}}/>}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div style={{display:"flex",gap:5}}>
              {TOUR_STEPS.map((_,i)=>(
                <div key={i} style={{width:i===step?22:7,height:7,borderRadius:99,background:i===step?"#0f2444":i<step?"#94a3b8":"#e2e8f0",transition:"all 0.25s"}}/>
              ))}
            </div>
            <span style={{fontSize:11,fontWeight:600,color:"#94a3b8"}}>{step+1} of {TOUR_STEPS.length}</span>
          </div>
          <div style={{fontSize:16,fontWeight:800,color:"#0f2444",marginBottom:8,lineHeight:1.3}}>{cur.title}</div>
          <div style={{fontSize:14,color:"#475569",lineHeight:1.6,marginBottom:18}}>{cur.body}</div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={next} style={{flex:1,padding:"13px",background:"#0f2444",color:"white",border:"none",borderRadius:13,fontSize:14,fontWeight:700}}>
              {isLast?"Let's go! 🚀":"Next →"}
            </button>
            <button onClick={finish} style={{padding:"13px 16px",background:"#f1f5f9",color:"#64748b",border:"none",borderRadius:13,fontSize:14,fontWeight:600}}>
              Skip
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App(){
  const phase=getPhase();
  const tripDayIdx=getTripDayIdx();
  const today=todayStr();

  const [tab,setTab]=useState("today");
  const [dayIdx,setDayIdx]=useState(tripDayIdx);
  const [customTasks,setCustomTasks]=useState({});
  const [checked,setChecked]=useState({});
  const [packChecked,setPackChecked]=useState({});
  const [customPackItems,setCustomPackItems]=useState({General:{},Chris:{},McKenna:{},Sawyer:{},Pierce:{},Bennett:{}});
  const [deletedItems,setDeletedItems]=useState({});
  const [packPerson,setPackPerson]=useState("General");
  const [addingTo,setAddingTo]=useState(null);
  const [taskText,setTaskText]=useState("");
  const [taskType,setTaskType]=useState("confirm");
  const [taskDate,setTaskDate]=useState(today);
  const [expandedDay,setExpandedDay]=useState(null);
  const [preTripCustom,setPreTripCustom]=useState([]);
  const [preTripEdits,setPreTripEdits]=useState({});
  const [locLabel,setLocLabel]=useState(null);
  const [locError,setLocError]=useState(null);
  const [locLoading,setLocLoading]=useState(false);
  const [locAsked,setLocAsked]=useState(false);
  const [location,setLocation]=useState(null);
  const [syncStatus,setSyncStatus]=useState("idle");
  const [syncLabel,setSyncLabel]=useState("Tap to sync");
  const [lastBy,setLastBy]=useState(null);
  const [dayPlans,setDayPlans]=useState({});
  const [dayPlanStatus,setDayPlanStatus]=useState({});
  const [dayPlanError,setDayPlanError]=useState({});
  const [dayPlanSuggestion,setDayPlanSuggestion]=useState({});
  const [coreTasks,setCoreTasks]=useState({});
  const [fitWarnings,setFitWarnings]=useState({});
  const [fitStatus,setFitStatus]=useState({});
  const [editedItems,setEditedItems]=useState({});
  const [showTour,setShowTour]=useState(false);
  const [travelItems,setTravelItems]=useState(TRAVEL_SEED);
  const [homeCare,setHomeCare]=useState(DEFAULT_HOME_CARE);
  const [flappyActive,setFlappyActive]=useState(false);
  const syncTimer=useRef(null);
  const latestPatch=useRef(null);
  const isSaving=useRef(false);
  const lastSavedAt=useRef(0);

  const reverseGeocode=async(lat,lng)=>{
    const fb=`${lat.toFixed(4)}, ${lng.toFixed(4)}`;
    try{const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`,{headers:{"Accept-Language":"en"},signal:AbortSignal.timeout(6000)});if(r.ok){const d=await r.json();const city=d.address?.city||d.address?.town||d.address?.village||d.address?.suburb||d.address?.county||"";const state=d.address?.state_code||d.address?.state||"";return city?`${city}, ${state}`:fb;}}catch{}return fb;
  };
  const requestLocation=()=>{
    if(!navigator.geolocation){setLocError("GPS not available");return;}
    setLocLoading(true);setLocError(null);setLocAsked(true);
    navigator.geolocation.getCurrentPosition(async pos=>{const{latitude:lat,longitude:lng}=pos.coords;setLocation({lat,lng});setLocLoading(false);setLocLabel(await reverseGeocode(lat,lng));},err=>{setLocLoading(false);if(err.code===1)setLocError("Location denied — check Settings");else setLocError("Location unavailable — tap Retry");},{enableHighAccuracy:true,timeout:15000,maximumAge:60000});
  };

  const getState=()=>({customTasks,checked,packChecked,customPackItems,deletedItems,dayPlans,coreTasks,editedItems,preTripCustom,preTripEdits,travelItems,homeCare});
  const applyRemoteData=(data)=>{
    if(!data)return;
    if(data.customTasks)setCustomTasks(data.customTasks);
    if(data.checked)setChecked(data.checked);
    if(data.packChecked)setPackChecked(data.packChecked);
    if(data.customPackItems){const cpi={...data.customPackItems};if(cpi.Master&&!cpi.General){cpi.General=cpi.Master;delete cpi.Master;}setCustomPackItems(cpi);}
    if(data.deletedItems)setDeletedItems(data.deletedItems);
    if(data.dayPlans)setDayPlans(data.dayPlans);
    if(data.coreTasks)setCoreTasks(data.coreTasks);
    if(data.editedItems)setEditedItems(data.editedItems);
    if(data.preTripCustom)setPreTripCustom(data.preTripCustom);
    if(data.preTripEdits)setPreTripEdits(data.preTripEdits);
    if(data.travelItems)setTravelItems(data.travelItems);
    if(data.homeCare)setHomeCare(data.homeCare);
    if(data._by){setLastBy(data._by);setTimeout(()=>setLastBy(null),4000);}
  };
  const syncNow=async(patch)=>{
    setSyncStatus("saving");setSyncLabel("Saving…");
    isSaving.current=true;
    const ts=Date.now();
    lastSavedAt.current=ts;
    const data={...patch,_at:ts};
    const ok=await cloudSave(data);
    isSaving.current=false;
    if(ok){saveLocal(data);setSyncStatus("ok");setSyncLabel("Synced ✓");}
    else{setSyncStatus("error");setSyncLabel("⚠️ Sync failed — tap to retry");}
  };
  const debouncedSync=(patch)=>{
    latestPatch.current=patch;
    clearTimeout(syncTimer.current);
    syncTimer.current=setTimeout(()=>syncNow(latestPatch.current),500);
  };
  const pullSync=async()=>{
    if(isSaving.current)return;
    setSyncStatus("loading");setSyncLabel("Syncing…");
    const remote=await cloudLoad();
    if(remote){
      if(!remote._at||remote._at>=lastSavedAt.current){applyRemoteData(remote);saveLocal(remote);}
      setSyncStatus("ok");setSyncLabel("Synced ✓");
    }else{const local=loadLocal();if(local)applyRemoteData(local);setSyncStatus("local");setSyncLabel("Offline — cached data");}
  };
  useEffect(()=>{pullSync();},[]);
  useEffect(()=>{const id=setInterval(pullSync,10000);return()=>clearInterval(id);},[]);
  useEffect(()=>{try{if(!localStorage.getItem(TOUR_KEY))setTimeout(()=>setShowTour(true),900);}catch{}},[]);

  const toggleCheck=key=>{setChecked(p=>{const n={...p,[key]:!p[key]};debouncedSync({...getState(),checked:n});return n;});};
  const togglePack=key=>{setPackChecked(p=>{const n={...p,[key]:!p[key]};debouncedSync({...getState(),packChecked:n});return n;});};
  const deleteItem=key=>{if(!window.confirm("Remove this task?"))return;setDeletedItems(p=>{const n={...p,[key]:true};syncNow({...getState(),deletedItems:n});return n;});};
  const silentDeleteItem=key=>{setDeletedItems(p=>{const n={...p,[key]:true};syncNow({...getState(),deletedItems:n});return n;});};
  const handleAddTask=()=>{
    if(!taskText.trim())return;const target=taskDate||today;
    setCustomTasks(p=>{const n={...p,[target]:[...(p[target]||[]),{text:taskText.trim(),type:taskType}]};syncNow({...getState(),customTasks:n});return n;});
    setTaskText("");setAddingTo(null);
  };
  const removeTask=(date,idx)=>{if(!window.confirm("Remove this task?"))return;setCustomTasks(p=>{const n={...p,[date]:(p[date]||[]).filter((_,i)=>i!==idx)};syncNow({...getState(),customTasks:n});return n;});};
  const editTask=(date,idx,upd)=>{setCustomTasks(p=>{const n={...p,[date]:(p[date]||[]).map((t,i)=>i===idx?{...t,...upd}:t)};syncNow({...getState(),customTasks:n});return n;});};
  const updatePackItems=fn=>{setCustomPackItems(p=>{const n=typeof fn==="function"?fn(p):fn;syncNow({...getState(),customPackItems:n});return n;});};
  const openAddForm=dateKey=>{setAddingTo(dateKey);setTaskDate(dateKey);setTaskText("");setTaskType("confirm");};
  const toggleCore=key=>{setCoreTasks(p=>{const n={...p,[key]:!p[key]};debouncedSync({...getState(),coreTasks:n});return n;});};
  const editBuiltinItem=(key,upd)=>{setEditedItems(p=>{const n={...p,[key]:{...(p[key]||{}),...upd}};syncNow({...getState(),editedItems:n});return n;});};
  const addPreTripTask=(text,type,dueDate)=>{const id=`ptc-${Date.now()}-${Math.random().toString(36).slice(2,7)}`;setPreTripCustom(p=>{const n=[...p,{id,text,type,dueDate:dueDate||null}];syncNow({...getState(),preTripCustom:n});return n;});};
  const editPreTripCustom=(id,upd)=>{setPreTripCustom(p=>{const n=p.map(t=>t.id===id?{...t,...upd}:t);syncNow({...getState(),preTripCustom:n});return n;});};
  const removePreTripCustom=(id)=>{if(!window.confirm("Remove this task?"))return;setPreTripCustom(p=>{const n=p.filter(t=>t.id!==id);syncNow({...getState(),preTripCustom:n});return n;});};
  const editBuiltinPreTrip=(date,i,upd)=>{const key=`${date}-${i}`;setPreTripEdits(p=>{const n={...p,[key]:{...(p[key]||{}),...upd}};syncNow({...getState(),preTripEdits:n});return n;});};
  const deleteBuiltinPreTrip=(date,i)=>{const delKey=`pretrip-def-${date}-${i}`;if(!window.confirm("Remove this task?"))return;setDeletedItems(p=>{const n={...p,[delKey]:true};syncNow({...getState(),deletedItems:n});return n;});};
  const addTravelItem=data=>{const id=`ti-${Date.now()}-${Math.random().toString(36).slice(2,5)}`;setTravelItems(p=>{const n=[...p,{...data,id}];syncNow({...getState(),travelItems:n});return n;});};
  const editTravelItem=(id,upd)=>{setTravelItems(p=>{const n=p.map(t=>t.id===id?{...t,...upd}:t);syncNow({...getState(),travelItems:n});return n;});};
  const removeTravelItem=id=>{if(!window.confirm("Remove this item?"))return;setTravelItems(p=>{const n=p.filter(t=>t.id!==id);syncNow({...getState(),travelItems:n});return n;});};
  const addHomeCareEntry=entry=>{setHomeCare(p=>{const n=[...p,entry];syncNow({...getState(),homeCare:n});return n;});};
  const editHomeCareEntry=entry=>{setHomeCare(p=>{const n=p.map(e=>e.id===entry.id?entry:e);syncNow({...getState(),homeCare:n});return n;});};
  const removeHomeCareEntry=id=>{if(!window.confirm("Remove this home watch entry?"))return;setHomeCare(p=>{const n=p.filter(e=>e.id!==id);syncNow({...getState(),homeCare:n});return n;});};
  const addCustomTask=(date,text,type)=>{setCustomTasks(p=>{const n={...p,[date]:[...(p[date]||[]),{text,type}]};syncNow({...getState(),customTasks:n});return n;});};
  const silentRemoveTask=(date,idx)=>{setCustomTasks(p=>{const n={...p,[date]:(p[date]||[]).filter((_,i)=>i!==idx)};syncNow({...getState(),customTasks:n});return n;});};
  const silentRemovePreTripCustom=(id)=>{setPreTripCustom(p=>{const n=p.filter(t=>t.id!==id);syncNow({...getState(),preTripCustom:n});return n;});};
  const runCheckFit=async(day)=>{
    const date=day.date;
    setFitStatus(p=>({...p,[date]:"loading"}));
    setFitWarnings(p=>({...p,[date]:{}}));
    try{
      const tasks=[
        ...day.items.filter((_,j)=>!deletedItems[`itinerary-${date}-${j}`]).map((it,j)=>({key:`trip-${date}-${j}`,text:(editedItems[`itinerary-${date}-${j}`]?.text)||it.text,isCore:!!coreTasks[`trip-${date}-${j}`]})),
        ...(customTasks[date]||[]).map((t,j)=>({key:`trip-${date}-c${j}`,text:t.text,isCore:!!coreTasks[`trip-${date}-c${j}`]})),
      ];
      const resp=await fetch(WORKER_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"checkFit",city:day.city,date:day.label,tasks}),signal:AbortSignal.timeout(20000)});
      if(!resp.ok){let d="Status "+resp.status;try{const e=await resp.json();d=e.error||d;}catch{}throw new Error(d);}
      const result=await resp.json();
      const warnMap={};
      (result.warnings||[]).forEach(w=>{warnMap[w.key]=w.reason;});
      setFitWarnings(p=>({...p,[date]:warnMap}));
      setFitStatus(p=>({...p,[date]:"done"}));
    }catch(e){
      console.error("checkFit:",e);
      setFitStatus(p=>({...p,[date]:"error"}));
    }
  };
  const planDay=async(day,suggestion=null)=>{
    const allItems=[
      ...day.items.filter((_,j)=>!deletedItems[`itinerary-${day.date}-${j}`]).map((it,j)=>(editedItems[`itinerary-${day.date}-${j}`]?.text)||it.text),
      ...(customTasks[day.date]||[]).map(t=>t.text),
    ];
    if(allItems.length<2)return;
    setDayPlanStatus(p=>({...p,[day.date]:"loading"}));
    try{
      if(!WORKER_URL||WORKER_URL.includes("YOUR-WORKER")){
        setDayPlanStatus(p=>({...p,[day.date]:"config"}));
        return;
      }
      const currentPlan=suggestion?dayPlans[day.date]?.plan:null;
      const resp=await fetch(WORKER_URL,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({city:day.city,date:day.label,activities:allItems,...(suggestion&&currentPlan?{suggestion,currentPlan}:{})}),
        signal:AbortSignal.timeout(30000),
      });
      if(!resp.ok){
        let detail="Status "+resp.status;
        try{const e=await resp.json();detail=e.detail||e.error||detail;}catch{}
        throw new Error(detail);
      }
      const result=await resp.json();
      if(!result.plan)throw new Error("Worker returned ok but no plan field");
      const prevEntry=dayPlans[day.date];
      const prevHistory=prevEntry?.history||[];
      const newHistory=prevEntry?[{plan:prevEntry.plan,generatedAt:prevEntry.generatedAt},...prevHistory].slice(0,5):[];
      const newEntry={plan:result.plan,generatedAt:Date.now(),history:newHistory};
      const newDayPlans={...dayPlans,[day.date]:newEntry};
      setDayPlans(newDayPlans);
      syncNow({customTasks,checked,packChecked,customPackItems,deletedItems,dayPlans:newDayPlans});
      setDayPlanStatus(p=>({...p,[day.date]:"done"}));
    }catch(e){
      console.error("planDay:",e);
      setDayPlanStatus(p=>({...p,[day.date]:"error"}));
      setDayPlanError(p=>({...p,[day.date]:e?.message||String(e)}));
    }
  };

  const revertPlan=(date,histIdx)=>{
    const entry=dayPlans[date];
    if(!entry||!entry.history||!entry.history[histIdx])return;
    const restored=entry.history[histIdx];
    const remainingHistory=entry.history.slice(histIdx+1);
    const currentSnapshot={plan:entry.plan,generatedAt:entry.generatedAt};
    const newHistory=[currentSnapshot,...entry.history.slice(0,histIdx)];
    const newEntry={plan:restored.plan,generatedAt:restored.generatedAt,history:newHistory.slice(0,5)};
    const newDayPlans={...dayPlans,[date]:newEntry};
    setDayPlans(newDayPlans);
    syncNow({customTasks,checked,packChecked,customPackItems,deletedItems,dayPlans:newDayPlans});
    setDayPlanStatus(p=>({...p,[date]:"done"}));
  };

  const TABS=[
    {id:"today",icon:"📋",label:phase==="pretrip"?"Pre-Trip":"Today"},
    {id:"trip",icon:"🗺️",label:"Trip"},
    {id:"pack",icon:"🎒",label:"Pack"},
    {id:"nearby",icon:"📍",label:"Nearby"},
    {id:"search",icon:"🔍",label:"Search"},
  ];

  const syncDot=syncStatus==="ok"?"#22c55e":syncStatus==="local"?"#fbbf24":"#93c5fd";

  return(<>
    <div style={{fontFamily:"-apple-system,BlinkMacSystemFont,'Inter',system-ui,sans-serif",background:"#eef1f7",minHeight:"100vh",maxWidth:480,margin:"0 auto",position:"relative"}}>

      {/* ── HEADER ── */}
      <div data-tour="header" style={{background:"linear-gradient(155deg,#091d38 0%,#0f2c52 45%,#1a4b88 100%)",padding:"0 18px",color:"white",boxShadow:"0 4px 32px rgba(9,29,56,0.45)",position:"sticky",top:0,zIndex:100}}>
        <div style={{paddingTop:"max(16px, env(safe-area-inset-top))"}}>

          {/* Title row */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingBottom:10}}>
            <div>
              <div style={{fontSize:10,fontWeight:800,letterSpacing:"0.16em",opacity:0.55,textTransform:"uppercase",marginBottom:3}}>East Coast Family Trip</div>
              <div style={{fontSize:22,fontWeight:900,letterSpacing:"-0.5px",lineHeight:1}}>Jul 9 – 24, 2026</div>
            </div>
            <div style={{display:"flex",gap:7,alignItems:"center"}}>
              <button onClick={()=>setShowTour(true)} title="App tour" style={{background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.18)",borderRadius:11,color:"white",width:34,height:34,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,fontWeight:700,cursor:"pointer",flexShrink:0,backdropFilter:"blur(8px)"}}>?</button>
              <button onClick={pullSync} style={{background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:12,color:"white",padding:"8px 12px",cursor:"pointer",display:"flex",alignItems:"center",gap:6,backdropFilter:"blur(8px)"}}>
                <span style={{width:8,height:8,borderRadius:"50%",background:syncDot,display:"inline-block",flexShrink:0,boxShadow:`0 0 6px ${syncDot}`}}/>
                <span style={{fontSize:12,fontWeight:600,opacity:0.85}}>↻ {syncLabel}</span>
              </button>
            </div>
          </div>

          {lastBy&&<div style={{fontSize:11,opacity:0.55,marginBottom:6}}>✨ {lastBy} just updated</div>}

          {/* Location bar */}
          <div style={{display:"flex",alignItems:"center",gap:7,background:"rgba(255,255,255,0.1)",borderRadius:12,padding:"8px 13px",marginBottom:10,fontSize:13,minHeight:38,backdropFilter:"blur(8px)"}}>
            {!locAsked&&!locLabel&&!locLoading&&(
              <div style={{display:"flex",alignItems:"center",width:"100%",gap:6}}>
                <button onClick={requestLocation} style={{background:"none",border:"none",color:"white",fontSize:13,cursor:"pointer",padding:0,display:"flex",alignItems:"center",gap:7,opacity:0.8,flex:1}}>
                  <span style={{fontSize:16}}>📍</span><span style={{fontWeight:500}}>Tap to enable location</span>
                </button>
                <button onClick={()=>setLocAsked(true)} style={{background:"rgba(255,255,255,0.15)",border:"none",borderRadius:"50%",width:22,height:22,display:"flex",alignItems:"center",justifyContent:"center",color:"rgba(255,255,255,0.6)",fontSize:14,lineHeight:1,padding:0,flexShrink:0}}>×</button>
              </div>
            )}
            {locLoading&&<><span>📍</span><span style={{opacity:0.7}}>Finding your location…</span></>}
            {locLabel&&!locError&&(
              <><span style={{fontSize:16}}>📍</span><span style={{fontWeight:600,flex:1}}>{locLabel}</span>
              <button onClick={requestLocation} style={{background:"none",border:"none",color:"rgba(255,255,255,0.5)",fontSize:13,cursor:"pointer",padding:0}}>🔄</button>
              <a href={`https://maps.google.com/?q=${location?.lat},${location?.lng}`} target="_blank" rel="noreferrer" style={{color:"rgba(255,255,255,0.75)",fontSize:12,textDecoration:"none",fontWeight:700,marginLeft:4,background:"rgba(255,255,255,0.15)",padding:"3px 9px",borderRadius:8}}>Map →</a></>
            )}
            {locError&&(
              <><span style={{fontSize:16}}>📍</span><span style={{opacity:0.7,fontSize:12,flex:1}}>{locError}</span>
              <button onClick={requestLocation} style={{background:"rgba(255,255,255,0.18)",border:"none",borderRadius:8,color:"white",fontSize:12,padding:"4px 10px",cursor:"pointer",flexShrink:0,fontWeight:600}}>Retry</button></>
            )}
          </div>

          {/* ── TAB BAR (top, inside header) ── */}
          <div style={{display:"flex",paddingBottom:12,marginLeft:-6,marginRight:-6}}>
            {TABS.map(t=>{
              const isActive=tab===t.id;
              return(
                <button key={t.id} data-tour={`tab-${t.id}`} onClick={()=>{setTab(t.id);playSfx('tab');}} style={{
                  flex:1,padding:"8px 4px",border:"none",cursor:"pointer",
                  background:isActive?"rgba(255,255,255,0.16)":"transparent",
                  borderRadius:13,display:"flex",flexDirection:"column",alignItems:"center",gap:3,
                  transition:"background 0.15s",
                }}>
                  <span style={{fontSize:19,lineHeight:1,opacity:isActive?1:0.45}}>{t.icon}</span>
                  <span style={{fontSize:10,fontWeight:isActive?800:500,color:isActive?"white":"rgba(255,255,255,0.45)",lineHeight:1,letterSpacing:"0.01em"}}>{t.label}</span>
                  {isActive&&<div style={{width:16,height:2.5,borderRadius:99,background:"rgba(255,255,255,0.65)",marginTop:1}}/>}
                </button>
              );
            })}
          </div>

        </div>
      </div>

      {/* ── SCROLL CONTENT ── */}
      <div style={{padding:"18px 16px",paddingBottom:"calc(28px + env(safe-area-inset-bottom, 0px))"}} key={tab}>

        {/* PRE-TRIP / TODAY */}
        {tab==="today"&&(
          <div style={{animation:"fadeUp 0.22s ease"}}>
            {phase==="pretrip"&&(()=>{
              const ptTasks=[];
              Object.entries(DEFAULT_PRETRIP).forEach(([date,tasks])=>{
                tasks.forEach((t,i)=>{
                  const delKey=`pretrip-def-${date}-${i}`;
                  if(deletedItems[delKey])return;
                  const checkKey=`${date}-def-${i}`;
                  const edit=preTripEdits[`${date}-${i}`]||{};
                  const dueDate=edit.dueDate!==undefined?edit.dueDate:date;
                  ptTasks.push({task:{...t,...edit,dueDate},checkKey,isBuiltin:true,_date:date,_idx:i,dueDate});
                });
              });
              preTripCustom.forEach(item=>{
                ptTasks.push({task:{text:item.text,type:item.type,dueDate:item.dueDate},checkKey:item.id,isBuiltin:false,id:item.id,dueDate:item.dueDate});
              });
              const incomplete=ptTasks.filter(t=>!checked[t.checkKey]);
              const complete=ptTasks.filter(t=>!!checked[t.checkKey]);
              const dated=incomplete.filter(t=>t.dueDate).sort((a,b)=>a.dueDate<b.dueDate?-1:a.dueDate>b.dueDate?1:0);
              const undated=incomplete.filter(t=>!t.dueDate).sort((a,b)=>a.task.text.localeCompare(b.task.text));
              const sorted=[...dated,...undated,...complete];
              return(
                <div>
                  <CountdownCard/>
                  {sorted.length===0&&(
                    <div style={{...S.card,padding:"26px 18px",textAlign:"center",marginBottom:12}}>
                      <div style={{fontSize:36,marginBottom:10}}>🌴</div>
                      <div style={{fontWeight:800,fontSize:15,color:"#1e293b"}}>All tasks complete!</div>
                      <div style={{fontSize:13,color:"#94a3b8",marginTop:5}}>Add more tasks below.</div>
                    </div>
                  )}
                  {sorted.map(entry=>(
                    <TaskItem key={entry.checkKey} task={entry.task} checkKey={entry.checkKey} checked={checked} onToggle={toggleCheck} showDueDateEdit={true}
                      onEdit={entry.isBuiltin?upd=>editBuiltinPreTrip(entry._date,entry._idx,upd):upd=>editPreTripCustom(entry.id,upd)}
                      onRemove={entry.isBuiltin?()=>deleteBuiltinPreTrip(entry._date,entry._idx):()=>removePreTripCustom(entry.id)}
                    />
                  ))}
                  {addingTo==="pretrip"?(
                    <PreTripAddForm onAdd={(text,type,dueDate)=>{addPreTripTask(text,type,dueDate);setAddingTo(null);}} onCancel={()=>setAddingTo(null)}/>
                  ):(
                    <button onClick={()=>setAddingTo("pretrip")} style={{width:"100%",padding:"13px",...S.cardSm,background:"white",color:S.navy,border:"2px dashed #cbd5e1",fontSize:14,fontWeight:700,marginBottom:14,boxShadow:"none"}}>+ Add a task</button>
                  )}
                </div>
              );
            })()}

            {phase==="trip"&&(()=>{
              const day=ITINERARY[dayIdx];
              const ptTasks=[];
              Object.entries(DEFAULT_PRETRIP).forEach(([date,tasks])=>{
                tasks.forEach((t,i)=>{
                  if(deletedItems[`pretrip-def-${date}-${i}`])return;
                  const edit=preTripEdits[`${date}-${i}`]||{};
                  ptTasks.push({task:{...t,...edit},checkKey:`${date}-def-${i}`,isBuiltin:true,_date:date,_idx:i});
                });
              });
              preTripCustom.forEach(item=>{
                ptTasks.push({task:{text:item.text,type:item.type},checkKey:item.id,isBuiltin:false,id:item.id});
              });
              const incompletePt=ptTasks.filter(e=>!checked[e.checkKey]);
              return(
                <div>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
                    <button onClick={()=>{const ni=Math.max(0,dayIdx-1);setDayIdx(ni);setExpandedDay(ni);}} disabled={dayIdx===0} style={{width:40,height:40,borderRadius:13,...S.cardSm,border:"none",fontSize:18,color:"#64748b",opacity:dayIdx===0?0.3:1,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
                    <div style={{flex:1,textAlign:"center"}}>
                      <div style={{fontWeight:800,fontSize:15,color:S.navy}}>{day.emoji} {day.label} — {day.city}</div>
                      <div style={{fontSize:11,color:getDaysBetween(day.date)===0?S.accent:"#94a3b8",marginTop:2,fontWeight:getDaysBetween(day.date)===0?700:400}}>{getDaysBetween(day.date)===0?"Today!":getDaysBetween(day.date)>0?`in ${getDaysBetween(day.date)} days`:`${Math.abs(getDaysBetween(day.date))} days ago`}</div>
                    </div>
                    <button onClick={()=>{const ni=Math.min(ITINERARY.length-1,dayIdx+1);setDayIdx(ni);setExpandedDay(ni);}} disabled={dayIdx===ITINERARY.length-1} style={{width:40,height:40,borderRadius:13,...S.cardSm,border:"none",fontSize:18,color:"#64748b",opacity:dayIdx===ITINERARY.length-1?0.3:1,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
                  </div>
                  <DayDetailView day={day} showHeader
                    checked={checked} toggleCheck={toggleCheck} deletedItems={deletedItems} editedItems={editedItems}
                    coreTasks={coreTasks} toggleCore={toggleCore} customTasks={customTasks}
                    travelItems={travelItems} addTravelItem={addTravelItem} editTravelItem={editTravelItem} removeTravelItem={removeTravelItem}
                    homeCare={homeCare} addHomeCareEntry={addHomeCareEntry} editHomeCareEntry={editHomeCareEntry} removeHomeCareEntry={removeHomeCareEntry}
                    fitWarnings={fitWarnings} fitStatus={fitStatus} runCheckFit={runCheckFit}
                    dayPlans={dayPlans} dayPlanStatus={dayPlanStatus} dayPlanError={dayPlanError} planDay={planDay}
                    dayPlanSuggestion={dayPlanSuggestion} setDayPlanSuggestion={setDayPlanSuggestion} revertPlan={revertPlan}
                    addingTo={addingTo} setAddingTo={setAddingTo} openAddForm={openAddForm}
                    taskText={taskText} setTaskText={setTaskText} taskType={taskType} setTaskType={setTaskType} handleAddTask={handleAddTask}
                    removeTask={removeTask} editTask={editTask} deleteItem={deleteItem} editBuiltinItem={editBuiltinItem}
                  />
                  {incompletePt.length>0&&(
                    <div>
                      <div style={{...S.label,margin:"18px 0 8px"}}>Pre-Trip Tasks Still Pending</div>
                      {incompletePt.map(entry=>(
                        <TaskItem key={entry.checkKey} task={entry.task} checkKey={entry.checkKey} checked={checked} onToggle={toggleCheck}
                          onEdit={entry.isBuiltin?upd=>editBuiltinPreTrip(entry._date,entry._idx,upd):upd=>editPreTripCustom(entry.id,upd)}
                          onRemove={entry.isBuiltin?()=>deleteBuiltinPreTrip(entry._date,entry._idx):()=>removePreTripCustom(entry.id)}
                        />
                      ))}
                    </div>
                  )}
                  {dayIdx!==tripDayIdx&&<button onClick={()=>{setDayIdx(tripDayIdx);setExpandedDay(tripDayIdx);}} style={{width:"100%",padding:"13px",background:S.navy,color:"white",border:"none",borderRadius:14,fontSize:14,fontWeight:700,boxShadow:"0 4px 14px rgba(15,36,68,0.3)",marginTop:12}}>Jump to Today</button>}
                </div>
              );
            })()}

            {phase==="posttrip"&&(
              <div style={{textAlign:"center",padding:"56px 20px"}}>
                <div style={{fontSize:60,marginBottom:14}}>🏠</div>
                <div style={{fontWeight:900,fontSize:24,color:S.navy}}>Trip Complete!</div>
                <div style={{fontSize:15,color:"#94a3b8",marginTop:8}}>Hope it was amazing. 🌊🗽🍫</div>
              </div>
            )}
          </div>
        )}

        {/* TRIP TAB */}
        {tab==="trip"&&(
          <div style={{animation:"fadeUp 0.22s ease"}}>
            <HomeWatchBanner homeCare={homeCare} today={today}/>
            <div style={{...S.label,margin:"4px 0 5px"}}>Full Trip Plan</div>
            <div style={{fontSize:12,color:"#94a3b8",marginBottom:14}}>Tap any day to expand · add or edit tasks</div>
            {ITINERARY.map((day,i)=>{
              const diff=getDaysBetween(day.date);
              const isPast=diff<0,isToday=diff===0,isOpen=expandedDay===i;
              const cust=customTasks[day.date]||[];
              const total=day.items.length+cust.length;
              const done=[...day.items.map((_,j)=>checked[`trip-${day.date}-${j}`]),...cust.map((_,j)=>checked[`trip-${day.date}-c${j}`])].filter(Boolean).length;
              return(
                <div key={i} style={{...S.card,marginBottom:10,overflow:"hidden",borderLeft:isToday?"4px solid "+S.accent:"4px solid transparent"}}>
                  <div onClick={()=>{const opening=!isOpen;setExpandedDay(opening?i:null);if(opening)setDayIdx(i);}} style={{display:"flex",alignItems:"center",gap:11,padding:"14px 16px",cursor:"pointer",background:isToday?"#eff6ff":isPast?"#fafafa":"white"}}>
                    <div style={{fontSize:24,flexShrink:0}}>{day.emoji}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                        <div style={{fontWeight:800,fontSize:14,color:isPast?"#cbd5e1":S.navy}}>{day.label}</div>
                        {isToday&&<span style={{fontSize:10,fontWeight:800,color:"white",background:S.accent,borderRadius:6,padding:"2px 8px"}}>TODAY</span>}
                        {!isPast&&!isToday&&diff<=5&&<span style={{fontSize:10,fontWeight:800,color:"#f97316",background:"#fff7ed",borderRadius:6,padding:"2px 7px"}}>in {diff}d</span>}
                      </div>
                      <div style={{fontSize:12,color:isPast?"#d1d5db":"#64748b",marginTop:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{day.title}</div>
                      {!isPast&&<div style={{marginTop:4}}><WeatherChip date={day.date} coords={DAY_COORDS[day.date]}/></div>}
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:7,flexShrink:0}}>
                      {done>0&&<div style={{fontSize:12,color:"#22c55e",fontWeight:800}}>{done}/{total}</div>}
                      <div style={{color:"#d1d5db",fontSize:18,transition:"transform 0.2s",transform:isOpen?"rotate(90deg)":"none"}}>›</div>
                    </div>
                  </div>
                  {isOpen&&(
                    <div style={{padding:"0 16px 16px",borderTop:"1px solid #f8fafc"}}>
                      <DayDetailView day={day}
                        checked={checked} toggleCheck={toggleCheck} deletedItems={deletedItems} editedItems={editedItems}
                        coreTasks={coreTasks} toggleCore={toggleCore} customTasks={customTasks}
                        travelItems={travelItems} addTravelItem={addTravelItem} editTravelItem={editTravelItem} removeTravelItem={removeTravelItem}
                        homeCare={homeCare} addHomeCareEntry={addHomeCareEntry} editHomeCareEntry={editHomeCareEntry} removeHomeCareEntry={removeHomeCareEntry}
                        fitWarnings={fitWarnings} fitStatus={fitStatus} runCheckFit={runCheckFit}
                        dayPlans={dayPlans} dayPlanStatus={dayPlanStatus} dayPlanError={dayPlanError} planDay={planDay}
                        dayPlanSuggestion={dayPlanSuggestion} setDayPlanSuggestion={setDayPlanSuggestion} revertPlan={revertPlan}
                        addingTo={addingTo} setAddingTo={setAddingTo} openAddForm={openAddForm}
                        taskText={taskText} setTaskText={setTaskText} taskType={taskType} setTaskType={setTaskType} handleAddTask={handleAddTask}
                        removeTask={removeTask} editTask={editTask} deleteItem={deleteItem} editBuiltinItem={editBuiltinItem}
                      />
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}

        {/* PACK TAB */}
        {tab==="pack"&&(
          <div style={{animation:"fadeUp 0.22s ease"}}>
            <PackingTab packChecked={packChecked} onTogglePack={togglePack} customPackItems={customPackItems} setCustomPackItems={updatePackItems} packPerson={packPerson} setPackPerson={setPackPerson} deletedItems={deletedItems} onDeleteItem={deleteItem} silentDeleteItem={silentDeleteItem}/>
          </div>
        )}

        {/* SEARCH TAB */}
        {tab==="search"&&(
          <div style={{animation:"fadeUp 0.22s ease"}}>
            <SearchTab setTab={setTab} setDayIdx={setDayIdx} setPackPerson={setPackPerson} onFlappy={()=>setFlappyActive(true)}/>
          </div>
        )}

        {/* NEARBY TAB */}
        {tab==="nearby"&&(
          <div style={{animation:"fadeUp 0.22s ease"}}>
            <NearbyTab tripDayIdx={tripDayIdx}/>
          </div>
        )}

      </div>

      <UniversalCommandBar
        customTasks={customTasks} checked={checked} coreTasks={coreTasks} packChecked={packChecked}
        customPackItems={customPackItems} deletedItems={deletedItems} editedItems={editedItems}
        travelItems={travelItems} preTripCustom={preTripCustom} preTripEdits={preTripEdits}
        toggleCheck={toggleCheck} toggleCore={toggleCore} silentDeleteItem={silentDeleteItem}
        addPreTripTask={addPreTripTask} editPreTripCustom={editPreTripCustom} silentRemovePreTripCustom={silentRemovePreTripCustom}
        editBuiltinPreTrip={editBuiltinPreTrip}
        editTask={editTask} addCustomTask={addCustomTask} silentRemoveTask={silentRemoveTask}
        editBuiltinItem={editBuiltinItem} updatePackItems={updatePackItems}
        addTravelItem={addTravelItem} editTravelItem={editTravelItem}/>
      {showTour&&<GuidedTour onClose={()=>setShowTour(false)}/>}

    </div>
    {flappyActive&&<FlappyGame onExit={()=>setFlappyActive(false)}/>}
  </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
