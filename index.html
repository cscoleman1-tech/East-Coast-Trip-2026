const getPhase=()=>{const t=todayStr();if(t<TRIP_START)return"pretrip";if(t>TRIP_END)return"posttrip";return"trip";};
const getTripDayIdx=()=>{const t=todayStr();const i=ITINERARY.findIndex(d=>d.date===t);return i>=0?i:0;};
const fmtDate=d=>new Date(d+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});

// ── SYNC ──────────────────────────────────────────────────────────────────────
const LS_KEY="trip2026_local";
function loadLocal(){try{const s=localStorage.getItem(LS_KEY);return s?JSON.parse(s):{};}catch{return{};}}
function saveLocal(data){try{localStorage.setItem(LS_KEY,JSON.stringify(data));}catch{}}
const JSONBIN_URL=`https://api.jsonbin.io/v3/b/${BIN_ID}`;
const JSONBIN_HEADERS={"Content-Type":"application/json","X-Master-Key":BIN_KEY,"X-Bin-Meta":false};
async function cloudLoad(){try{const r=await fetch(JSONBIN_URL+"/latest",{headers:JSONBIN_HEADERS,signal:AbortSignal.timeout(8000)});if(!r.ok)return null;return await r.json();}catch{return null;}}
async function cloudSave(data){try{const r=await fetch(JSONBIN_URL,{method:"PUT",headers:JSONBIN_HEADERS,body:JSON.stringify(data),signal:AbortSignal.timeout(8000)});return r.ok;}catch{return false;}}

  label:{fontSize:11,fontWeight:800,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.1em"},
  navy:"#0f2444",

// ── TASK ITEM ─────────────────────────────────────────────────────────────────
function TaskItem({task,checkKey,checked,onToggle,onRemove,onEdit}){
  const [editing,setEditing]=useState(false);
  const [editText,setEditText]=useState(task.text);
  const [editType,setEditType]=useState(task.type);
  const done=!!checked[checkKey];
  const bColor=TYPE_BORDER[task.type]||"#94a3b8";
  const save=()=>{if(editText.trim())onEdit&&onEdit({text:editText.trim(),type:editType});setEditing(false);};

  if(editing) return(
    <div style={{...S.cardSm,padding:"14px 15px",marginBottom:8,borderLeft:`4px solid ${S.accent}`}}>
      <input value={editText} onChange={e=>setEditText(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")save();if(e.key==="Escape")setEditing(false);}} autoFocus
        style={{width:"100%",padding:"10px 13px",borderRadius:10,border:"1.5px solid #e2e8f0",fontSize:15,marginBottom:9,boxSizing:"border-box",background:"#f8fafc"}}/>
      <div style={{display:"flex",gap:5,marginBottom:10,flexWrap:"wrap"}}>
        {[["booking","🎟️"],["confirm","📞"],["pack","🎒"],["activity","🎯"],["food","🍽️"],["tip","💡"]].map(([v,ic])=>(
          <button key={v} onClick={()=>setEditType(v)} style={{padding:"5px 11px",borderRadius:20,border:`1.5px solid ${editType===v?S.navy:"#e2e8f0"}`,fontSize:12,fontWeight:editType===v?700:400,background:editType===v?S.navy:"white",color:editType===v?"white":"#64748b"}}>{ic} {v}</button>
        ))}
      </div>
      <div style={{display:"flex",gap:8}}>
        <button onClick={save} style={{flex:1,padding:"10px",background:S.navy,color:"white",border:"none",borderRadius:11,fontSize:14,fontWeight:700}}>Save</button>
        <button onClick={()=>setEditing(false)} style={{padding:"10px 16px",background:"#f1f5f9",color:"#64748b",border:"none",borderRadius:11,fontSize:14,fontWeight:600}}>Cancel</button>
      </div>
    </div>
  );

  return(
    <div style={{display:"flex",alignItems:"flex-start",gap:12,...S.cardSm,padding:"13px 14px 13px 15px",marginBottom:8,borderLeft:`4px solid ${done?"#e2e8f0":bColor}`,background:done?"#f8fafc":"white",transition:"all 0.18s"}}>
      <div onClick={()=>onToggle(checkKey)} style={{width:24,height:24,borderRadius:7,border:done?"none":`2px solid ${bColor}`,background:done?"#22c55e":"white",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1,cursor:"pointer",boxShadow:done?"0 2px 8px rgba(34,197,94,0.35)":"none",transition:"all 0.15s"}}>
        {done&&<span style={{color:"white",fontSize:13,fontWeight:900,lineHeight:1}}>✓</span>}
      </div>
      <div style={{flex:1,fontSize:15,color:done?"#94a3b8":"#1e293b",lineHeight:1.45,textDecoration:done?"line-through":"none",textDecorationColor:"#cbd5e1",cursor:"pointer"}} onClick={()=>onToggle(checkKey)}>
        <span style={{marginRight:6}}>{TYPE_ICONS[task.type]||"•"}</span>{task.text}
      </div>
      <div style={{display:"flex",gap:5,flexShrink:0,alignItems:"center",marginTop:1}}>
        {onEdit&&!done&&<span onClick={()=>{setEditText(task.text);setEditType(task.type);setEditing(true);}} style={{fontSize:14,cursor:"pointer",opacity:0.3,lineHeight:1}}>✏️</span>}
        {!onEdit&&!onRemove&&<span style={{fontSize:11,opacity:0.12}}>🔒</span>}
        {onRemove&&<span onClick={onRemove} style={{color:"#cbd5e1",fontSize:22,cursor:"pointer",lineHeight:1,padding:"0 2px",fontWeight:300}}>×</span>}
      </div>
    </div>
  );
}

// ── MINI CALENDAR ─────────────────────────────────────────────────────────────
function MiniCalendar({markedDates,onSelect,selectedDate,onClose}){
  const [vy,setVy]=useState(2026);
  const [vm,setVm]=useState(5);
  const dim=new Date(vy,vm+1,0).getDate();
  const fd=new Date(vy,vm,1).getDay();
  const mn=new Date(vy,vm,1).toLocaleDateString("en-US",{month:"long",year:"numeric"});
  const cells=[];for(let i=0;i<fd;i++)cells.push(null);for(let d=1;d<=dim;d++)cells.push(d);
  const pm=()=>vm===0?setVm(11)||setVy(y=>y-1):setVm(m=>m-1);
  const nm=()=>vm===11?setVm(0)||setVy(y=>y+1):setVm(m=>m+1);
  const td=todayStr();
  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div onClick={e=>e.stopPropagation()} style={{...S.card,padding:22,width:"100%",maxWidth:340}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <button onClick={pm} style={{width:38,height:38,borderRadius:12,border:"1.5px solid #e2e8f0",background:"white",fontSize:18,color:"#334155"}}>‹</button>
          <div style={{fontWeight:800,fontSize:16,color:S.navy}}>{mn}</div>
          <button onClick={nm} style={{width:38,height:38,borderRadius:12,border:"1.5px solid #e2e8f0",background:"white",fontSize:18,color:"#334155"}}>›</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
          {["Su","Mo","Tu","We","Th","Fr","Sa"].map(d=><div key={d} style={{textAlign:"center",fontSize:11,fontWeight:700,color:"#94a3b8",padding:"2px 0"}}>{d}</div>)}
          {cells.map((day,i)=>{
            if(!day)return<div key={`e${i}`}/>;
            const ds=`${vy}-${String(vm+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
            const isTrip=ds>=TRIP_START&&ds<=TRIP_END,isMarked=markedDates.includes(ds);
            const isToday=ds===td,isSel=ds===selectedDate,isPast=ds<td;
            return(
              <div key={day} onClick={()=>!isPast&&onSelect(ds)} style={{textAlign:"center",padding:"6px 2px",borderRadius:9,fontSize:14,fontWeight:isMarked||isToday?700:400,
                background:isSel?S.navy:isTrip?"#eff6ff":isMarked?"#fdf4ff":"transparent",
                color:isSel?"white":isPast?"#cbd5e1":isToday?S.accent:"#334155",cursor:isPast?"default":"pointer",
                border:isMarked&&!isSel?"2px solid #d8b4fe":isToday&&!isSel?`2px solid ${S.accent}`:"2px solid transparent"}}>
                {day}
              </div>
            );
          })}
        </div>
        <button onClick={onClose} style={{width:"100%",marginTop:16,padding:"13px",background:"#f1f5f9",border:"none",borderRadius:13,fontSize:14,fontWeight:700,color:"#64748b"}}>Close</button>
      </div>
    </div>
  );
}

// ── COUNTDOWN CARD ────────────────────────────────────────────────────────────
function CountdownCard(){
  const days=getDaysBetween(TRIP_START);
  if(days<=0)return null;
  const planStart=new Date("2026-01-01T00:00:00");
  const tripDate=new Date(TRIP_START+"T00:00:00");
  const now=new Date();
  const pct=Math.max(0,Math.min(1,(now-planStart)/(tripDate-planStart)));
  const r=56,circ=2*Math.PI*r;
  const emojis=["🌴","✈️","🗽","🏖️","🍕","🍫","🚂","🌊","🎉"];
  return(
    <div style={{background:"linear-gradient(155deg,#0a1e3a 0%,#0f2c52 40%,#1a4b88 100%)",borderRadius:24,padding:"24px 20px",color:"white",marginBottom:16,boxShadow:"0 12px 40px rgba(10,30,58,0.4)",overflow:"hidden",position:"relative"}}>
      <div style={{position:"absolute",top:-30,right:-30,width:160,height:160,borderRadius:"50%",background:"rgba(255,255,255,0.03)"}}/>
      <div style={{position:"absolute",bottom:-40,left:-20,width:180,height:180,borderRadius:"50%",background:"rgba(255,255,255,0.04)"}}/>
      <div style={{fontSize:27,marginBottom:10,letterSpacing:3,textAlign:"center",position:"relative"}}>
        {emojis.map((e,i)=><span key={i} style={{display:"inline-block",animation:`bounce${i%3} ${1.2+i*0.1}s ease-in-out infinite`,animationDelay:`${i*0.12}s`}}>{e}</span>)}
      </div>
      <div style={{display:"flex",justifyContent:"center",marginBottom:10,position:"relative"}}>
        <div style={{position:"relative",width:148,height:148}}>
          <svg width="148" height="148" style={{transform:"rotate(-90deg)"}}>
            <circle cx="74" cy="74" r={r} fill="none" stroke="rgba(255,255,255,0.1)" strokeWidth="9"/>
            <circle cx="74" cy="74" r={r} fill="none" stroke="rgba(99,179,237,0.75)" strokeWidth="9"
              strokeDasharray={circ} strokeDashoffset={circ*(1-pct)} strokeLinecap="round"/>
          </svg>
          <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
            <div style={{fontSize:52,fontWeight:900,lineHeight:1,letterSpacing:"-3px"}}>{days}</div>
            <div style={{fontSize:11,fontWeight:700,opacity:0.6,letterSpacing:"0.1em",marginTop:2}}>DAYS TO GO</div>
          </div>
        </div>
      </div>
      <div style={{textAlign:"center",fontSize:15,fontWeight:700,opacity:0.9,marginBottom:10}}>Until the East Coast Adventure! 🌊</div>
      <div style={{background:"rgba(255,255,255,0.12)",borderRadius:14,padding:"10px 16px",fontSize:13,textAlign:"center",fontWeight:500,backdropFilter:"blur(8px)"}}>
        ✈️ Departs SLC · Thu Jul 9, 2:05pm
      </div>
    </div>
  );
}

// ── PACKING TAB ───────────────────────────────────────────────────────────────
function PackingTab({packChecked,onTogglePack,customPackItems,setCustomPackItems,packPerson,setPackPerson,deletedItems,onDeleteItem}){
  const [addingCat,setAddingCat]=useState(null);
  const [newItem,setNewItem]=useState("");
  const persons=["Master","Chris","McKenna","Sawyer","Pierce","Bennett"];
  const packData=packPerson==="Master"?MASTER_PACKING:{[`👤 ${packPerson}`]:INDIVIDUAL_PACKING[packPerson]||[]};
  const custom=customPackItems[packPerson]||{};
  const isBaseDeleted=(cat,i)=>!!deletedItems[`pack-base-${packPerson}-${cat}-${i}`];
  const total=Object.entries(packData).reduce((a,[c,it])=>a+it.filter((_,i)=>!isBaseDeleted(c,i)).length+((custom[c]||[]).length),0);
  const done=Object.entries(packData).reduce((a,[c,it])=>{
    const cust2=custom[c]||[];const all=[...it,...cust2];
    return a+all.filter((_,i)=>{const isBase=i<it.length;return(!isBase||!isBaseDeleted(c,i))&&packChecked[`pack-${packPerson}-${c}-${i}`];}).length;
  },0);
  const pct=total>0?Math.round((done/total)*100):0;
  const addIt=(cat)=>{if(!newItem.trim())return;setCustomPackItems(p=>({...p,[packPerson]:{...(p[packPerson]||{}),[cat]:[...((p[packPerson]||{})[cat]||[]),newItem.trim()]}}));setNewItem("");setAddingCat(null);};
  const removeIt=(cat,idx,bl)=>{const ci=idx-bl;setCustomPackItems(p=>({...p,[packPerson]:{...(p[packPerson]||{}),[cat]:((p[packPerson]||{})[cat]||[]).filter((_,i)=>i!==ci)}}));};
  return(
    <div>
      <div style={{display:"flex",gap:7,overflowX:"auto",paddingBottom:8,marginBottom:14}}>
        {persons.map(p=>(
          <button key={p} onClick={()=>setPackPerson(p)} style={{whiteSpace:"nowrap",padding:"8px 17px",borderRadius:22,border:`1.5px solid ${packPerson===p?S.navy:"#e2e8f0"}`,fontSize:13,fontWeight:packPerson===p?700:500,background:packPerson===p?S.navy:"white",color:packPerson===p?"white":"#64748b",flexShrink:0,boxShadow:packPerson===p?"0 4px 12px rgba(15,36,68,0.25)":"none"}}>
            {p==="Master"?"📋 Master":p==="Chris"?"👨 Chris":p==="McKenna"?"👩 McKenna":`👦 ${p}`}
          </button>
        ))}
      </div>
      <div style={{...S.card,padding:"15px 17px",marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style={{fontWeight:800,fontSize:15,color:S.navy}}>{packPerson==="Master"?"Family Pack List":`${packPerson}'s List`}</div>
          <div style={{fontSize:15,fontWeight:800,color:pct===100?"#16a34a":S.accent}}>{done}<span style={{color:"#94a3b8",fontWeight:500}}>/{total}</span></div>
        </div>
        <div style={{background:"#f1f5f9",borderRadius:99,height:10,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${pct}%`,background:pct===100?"linear-gradient(90deg,#22c55e,#16a34a)":"linear-gradient(90deg,#6366f1,#3b82f6)",borderRadius:99,transition:"width 0.5s ease"}}/>
        </div>
        {pct===100&&<div style={{fontSize:13,color:"#16a34a",marginTop:8,textAlign:"center",fontWeight:700,animation:"popIn 0.3s ease"}}>🎉 All packed!</div>}
      </div>
      {Object.entries(packData).map(([cat,base])=>{
        const cust=(custom[cat]||[]),all=[...base,...cust];
        const activeAll=all.filter((_,i)=>!(i<base.length&&isBaseDeleted(cat,i)));
        const cd=activeAll.filter((_,i2)=>{const origI=all.indexOf(activeAll[i2]);return packChecked[`pack-${packPerson}-${cat}-${origI}`];}).length;
        return(
          <div key={cat} style={{...S.card,marginBottom:10,overflow:"hidden"}}>
            <div style={{background:"linear-gradient(90deg,#f8fafc,#f1f5f9)",padding:"11px 16px",borderBottom:"1px solid #f1f5f9",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontWeight:800,fontSize:14,color:S.navy}}>{cat}</div>
              <div style={{fontSize:13,fontWeight:700,color:cd===activeAll.length&&activeAll.length>0?"#16a34a":"#94a3b8"}}>{cd}/{activeAll.length}</div>
            </div>
            <div style={{padding:"8px 16px"}}>
              {all.map((item,i)=>{
                const isBase=i<base.length;
                if(isBase&&isBaseDeleted(cat,i))return null;
                const key=`pack-${packPerson}-${cat}-${i}`;
                const dk=!!packChecked[key];
                const visibleAll=all.filter((_,j)=>!(j<base.length&&isBaseDeleted(cat,j)));
                const visIdx=visibleAll.indexOf(item);
                return(
                  <div key={i} onClick={()=>onTogglePack(key)} style={{display:"flex",alignItems:"center",gap:11,padding:"10px 0",borderBottom:visIdx<visibleAll.length-1?"1px solid #f8fafc":"none",cursor:"pointer"}}>
                    <div style={{width:22,height:22,borderRadius:7,border:dk?"none":"2px solid #e2e8f0",background:dk?"#22c55e":"white",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all 0.15s",boxShadow:dk?"0 2px 6px rgba(34,197,94,0.3)":"none"}}>
                      {dk&&<span style={{color:"white",fontSize:12,fontWeight:900}}>✓</span>}
                    </div>
                    <div style={{fontSize:14,color:dk?"#94a3b8":"#334155",textDecoration:dk?"line-through":"none",textDecorationColor:"#cbd5e1",flex:1,lineHeight:1.4}}>{item}</div>
                    {isBase
                      ?<span onClick={e=>{e.stopPropagation();onDeleteItem(`pack-base-${packPerson}-${cat}-${i}`);}} style={{color:"#e2e8f0",fontSize:20,cursor:"pointer",flexShrink:0,lineHeight:1}}>×</span>
                      :<span onClick={e=>{e.stopPropagation();removeIt(cat,i,base.length);}} style={{color:"#e2e8f0",fontSize:20,cursor:"pointer",flexShrink:0,lineHeight:1}}>×</span>
                    }
                  </div>
                );
              })}
              {addingCat===`${packPerson}-${cat}`?(
                <div style={{display:"flex",gap:8,marginTop:9}}>
                  <input value={newItem} onChange={e=>setNewItem(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addIt(cat)} placeholder="Add item..." autoFocus
                    style={{flex:1,padding:"9px 12px",borderRadius:10,border:"1.5px solid #e2e8f0",fontSize:14,background:"#f8fafc"}}/>
                  <button onClick={()=>addIt(cat)} style={{padding:"9px 15px",background:S.navy,color:"white",border:"none",borderRadius:10,fontSize:14,fontWeight:700}}>+</button>
                  <button onClick={()=>{setAddingCat(null);setNewItem("");}} style={{padding:"9px 13px",background:"#f1f5f9",color:"#94a3b8",border:"none",borderRadius:10,fontSize:14}}>✕</button>
                </div>
              ):(
                <button onClick={()=>setAddingCat(`${packPerson}-${cat}`)} style={{width:"100%",marginTop:6,padding:"7px",background:"transparent",color:S.accent,border:"none",fontSize:13,fontWeight:700,textAlign:"left"}}>+ Add item</button>
              )}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── SEARCH TAB ────────────────────────────────────────────────────────────────
function SearchTab({setTab,setDayIdx,setPackPerson}){
  const [q,setQ]=useState("");
  const results=[];

  if(q.trim().length>=2){
    const lq=q.toLowerCase();
    ITINERARY.forEach((day,di)=>{
      const matchItem=day.items.find(it=>it.text.toLowerCase().includes(lq));
      const headMatch=[day.title,day.summary,day.city,day.lodging||"",day.transit||""].some(t=>t.toLowerCase().includes(lq));
      if(matchItem||headMatch){
        results.push({cat:"Trip",label:`${day.emoji} ${day.label} · ${day.city}`,text:matchItem?matchItem.text:day.title,icon:matchItem?(TYPE_ICONS[matchItem.type]||"📍"):day.emoji,bColor:matchItem?TYPE_BORDER[matchItem.type]:"#6366f1",action:()=>{setDayIdx(di);setTab("trip");}});
      }
    });
    Object.entries(DEFAULT_PRETRIP).forEach(([date,tasks])=>{
      tasks.forEach(task=>{if(task.text.toLowerCase().includes(lq))results.push({cat:"Pre-trip",label:fmtDate(date),text:task.text,icon:TYPE_ICONS[task.type]||"📋",bColor:TYPE_BORDER[task.type]||"#3b82f6",action:()=>setTab("today")});});
    });
    STILL_NEEDED_ITEMS.forEach(text=>{
      if(text.toLowerCase().includes(lq))results.push({cat:"Needed",label:"Still to book",text,icon:"🎟️",bColor:"#a855f7",action:()=>setTab("today")});
    });
    Object.entries(MASTER_PACKING).forEach(([cat,items])=>{
      items.forEach(item=>{if(item.toLowerCase().includes(lq))results.push({cat:"Pack",label:cat,text:item,icon:"🎒",bColor:"#10b981",action:()=>{setPackPerson("Master");setTab("pack");}});});
    });
    Object.entries(INDIVIDUAL_PACKING).forEach(([person,items])=>{
      items.forEach(item=>{if(item.toLowerCase().includes(lq))results.push({cat:`${person}'s Pack`,label:person,text:item,icon:"👜",bColor:"#10b981",action:()=>{setPackPerson(person);setTab("pack");}});});
    });
  }

  return(
    <div>
      <div style={{position:"relative",marginBottom:18}}>
        <span style={{position:"absolute",left:15,top:"50%",transform:"translateY(-50%)",fontSize:18,opacity:0.4,pointerEvents:"none"}}>🔍</span>
        <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search activities, packing, tasks…" autoFocus
          style={{width:"100%",padding:"14px 45px 14px 48px",...S.card,borderRadius:16,fontSize:16,boxSizing:"border-box",border:"1.5px solid #e2e8f0"}}/>

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App(){
  const phase=getPhase();
  const tripDayIdx=getTripDayIdx();
  const today=todayStr();

  const [tab,setTab]=useState("today");
  const [dayIdx,setDayIdx]=useState(tripDayIdx);
  const [preTripDate,setPreTripDate]=useState(today);
  const [customTasks,setCustomTasks]=useState({});
  const [checked,setChecked]=useState({});
  const [packChecked,setPackChecked]=useState({});
  const [customPackItems,setCustomPackItems]=useState({Master:{},Chris:{},McKenna:{},Sawyer:{},Pierce:{},Bennett:{}});
  const [deletedItems,setDeletedItems]=useState({});
  const [packPerson,setPackPerson]=useState("Master");
  const [addingTo,setAddingTo]=useState(null);
  const [taskText,setTaskText]=useState("");
  const [taskType,setTaskType]=useState("confirm");
  const [taskDate,setTaskDate]=useState(today);
  const [showCalendar,setShowCalendar]=useState(false);
  const [expandedDay,setExpandedDay]=useState(null);
  const [locLabel,setLocLabel]=useState(null);
  const [locError,setLocError]=useState(null);
  const [locLoading,setLocLoading]=useState(false);
  const [locAsked,setLocAsked]=useState(false);
  const [location,setLocation]=useState(null);
  const [syncStatus,setSyncStatus]=useState("idle");
  const [syncLabel,setSyncLabel]=useState("Tap to sync");
  const [lastBy,setLastBy]=useState(null);
  const [dayPlans,setDayPlans]=useState({});
  const [dayPlanStatus,setDayPlanStatus]=useState({});
  const [dayPlanError,setDayPlanError]=useState({});

  const reverseGeocode=async(lat,lng)=>{
    const fb=`${lat.toFixed(4)}, ${lng.toFixed(4)}`;
    try{const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`,{headers:{"Accept-Language":"en"},signal:AbortSignal.timeout(6000)});if(r.ok){const d=await r.json();const city=d.address?.city||d.address?.town||d.address?.village||d.address?.suburb||d.address?.county||"";const state=d.address?.state_code||d.address?.state||"";return city?`${city}, ${state}`:fb;}}catch{}return fb;
  };
  const requestLocation=()=>{
    if(!navigator.geolocation){setLocError("GPS not available");return;}
    setLocLoading(true);setLocError(null);setLocAsked(true);
    navigator.geolocation.getCurrentPosition(async pos=>{const{latitude:lat,longitude:lng}=pos.coords;setLocation({lat,lng});setLocLoading(false);setLocLabel(await reverseGeocode(lat,lng));},err=>{setLocLoading(false);if(err.code===1)setLocError("Location denied — check Settings");else setLocError("Location unavailable — tap Retry");},{enableHighAccuracy:true,timeout:15000,maximumAge:60000});
  };

  const getState=()=>({customTasks,checked,packChecked,customPackItems,deletedItems,dayPlans});
  const applyRemoteData=(data)=>{
    if(!data)return;
    if(data.customTasks)setCustomTasks(data.customTasks);
    if(data.checked)setChecked(data.checked);
    if(data.packChecked)setPackChecked(data.packChecked);
    if(data.customPackItems)setCustomPackItems(data.customPackItems);
    if(data.deletedItems)setDeletedItems(data.deletedItems);
    if(data.dayPlans)setDayPlans(data.dayPlans);
    if(data._by){setLastBy(data._by);setTimeout(()=>setLastBy(null),4000);}
  };
  const syncNow=async(patch)=>{
    setSyncStatus("saving");setSyncLabel("Saving…");
    const local=loadLocal();const merged={...local,...patch,_by:"Someone",_at:Date.now()};saveLocal(merged);
    const ok=await cloudSave(merged);
    if(ok){setSyncStatus("ok");setSyncLabel("Synced ✓");}else{setSyncStatus("local");setSyncLabel("Saved locally");}
  };
  const pullSync=async()=>{
    setSyncStatus("loading");setSyncLabel("Syncing…");
    const remote=await cloudLoad();
    if(remote){const local=loadLocal();if(!local._at||(remote._at&&remote._at>local._at)){applyRemoteData(remote);saveLocal(remote);}setSyncStatus("ok");setSyncLabel("Synced ✓");}
    else{const local=loadLocal();if(local)applyRemoteData(local);setSyncStatus("local");setSyncLabel("Offline — local data");}
  };
  useEffect(()=>{pullSync();},[]);
  useEffect(()=>{const id=setInterval(pullSync,20000);return()=>clearInterval(id);},[]);

  const toggleCheck=key=>{setChecked(p=>{const n={...p,[key]:!p[key]};syncNow({...getState(),checked:n});return n;});};
  const togglePack=key=>{setPackChecked(p=>{const n={...p,[key]:!p[key]};syncNow({...getState(),packChecked:n});return n;});};
  const deleteItem=key=>{if(!window.confirm("Delete this item permanently?"))return;setDeletedItems(p=>{const n={...p,[key]:true};syncNow({...getState(),deletedItems:n});return n;});};
  const handleAddTask=()=>{
    if(!taskText.trim())return;const target=taskDate||today;
    setCustomTasks(p=>{const n={...p,[target]:[...(p[target]||[]),{text:taskText.trim(),type:taskType}]};syncNow({...getState(),customTasks:n});return n;});
    setTaskText("");setAddingTo(null);
  };
  const removeTask=(date,idx)=>{if(!window.confirm("Remove this task?"))return;setCustomTasks(p=>{const n={...p,[date]:(p[date]||[]).filter((_,i)=>i!==idx)};syncNow({...getState(),customTasks:n});return n;});};
  const editTask=(date,idx,upd)=>{setCustomTasks(p=>{const n={...p,[date]:(p[date]||[]).map((t,i)=>i===idx?{...t,...upd}:t)};syncNow({...getState(),customTasks:n});return n;});};
  const updatePackItems=fn=>{setCustomPackItems(p=>{const n=typeof fn==="function"?fn(p):fn;syncNow({...getState(),customPackItems:n});return n;});};
  const openAddForm=dateKey=>{setAddingTo(dateKey);setTaskDate(dateKey);setTaskText("");setTaskType("confirm");};
  const allPreDates=()=>[...new Set([...Object.keys(DEFAULT_PRETRIP),...Object.keys(customTasks)])].sort();
  const tasksForDate=d=>({def:DEFAULT_PRETRIP[d]||[],cust:customTasks[d]||[]});
  const markedDates=allPreDates();

  const planDay=async(day,suggestion=null)=>{
    const allItems=[
      ...day.items.filter((_,j)=>!deletedItems[`itinerary-${day.date}-${j}`]).map(it=>it.text),
      ...(customTasks[day.date]||[]).map(t=>t.text),
    ];
    if(allItems.length<2)return;
    setDayPlanStatus(p=>({...p,[day.date]:"loading"}));
    try{
      if(!WORKER_URL||WORKER_URL.includes("YOUR-WORKER")){
        setDayPlanStatus(p=>({...p,[day.date]:"config"}));
        return;
      }
      const currentPlan=suggestion?dayPlans[day.date]?.plan:null;
      const resp=await fetch(WORKER_URL,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({city:day.city,date:day.label,activities:allItems,...(suggestion&&currentPlan?{suggestion,currentPlan}:{})}),
        signal:AbortSignal.timeout(30000),
      });
      if(!resp.ok){
        let detail="Status "+resp.status;
        try{const e=await resp.json();detail=e.detail||e.error||detail;}catch{}
        throw new Error(detail);
      }
      const result=await resp.json();
      if(!result.plan)throw new Error("Worker returned ok but no plan field");
      const newEntry={plan:result.plan,generatedAt:Date.now()};
      const newDayPlans={...dayPlans,[day.date]:newEntry};
      setDayPlans(newDayPlans);
      syncNow({customTasks,checked,packChecked,customPackItems,deletedItems,dayPlans:newDayPlans});
      setDayPlanStatus(p=>({...p,[day.date]:"done"}));
    }catch(e){
      console.error("planDay:",e);
      setDayPlanStatus(p=>({...p,[day.date]:"error"}));
      setDayPlanError(p=>({...p,[day.date]:e?.message||String(e)}));
    }
  };

  const TABS=[
    {id:"today",icon:"📋",label:phase==="pretrip"?"Pre-Trip":"Today"},
    {id:"trip",icon:"🗺️",label:"Trip"},
    {id:"pack",icon:"🎒",label:"Pack"},
    {id:"search",icon:"🔍",label:"Search"},
    {id:"nearby",icon:"📍",label:"Nearby"},
  ];

  const syncDot=syncStatus==="ok"?"#22c55e":syncStatus==="local"?"#fbbf24":"#93c5fd";

  return(
    <div style={{fontFamily:"-apple-system,BlinkMacSystemFont,'Inter',system-ui,sans-serif",background:"#eef1f7",minHeight:"100vh",maxWidth:480,margin:"0 auto",position:"relative"}}>

      {showCalendar&&<MiniCalendar markedDates={markedDates} selectedDate={taskDate} onSelect={d=>{setTaskDate(d);setShowCalendar(false);}} onClose={()=>setShowCalendar(false)}/>}

      {/* ── HEADER ── */}
      <div style={{background:"linear-gradient(155deg,#091d38 0%,#0f2c52 45%,#1a4b88 100%)",padding:"0 18px",color:"white",boxShadow:"0 4px 32px rgba(9,29,56,0.45)",position:"sticky",top:0,zIndex:100}}>
        <div style={{paddingTop:"max(16px, env(safe-area-inset-top))"}}>

          {/* Title row */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingBottom:10}}>
            <div>
              <div style={{fontSize:10,fontWeight:800,letterSpacing:"0.16em",opacity:0.55,textTransform:"uppercase",marginBottom:3}}>East Coast Family Trip</div>
              <div style={{fontSize:22,fontWeight:900,letterSpacing:"-0.5px",lineHeight:1}}>Jul 9 – 24, 2026</div>
            </div>
            <button onClick={pullSync} style={{background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:12,color:"white",padding:"8px 12px",cursor:"pointer",display:"flex",alignItems:"center",gap:6,backdropFilter:"blur(8px)"}}>
              <span style={{width:8,height:8,borderRadius:"50%",background:syncDot,display:"inline-block",flexShrink:0,boxShadow:`0 0 6px ${syncDot}`}}/>
              <span style={{fontSize:12,fontWeight:600,opacity:0.85}}>↻ {syncLabel}</span>
            </button>
          </div>

          {lastBy&&<div style={{fontSize:11,opacity:0.55,marginBottom:6}}>✨ {lastBy} just updated</div>}

          {/* Location bar */}
          <div style={{display:"flex",alignItems:"center",gap:7,background:"rgba(255,255,255,0.1)",borderRadius:12,padding:"8px 13px",marginBottom:10,fontSize:13,minHeight:38,backdropFilter:"blur(8px)"}}>
            {!locAsked&&!locLabel&&!locLoading&&(
              <div style={{display:"flex",alignItems:"center",width:"100%",gap:6}}>
                <button onClick={requestLocation} style={{background:"none",border:"none",color:"white",fontSize:13,cursor:"pointer",padding:0,display:"flex",alignItems:"center",gap:7,opacity:0.8,flex:1}}>
                  <span style={{fontSize:16}}>📍</span><span style={{fontWeight:500}}>Tap to enable location</span>
                </button>
                <button onClick={()=>setLocAsked(true)} style={{background:"rgba(255,255,255,0.15)",border:"none",borderRadius:"50%",width:22,height:22,display:"flex",alignItems:"center",justifyContent:"center",color:"rgba(255,255,255,0.6)",fontSize:14,lineHeight:1,padding:0,flexShrink:0}}>×</button>
              </div>
            )}
            {locLoading&&<><span>📍</span><span style={{opacity:0.7}}>Finding your location…</span></>}
            {locLabel&&!locError&&(
              <><span style={{fontSize:16}}>📍</span><span style={{fontWeight:600,flex:1}}>{locLabel}</span>
              <button onClick={requestLocation} style={{background:"none",border:"none",color:"rgba(255,255,255,0.5)",fontSize:13,cursor:"pointer",padding:0}}>🔄</button>
              <a href={`https://maps.google.com/?q=${location?.lat},${location?.lng}`} target="_blank" rel="noreferrer" style={{color:"rgba(255,255,255,0.75)",fontSize:12,textDecoration:"none",fontWeight:700,marginLeft:4,background:"rgba(255,255,255,0.15)",padding:"3px 9px",borderRadius:8}}>Map →</a></>
            )}
            {locError&&(
              <><span style={{fontSize:16}}>📍</span><span style={{opacity:0.7,fontSize:12,flex:1}}>{locError}</span>
              <button onClick={requestLocation} style={{background:"rgba(255,255,255,0.18)",border:"none",borderRadius:8,color:"white",fontSize:12,padding:"4px 10px",cursor:"pointer",flexShrink:0,fontWeight:600}}>Retry</button></>
            )}
          </div>

          {/* ── TAB BAR (top, inside header) ── */}
          <div style={{display:"flex",paddingBottom:12,marginLeft:-6,marginRight:-6}}>
            {TABS.map(t=>{
              const isActive=tab===t.id;
              return(
                <button key={t.id} onClick={()=>setTab(t.id)} style={{
                  flex:1,padding:"8px 4px",border:"none",cursor:"pointer",
                  background:isActive?"rgba(255,255,255,0.16)":"transparent",
                  borderRadius:13,display:"flex",flexDirection:"column",alignItems:"center",gap:3,
                  transition:"background 0.15s",
                }}>
                  <span style={{fontSize:19,lineHeight:1,opacity:isActive?1:0.45}}>{t.icon}</span>
                  <span style={{fontSize:10,fontWeight:isActive?800:500,color:isActive?"white":"rgba(255,255,255,0.45)",lineHeight:1,letterSpacing:"0.01em"}}>{t.label}</span>
                  {isActive&&<div style={{width:16,height:2.5,borderRadius:99,background:"rgba(255,255,255,0.65)",marginTop:1}}/>}
                </button>
              );
            })}
          </div>

        </div>
      </div>

      {/* ── SCROLL CONTENT ── */}
      <div style={{padding:"18px 16px",paddingBottom:"calc(28px + env(safe-area-inset-bottom, 0px))"}} key={tab}>

        {/* PRE-TRIP / TODAY */}
        {tab==="today"&&(
          <div style={{animation:"fadeUp 0.22s ease"}}>
            {phase==="pretrip"&&(()=>{
              const{def,cust}=tasksForDate(preTripDate);
              const hasTasks=def.length+cust.length>0;
              return(
                <div>
                  {/* Date nav */}
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
                    <button onClick={()=>{const d=new Date(preTripDate+"T12:00:00");d.setDate(d.getDate()-1);const s=d.toISOString().split("T")[0];if(s>=today)setPreTripDate(s);}}
                      disabled={preTripDate<=today} style={{width:40,height:40,borderRadius:13,...S.cardSm,border:"none",fontSize:18,color:"#64748b",opacity:preTripDate<=today?0.3:1,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
                    <div style={{flex:1,textAlign:"center"}}>
                      <div style={{fontWeight:800,fontSize:15,color:S.navy}}>{preTripDate===today?"📋 Today's To-Dos":`📋 ${fmtDate(preTripDate)}`}</div>
                      {preTripDate!==today&&<div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>{getDaysBetween(preTripDate)>0?`in ${getDaysBetween(preTripDate)} days`:`${Math.abs(getDaysBetween(preTripDate))} days ago`}</div>}
                    </div>
                    <button onClick={()=>{const d=new Date(preTripDate+"T12:00:00");d.setDate(d.getDate()+1);const s=d.toISOString().split("T")[0];if(s<TRIP_START)setPreTripDate(s);}}
                      disabled={preTripDate>=new Date(new Date(TRIP_START+"T12:00:00").getTime()-86400000).toISOString().split("T")[0]}
                      style={{width:40,height:40,borderRadius:13,...S.cardSm,border:"none",fontSize:18,color:"#64748b",display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
                  </div>

                  {preTripDate===today&&<CountdownCard/>}

                  {/* Overdue rollover */}
                  {preTripDate===today&&(()=>{
                    const rollover=[];
                    Object.entries(DEFAULT_PRETRIP).forEach(([date,tasks])=>{if(date<today)tasks.forEach((t,i)=>{if(!checked[`${date}-def-${i}`]&&!deletedItems[`pretrip-def-${date}-${i}`])rollover.push({...t,_checkKey:`${date}-def-${i}`,_delKey:`pretrip-def-${date}-${i}`,_dateLabel:fmtDate(date)});});});
                    Object.entries(customTasks).forEach(([date,tasks])=>{if(date<today)tasks.forEach((t,i)=>{if(!checked[`${date}-cust-${i}`]&&!deletedItems[`pretrip-cust-${date}-${i}`])rollover.push({...t,_checkKey:`${date}-cust-${i}`,_delKey:`pretrip-cust-${date}-${i}`,_dateLabel:fmtDate(date)});});});
                    STILL_NEEDED_ITEMS.forEach((text,i)=>{if(!checked[`booking-${i}`]&&!deletedItems[`stillneeded-${i}`])rollover.push({text,type:"booking",_checkKey:`booking-${i}`,_delKey:`stillneeded-${i}`,_dateLabel:"Still needed"});});
                    if(!rollover.length)return null;
                    return(
                      <div style={{marginBottom:16}}>
                        <div style={{fontSize:11,fontWeight:800,color:"#f97316",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:9}}>⚠️ Overdue — Rolled Forward</div>
                        {rollover.map((item,idx)=>(
                          <div key={idx} style={{display:"flex",alignItems:"flex-start",gap:12,...S.cardSm,padding:"13px 14px 13px 15px",marginBottom:8,borderLeft:"4px solid #f97316",background:"#fffbf7"}}>
                            <div onClick={()=>toggleCheck(item._checkKey)} style={{width:24,height:24,borderRadius:7,border:"2px solid #fed7aa",background:"white",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1,cursor:"pointer"}}/>
                            <div style={{flex:1,cursor:"pointer"}} onClick={()=>toggleCheck(item._checkKey)}>
                              <div style={{fontSize:15,color:"#7c2d12",lineHeight:1.4}}><span style={{marginRight:6}}>{TYPE_ICONS[item.type]||"•"}</span>{item.text}</div>
                              <div style={{fontSize:11,color:"#d97706",marginTop:3,fontWeight:600}}>{item._dateLabel}</div>
                            </div>
                            <span onClick={()=>deleteItem(item._delKey)} style={{color:"#e2e8f0",fontSize:22,cursor:"pointer",lineHeight:1,padding:"0 2px"}}>×</span>
                          </div>
                        ))}
                      </div>
                    );
                  })()}

                  {hasTasks?(
                    <>
                      <div style={{...S.label,marginBottom:9}}>{preTripDate===today?"Due Today":"Tasks for this date"}</div>
                      {def.map((t,i)=>deletedItems[`pretrip-def-${preTripDate}-${i}`]?null:<TaskItem key={`d${i}`} task={t} checkKey={`${preTripDate}-def-${i}`} checked={checked} onToggle={toggleCheck} onRemove={()=>deleteItem(`pretrip-def-${preTripDate}-${i}`)}/>)}
                      {cust.map((t,i)=><TaskItem key={`c${i}`} task={t} checkKey={`${preTripDate}-cust-${i}`} checked={checked} onToggle={toggleCheck} onRemove={()=>removeTask(preTripDate,i)} onEdit={u=>editTask(preTripDate,i,u)}/>)}
                    </>
                  ):(
                    <div style={{...S.card,padding:"26px 18px",textAlign:"center",marginBottom:12}}>
                      <div style={{fontSize:36,marginBottom:10}}>{preTripDate===today?"🌴":"📭"}</div>
                      <div style={{fontWeight:800,fontSize:15,color:"#1e293b"}}>{preTripDate===today?"Nothing due today!":"No tasks on this date"}</div>
                      <div style={{fontSize:13,color:"#94a3b8",marginTop:5}}>{preTripDate===today?"Enjoy the calm before the adventure.":"Add one below, or browse with ‹ ›"}</div>
                    </div>
                  )}

                  {addingTo===preTripDate?(
                    <AddTaskForm taskText={taskText} setTaskText={setTaskText} taskType={taskType} setTaskType={setTaskType} onAdd={handleAddTask} onCancel={()=>{setAddingTo(null);setTaskText("");}}/>
                  ):(
                    <button onClick={()=>openAddForm(preTripDate)} style={{width:"100%",padding:"13px",...S.cardSm,background:"white",color:S.navy,border:"2px dashed #cbd5e1",fontSize:14,fontWeight:700,marginBottom:14,boxShadow:"none"}}>+ Add a task</button>
                  )}

                  {preTripDate===today&&(()=>{
                    const up=allPreDates().filter(d=>d>today).slice(0,2);
                    if(!up.length)return null;
                    return(
                      <div style={{...S.card,padding:"15px 17px"}}>
                        <div style={{...S.label,marginBottom:11}}>Coming Up</div>
                        {up.map(d=>{
                          const{def:df,cust:ct}=tasksForDate(d);const tot=df.length+ct.length;
                          return(
                            <div key={d} onClick={()=>setPreTripDate(d)} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:"1px solid #f8fafc",cursor:"pointer"}}>
                              <div style={{width:46,textAlign:"center",background:"#eff6ff",borderRadius:12,padding:"5px 0"}}>
                                <div style={{fontSize:11,fontWeight:700,color:"#64748b"}}>{fmtDate(d).split(",")[0]}</div>
                                <div style={{fontSize:11,color:S.accent,fontWeight:800}}>in {getDaysBetween(d)}d</div>
                              </div>
                              <div style={{flex:1}}>
                                <div style={{fontSize:14,color:"#1e293b",fontWeight:700}}>{tot} task{tot!==1?"s":""} due</div>
                                <div style={{fontSize:12,color:"#94a3b8",marginTop:1}}>{(df[0]||ct[0])?.text?.slice(0,44)}…</div>
                              </div>
                              <div style={{color:"#d1d5db",fontSize:18}}>›</div>
                            </div>
                          );
                        })}
                      </div>
                    );
                  })()}

                  {preTripDate!==today&&<button onClick={()=>setPreTripDate(today)} style={{width:"100%",marginTop:10,padding:"13px",background:S.navy,color:"white",border:"none",borderRadius:14,fontSize:14,fontWeight:700,boxShadow:"0 4px 14px rgba(15,36,68,0.3)"}}>Back to Today</button>}
                </div>
              );
            })()}

            {phase==="trip"&&(
              <div>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
                  <button onClick={()=>setDayIdx(Math.max(0,dayIdx-1))} disabled={dayIdx===0} style={{width:40,height:40,borderRadius:13,...S.cardSm,border:"none",fontSize:18,color:"#64748b",opacity:dayIdx===0?0.3:1,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
                  <div style={{flex:1,textAlign:"center"}}>
                    <div style={{fontWeight:800,fontSize:15,color:S.navy}}>{ITINERARY[dayIdx].emoji} {ITINERARY[dayIdx].label} — {ITINERARY[dayIdx].city}</div>
                    <div style={{fontSize:11,color:getDaysBetween(ITINERARY[dayIdx].date)===0?S.accent:"#94a3b8",marginTop:2,fontWeight:getDaysBetween(ITINERARY[dayIdx].date)===0?700:400}}>{getDaysBetween(ITINERARY[dayIdx].date)===0?"Today!":getDaysBetween(ITINERARY[dayIdx].date)>0?`in ${getDaysBetween(ITINERARY[dayIdx].date)} days`:`${Math.abs(getDaysBetween(ITINERARY[dayIdx].date))} days ago`}</div>
                  </div>
                  <button onClick={()=>setDayIdx(Math.min(ITINERARY.length-1,dayIdx+1))} disabled={dayIdx===ITINERARY.length-1} style={{width:40,height:40,borderRadius:13,...S.cardSm,border:"none",fontSize:18,color:"#64748b",opacity:dayIdx===ITINERARY.length-1?0.3:1,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
                </div>
                <div style={{...S.card,padding:"16px 18px",marginBottom:12}}>
                  <div style={{fontWeight:900,fontSize:20,color:S.navy,letterSpacing:"-0.3px"}}>{ITINERARY[dayIdx].title}</div>
                  <div style={{fontSize:13,color:"#64748b",marginTop:4,lineHeight:1.5}}>{ITINERARY[dayIdx].summary}</div>
                  {ITINERARY[dayIdx].lodging&&<div style={{marginTop:10,fontSize:12,color:"#475569",background:"#f8fafc",borderRadius:10,padding:"8px 12px",fontWeight:500}}>🏨 {ITINERARY[dayIdx].lodging}</div>}
                  {ITINERARY[dayIdx].transit&&<div style={{marginTop:7,fontSize:12,color:"#475569",background:"#f8fafc",borderRadius:10,padding:"8px 12px",fontWeight:500}}>🚌 {ITINERARY[dayIdx].transit}</div>}
                </div>
                {ITINERARY[dayIdx].confirmations?.map((c,i)=>(
                  <div key={i} style={{background:"#eff6ff",borderRadius:14,padding:"12px 16px",marginBottom:9,border:"1.5px solid #bfdbfe"}}>
                    <div style={{fontWeight:700,fontSize:13,color:"#1e40af"}}>✅ {c.label}</div>
                    <div style={{fontSize:12,color:"#3b5ba5",marginTop:3}}>{c.detail}</div>
                  </div>
                ))}
                <div style={{...S.label,marginBottom:9}}>Plan for the day</div>
                {ITINERARY[dayIdx].items.map((it,i)=>deletedItems[`itinerary-${ITINERARY[dayIdx].date}-${i}`]?null:<TaskItem key={i} task={it} checkKey={`trip-${ITINERARY[dayIdx].date}-${i}`} checked={checked} onToggle={toggleCheck} onRemove={()=>deleteItem(`itinerary-${ITINERARY[dayIdx].date}-${i}`)}/>)}
                {(customTasks[ITINERARY[dayIdx].date]||[]).map((t,i)=>(
                  <TaskItem key={`c${i}`} task={t} checkKey={`trip-${ITINERARY[dayIdx].date}-c${i}`} checked={checked} onToggle={toggleCheck} onRemove={()=>removeTask(ITINERARY[dayIdx].date,i)} onEdit={u=>editTask(ITINERARY[dayIdx].date,i,u)}/>
                ))}
                <PlanMyDaySection day={ITINERARY[dayIdx]} dayPlans={dayPlans} dayPlanStatus={dayPlanStatus} dayPlanError={dayPlanError} planDay={planDay} customTasks={customTasks}/>
                {addingTo===ITINERARY[dayIdx].date?(
                  <AddTaskForm taskText={taskText} setTaskText={setTaskText} taskType={taskType} setTaskType={setTaskType} onAdd={handleAddTask} onCancel={()=>{setAddingTo(null);setTaskText("");}}/>
                ):(
                  <button onClick={()=>openAddForm(ITINERARY[dayIdx].date)} style={{width:"100%",padding:"13px",...S.cardSm,background:"white",color:S.navy,border:"2px dashed #cbd5e1",fontSize:14,fontWeight:700,marginBottom:12,boxShadow:"none"}}>+ Add a task</button>
                )}
                {dayIdx!==tripDayIdx&&<button onClick={()=>setDayIdx(tripDayIdx)} style={{width:"100%",padding:"13px",background:S.navy,color:"white",border:"none",borderRadius:14,fontSize:14,fontWeight:700,boxShadow:"0 4px 14px rgba(15,36,68,0.3)"}}>Jump to Today</button>}
              </div>
            )}

            {phase==="posttrip"&&(
              <div style={{textAlign:"center",padding:"56px 20px"}}>
                <div style={{fontSize:60,marginBottom:14}}>🏠</div>
                <div style={{fontWeight:900,fontSize:24,color:S.navy}}>Trip Complete!</div>
                <div style={{fontSize:15,color:"#94a3b8",marginTop:8}}>Hope it was amazing. 🌊🗽🍫</div>
              </div>
            )}
          </div>
        )}

        {/* TRIP TAB */}
        {tab==="trip"&&(
          <div style={{animation:"fadeUp 0.22s ease"}}>
            <div style={{...S.label,margin:"4px 0 5px"}}>Full Trip Plan</div>
            <div style={{fontSize:12,color:"#94a3b8",marginBottom:14}}>Tap any day to expand · add or edit tasks</div>
            {ITINERARY.map((day,i)=>{
              const diff=getDaysBetween(day.date);
              const isPast=diff<0,isToday=diff===0,isOpen=expandedDay===i;
              const cust=customTasks[day.date]||[];
              const total=day.items.length+cust.length;
              const done=[...day.items.map((_,j)=>checked[`trip-${day.date}-${j}`]),...cust.map((_,j)=>checked[`trip-${day.date}-c${j}`])].filter(Boolean).length;
              return(
                <div key={i} style={{...S.card,marginBottom:10,overflow:"hidden",borderLeft:isToday?"4px solid "+S.accent:"4px solid transparent"}}>
                  <div onClick={()=>setExpandedDay(isOpen?null:i)} style={{display:"flex",alignItems:"center",gap:11,padding:"14px 16px",cursor:"pointer",background:isToday?"#eff6ff":isPast?"#fafafa":"white"}}>
                    <div style={{fontSize:24,flexShrink:0}}>{day.emoji}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                        <div style={{fontWeight:800,fontSize:14,color:isPast?"#cbd5e1":S.navy}}>{day.label}</div>
                        {isToday&&<span style={{fontSize:10,fontWeight:800,color:"white",background:S.accent,borderRadius:6,padding:"2px 8px"}}>TODAY</span>}
                        {!isPast&&!isToday&&diff<=5&&<span style={{fontSize:10,fontWeight:800,color:"#f97316",background:"#fff7ed",borderRadius:6,padding:"2px 7px"}}>in {diff}d</span>}
                      </div>
                      <div style={{fontSize:12,color:isPast?"#d1d5db":"#64748b",marginTop:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{day.title}</div>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:7,flexShrink:0}}>
                      {done>0&&<div style={{fontSize:12,color:"#22c55e",fontWeight:800}}>{done}/{total}</div>}
                      <div style={{color:"#d1d5db",fontSize:18,transition:"transform 0.2s",transform:isOpen?"rotate(90deg)":"none"}}>›</div>
                    </div>
                  </div>
                  {isOpen&&(
                    <div style={{padding:"0 16px 16px",borderTop:"1px solid #f8fafc"}}>
                      <div style={{display:"flex",gap:6,flexWrap:"wrap",margin:"12px 0 10px"}}>
                        {day.lodging&&<div style={{fontSize:11,background:"#eff6ff",color:"#1e40af",borderRadius:8,padding:"4px 10px",fontWeight:600}}>🏨 {day.lodging}</div>}
                        {day.transit&&<div style={{fontSize:11,background:"#f0fdf4",color:"#166534",borderRadius:8,padding:"4px 10px",fontWeight:600}}>🚌 {day.transit}</div>}
                      </div>
                      {day.confirmations?.map((c,ci)=>(
                        <div key={ci} style={{background:"#eff6ff",borderRadius:11,padding:"10px 14px",marginBottom:9,border:"1px solid #bfdbfe"}}>
                          <div style={{fontWeight:700,fontSize:12,color:"#1e40af"}}>✅ {c.label}</div>
                          <div style={{fontSize:11,color:"#3b5ba5",marginTop:2}}>{c.detail}</div>
                        </div>
                      ))}
                      <div style={{...S.label,marginBottom:8}}>Activities</div>
                      {day.items.map((it,j)=>deletedItems[`itinerary-${day.date}-${j}`]?null:<TaskItem key={j} task={it} checkKey={`trip-${day.date}-${j}`} checked={checked} onToggle={toggleCheck} onRemove={()=>deleteItem(`itinerary-${day.date}-${j}`)}/>)}
                      {cust.length>0&&<div style={{...S.label,margin:"10px 0 8px"}}>Added by family</div>}
                      {cust.map((t,j)=>(
                        <TaskItem key={`c${j}`} task={t} checkKey={`trip-${day.date}-c${j}`} checked={checked} onToggle={toggleCheck} onRemove={()=>removeTask(day.date,j)} onEdit={u=>editTask(day.date,j,u)}/>
                      ))}
                      <PlanMyDaySection day={day} dayPlans={dayPlans} dayPlanStatus={dayPlanStatus} dayPlanError={dayPlanError} planDay={planDay} customTasks={customTasks}/>
                      {addingTo===day.date?(
                        <AddTaskForm taskText={taskText} setTaskText={setTaskText} taskType={taskType} setTaskType={setTaskType} onAdd={handleAddTask} onCancel={()=>{setAddingTo(null);setTaskText("");}}/>
                      ):(
                        <button onClick={()=>openAddForm(day.date)} style={{width:"100%",marginTop:9,padding:"11px",background:"#f8fafc",color:S.blue,border:"2px dashed #cbd5e1",borderRadius:12,fontSize:13,fontWeight:700}}>+ Add task to this day</button>
                      )}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}

        {/* PACK TAB */}
        {tab==="pack"&&(
          <div style={{animation:"fadeUp 0.22s ease"}}>
            <PackingTab packChecked={packChecked} onTogglePack={togglePack} customPackItems={customPackItems} setCustomPackItems={updatePackItems} packPerson={packPerson} setPackPerson={setPackPerson} deletedItems={deletedItems} onDeleteItem={deleteItem}/>
          </div>
        )}

        {/* SEARCH TAB */}
        {tab==="search"&&(
          <div style={{animation:"fadeUp 0.22s ease"}}>
            <SearchTab setTab={setTab} setDayIdx={setDayIdx} setPackPerson={setPackPerson}/>
          </div>
        )}

        {/* NEARBY TAB */}
        {tab==="nearby"&&(
          <div style={{animation:"fadeUp 0.22s ease"}}>
            <NearbyTab tripDayIdx={tripDayIdx}/>
          </div>
        )}

      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
