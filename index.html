const todayStr=()=>new Date().toISOString().split("T")[0];
const getDaysBetween=d=>{const t=new Date();t.setHours(0,0,0,0);const x=new Date(d);x.setHours(0,0,0,0);return Math.round((x-t)/86400000);};
const getPhase=()=>{const t=todayStr();if(t<TRIP_START)return"pretrip";if(t>TRIP_END)return"posttrip";return"trip";};
const getTripDayIdx=()=>{const t=todayStr();const i=ITINERARY.findIndex(d=>d.date===t);return i>=0?i:0;};
const fmtDate=d=>new Date(d+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});

const LS_KEY="trip2026_local";
function loadLocal(){try{const s=localStorage.getItem(LS_KEY);return s?JSON.parse(s):{};}catch{return{};}}
function saveLocal(data){try{localStorage.setItem(LS_KEY,JSON.stringify(data));}catch{}}

const JSONBIN_URL=`https://api.jsonbin.io/v3/b/${BIN_ID}`;
const JSONBIN_HEADERS={"Content-Type":"application/json","X-Master-Key":BIN_KEY,"X-Bin-Meta":false};

async function cloudLoad(){

}

}

function TaskItem({task,checkKey,checked,onToggle,onRemove,onEdit}){
  const [editing,setEditing]=useState(false);
  const [editText,setEditText]=useState(task.text);
  const [editType,setEditType]=useState(task.type);
  const done=!!checked[checkKey];
  const colors=TYPE_COLORS[task.type]||TYPE_COLORS.tip;
  const save=()=>{if(editText.trim())onEdit&&onEdit({text:editText.trim(),type:editType});setEditing(false);};
  if(editing) return(
    <div style={{background:"#f0f6ff",borderRadius:12,padding:"12px 14px",marginBottom:8,border:"1px solid #93c5fd"}}>
      <input value={editText} onChange={e=>setEditText(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")save();if(e.key==="Escape")setEditing(false);}} autoFocus
        style={{width:"100%",padding:"9px 12px",borderRadius:10,border:"1px solid #93c5fd",fontSize:15,marginBottom:8,boxSizing:"border-box"}}/>
      <div style={{display:"flex",gap:5,marginBottom:8,flexWrap:"wrap"}}>
        {[["booking","🎟️"],["confirm","📞"],["pack","🎒"],["activity","🎯"],["food","🍽️"],["tip","💡"]].map(([v,ic])=>(
          <button key={v} onClick={()=>setEditType(v)} style={{padding:"4px 10px",borderRadius:20,border:"1px solid",fontSize:12,cursor:"pointer",fontWeight:editType===v?700:400,background:editType===v?"#1a3a5c":"white",color:editType===v?"white":"#555",borderColor:editType===v?"#1a3a5c":"#ddd"}}>{ic} {v}</button>
        ))}
      </div>
      <div style={{display:"flex",gap:8}}>
        <button onClick={save} style={{flex:1,padding:"9px",background:"#1a3a5c",color:"white",border:"none",borderRadius:10,fontSize:14,fontWeight:600,cursor:"pointer"}}>Save</button>
        <button onClick={()=>setEditing(false)} style={{padding:"9px 14px",background:"white",color:"#666",border:"1px solid #ddd",borderRadius:10,fontSize:14,cursor:"pointer"}}>Cancel</button>
      </div>
    </div>
  );
  return(
    <div style={{display:"flex",alignItems:"flex-start",gap:10,background:done?"#f9fafb":colors.bg,border:`1px solid ${done?"#e5e7eb":colors.border}`,borderRadius:12,padding:"12px 13px",marginBottom:8,transition:"background 0.2s"}}>
      <div onClick={()=>onToggle(checkKey)} style={{width:24,height:24,borderRadius:7,border:done?"none":`2px solid ${colors.border}`,background:done?"#6b7280":"white",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1,cursor:"pointer",transition:"background 0.15s"}}>
        {done&&<span style={{color:"white",fontSize:14,fontWeight:800}}>✓</span>}
      </div>
      <div style={{flex:1,fontSize:15,color:done?"#9ca3af":colors.text,lineHeight:1.45,textDecoration:done?"line-through":"none",cursor:"pointer"}} onClick={()=>onToggle(checkKey)}>
        <span style={{marginRight:5}}>{TYPE_ICONS[task.type]||"•"}</span>{task.text}
      </div>
      <div style={{display:"flex",gap:6,flexShrink:0,alignItems:"center"}}>
        {onEdit&&!done&&<span onClick={()=>{setEditText(task.text);setEditType(task.type);setEditing(true);}} style={{fontSize:15,cursor:"pointer",opacity:0.35}}>✏️</span>}
        {!onEdit&&!onRemove&&<span style={{fontSize:12,opacity:0.12}}>🔒</span>}
        {onRemove&&<span onClick={onRemove} style={{color:"#d1d5db",fontSize:22,cursor:"pointer",lineHeight:1,padding:"0 2px"}}>×</span>}
      </div>
    </div>
  );
}

function MiniCalendar({markedDates,onSelect,selectedDate,onClose}){
  const [vy,setVy]=useState(2026);
  const [vm,setVm]=useState(5);
  const dim=new Date(vy,vm+1,0).getDate();
  const fd=new Date(vy,vm,1).getDay();
  const mn=new Date(vy,vm,1).toLocaleDateString("en-US",{month:"long",year:"numeric"});
  const cells=[];for(let i=0;i<fd;i++)cells.push(null);for(let d=1;d<=dim;d++)cells.push(d);
  const pm=()=>vm===0?setVm(11)||setVy(y=>y-1):setVm(m=>m-1);
  const nm=()=>vm===11?setVm(0)||setVy(y=>y+1):setVm(m=>m+1);
  const td=todayStr();
  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"white",borderRadius:22,padding:20,width:"100%",maxWidth:340,boxShadow:"0 16px 56px rgba(0,0,0,0.28)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <button onClick={pm} style={{width:36,height:36,borderRadius:10,border:"1px solid #eee",background:"white",cursor:"pointer",fontSize:18}}>‹</button>
          <div style={{fontWeight:700,fontSize:16,color:"#1a3a5c"}}>{mn}</div>
          <button onClick={nm} style={{width:36,height:36,borderRadius:10,border:"1px solid #eee",background:"white",cursor:"pointer",fontSize:18}}>›</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
          {["Su","Mo","Tu","We","Th","Fr","Sa"].map(d=><div key={d} style={{textAlign:"center",fontSize:11,fontWeight:600,color:"#aaa",padding:"2px 0"}}>{d}</div>)}
          {cells.map((day,i)=>{
            if(!day)return<div key={`e${i}`}/>;
            const ds=`${vy}-${String(vm+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
            const isTrip=ds>=TRIP_START&&ds<=TRIP_END;
            const isMarked=markedDates.includes(ds);
            const isToday=ds===td,isSel=ds===selectedDate,isPast=ds<td;
            return(
              <div key={day} onClick={()=>!isPast&&onSelect(ds)}
                style={{textAlign:"center",padding:"6px 2px",borderRadius:8,fontSize:14,fontWeight:isMarked||isToday?700:400,
                  background:isSel?"#1a3a5c":isTrip?"#e8f4fd":isMarked?"#fef0ff":"transparent",
                  color:isSel?"white":isPast?"#ccc":isToday?"#2d7dd2":"#333",cursor:isPast?"default":"pointer",
                  border:isMarked&&!isSel?"2px solid #e8b4f5":isToday&&!isSel?"2px solid #2d7dd2":"2px solid transparent"}}>
                {day}
              </div>
            );
          })}
        </div>
        <button onClick={onClose} style={{width:"100%",marginTop:14,padding:"12px",background:"#f0f4f8",border:"none",borderRadius:12,fontSize:14,fontWeight:600,cursor:"pointer",color:"#555"}}>Close</button>
      </div>
    </div>
  );
}

function PackingTab({packChecked,onTogglePack,customPackItems,setCustomPackItems,packPerson,setPackPerson,deletedItems,onDeleteItem}){
  const [addingCat,setAddingCat]=useState(null);
  const [newItem,setNewItem]=useState("");
  const persons=["Master","Chris","McKenna","Sawyer","Pierce","Bennett"];
  const packData=packPerson==="Master"?MASTER_PACKING:{[`👤 ${packPerson}`]:INDIVIDUAL_PACKING[packPerson]||[]};
  const custom=customPackItems[packPerson]||{};
  const isBaseDeleted=(cat,i)=>!!deletedItems[`pack-base-${packPerson}-${cat}-${i}`];
  const total=Object.entries(packData).reduce((a,[c,it])=>a+it.filter((_,i)=>!isBaseDeleted(c,i)).length+((custom[c]||[]).length),0);
  const done=Object.entries(packData).reduce((a,[c,it])=>{
    const cust2=custom[c]||[];
    const all=[...it,...cust2];
    return a+all.filter((_,i)=>{const isBase=i<it.length;return(!isBase||!isBaseDeleted(c,i))&&packChecked[`pack-${packPerson}-${c}-${i}`];}).length;
  },0);
  const pct=total>0?Math.round((done/total)*100):0;
  const addIt=(cat)=>{if(!newItem.trim())return;setCustomPackItems(p=>({...p,[packPerson]:{...(p[packPerson]||{}),[cat]:[...((p[packPerson]||{})[cat]||[]),newItem.trim()]}}));setNewItem("");setAddingCat(null);};
  const removeIt=(cat,idx,bl)=>{const ci=idx-bl;setCustomPackItems(p=>({...p,[packPerson]:{...(p[packPerson]||{}),[cat]:((p[packPerson]||{})[cat]||[]).filter((_,i)=>i!==ci)}}));};
  return(
    <div>
      <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:8,marginBottom:12}}>
        {persons.map(p=>(
          <button key={p} onClick={()=>setPackPerson(p)} style={{whiteSpace:"nowrap",padding:"7px 16px",borderRadius:22,border:"1px solid",fontSize:13,fontWeight:packPerson===p?700:400,cursor:"pointer",background:packPerson===p?"#1a3a5c":"white",color:packPerson===p?"white":"#555",borderColor:packPerson===p?"#1a3a5c":"#ddd",flexShrink:0}}>
            {p==="Master"?"📋 Master":p==="Chris"?"👨 Chris":p==="McKenna"?"👩 McKenna":`👦 ${p}`}
          </button>
        ))}
      </div>
      <div style={{background:"white",borderRadius:16,padding:"14px 16px",marginBottom:12,boxShadow:"0 2px 12px rgba(0,0,0,0.08)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div style={{fontWeight:700,fontSize:15,color:"#1a3a5c"}}>{packPerson==="Master"?"Family Pack List":`${packPerson}'s List`}</div>
          <div style={{fontSize:14,fontWeight:700,color:pct===100?"#166534":"#2d7dd2"}}>{done}/{total}</div>
        </div>
        <div style={{background:"#f0f4f8",borderRadius:99,height:9,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${pct}%`,background:pct===100?"#22c55e":"linear-gradient(90deg,#2d7dd2,#7c3aed)",borderRadius:99,transition:"width 0.4s"}}/>
        </div>
        {pct===100&&<div style={{fontSize:13,color:"#166534",marginTop:6,textAlign:"center",fontWeight:600}}>🎉 All packed!</div>}
      </div>
      {Object.entries(packData).map(([cat,base])=>{
        const cust=(custom[cat]||[]);
        const all=[...base,...cust];
        const activeAll=all.filter((_,i)=>!(i<base.length&&isBaseDeleted(cat,i)));
        const cd=activeAll.filter((_,i2)=>{const origI=all.indexOf(activeAll[i2]);return packChecked[`pack-${packPerson}-${cat}-${origI}`];}).length;
        return(
          <div key={cat} style={{background:"white",borderRadius:16,marginBottom:10,overflow:"hidden",boxShadow:"0 2px 10px rgba(0,0,0,0.07)"}}>
            <div style={{background:"#f8f9fa",padding:"10px 15px",borderBottom:"1px solid #f0f0f0",display:"flex",justifyContent:"space-between"}}>
              <div style={{fontWeight:700,fontSize:14,color:"#1a3a5c"}}>{cat}</div>
              <div style={{fontSize:13,color:"#888"}}>{cd}/{activeAll.length}</div>
            </div>
            <div style={{padding:"8px 15px"}}>
              {all.map((item,i)=>{
                const isBase=i<base.length;
                if(isBase&&isBaseDeleted(cat,i))return null;
                const key=`pack-${packPerson}-${cat}-${i}`;
                const dk=!!packChecked[key];
                const visibleAll=all.filter((_,j)=>!(j<base.length&&isBaseDeleted(cat,j)));
                const visIdx=visibleAll.indexOf(item);
                return(
                  <div key={i} onClick={()=>onTogglePack(key)} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:visIdx<visibleAll.length-1?"1px solid #f9fafb":"none",cursor:"pointer"}}>
                    <div style={{width:22,height:22,borderRadius:6,border:dk?"none":"2px solid #d1d5db",background:dk?"#22c55e":"white",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"background 0.15s"}}>
                      {dk&&<span style={{color:"white",fontSize:13,fontWeight:800}}>✓</span>}
                    </div>
                    <div style={{fontSize:14,color:dk?"#9ca3af":"#333",textDecoration:dk?"line-through":"none",flex:1}}>{item}</div>
                    {isBase
                      ?<span onClick={e=>{e.stopPropagation();onDeleteItem(`pack-base-${packPerson}-${cat}-${i}`);}} style={{color:"#e5e7eb",fontSize:20,cursor:"pointer",flexShrink:0,padding:"0 2px"}}>×</span>
                      :<span onClick={e=>{e.stopPropagation();removeIt(cat,i,base.length);}} style={{color:"#e5e7eb",fontSize:20,cursor:"pointer",flexShrink:0,padding:"0 2px"}}>×</span>
                    }
                  </div>
                );
              })}
              {addingCat===`${packPerson}-${cat}`?(
                <div style={{display:"flex",gap:8,marginTop:8}}>
                  <input value={newItem} onChange={e=>setNewItem(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addIt(cat)} placeholder="Add item..." autoFocus
                    style={{flex:1,padding:"8px 10px",borderRadius:10,border:"1px solid #ddd",fontSize:14}}/>
                  <button onClick={()=>addIt(cat)} style={{padding:"8px 14px",background:"#1a3a5c",color:"white",border:"none",borderRadius:10,fontSize:14,cursor:"pointer"}}>+</button>
                  <button onClick={()=>{setAddingCat(null);setNewItem("");}} style={{padding:"8px 12px",background:"white",color:"#888",border:"1px solid #ddd",borderRadius:10,fontSize:14,cursor:"pointer"}}>✕</button>
                </div>
              ):(
                <button onClick={()=>setAddingCat(`${packPerson}-${cat}`)} style={{width:"100%",marginTop:6,padding:"7px",background:"transparent",color:"#2d7dd2",border:"none",fontSize:13,cursor:"pointer",textAlign:"left"}}>+ Add item</button>
              )}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function SearchTab({setTab,setDayIdx,setPackPerson}){
  const [q,setQ]=useState("");
  const results=[];

  if(q.trim().length>=2){
    const lq=q.toLowerCase();

    ITINERARY.forEach((day,di)=>{
      const texts=[day.title,day.summary,day.city,day.lodging||"",day.transit||"",...day.items.map(it=>it.text)];
      const matchItem=day.items.find(it=>it.text.toLowerCase().includes(lq));
      const matchHead=texts.slice(0,5).some(t=>t.toLowerCase().includes(lq));
      if(matchItem||matchHead){
        results.push({
          cat:"Trip",label:`${day.emoji} ${day.label} · ${day.city}`,
          text:matchItem?matchItem.text:day.title,
          icon:matchItem?(TYPE_ICONS[matchItem.type]||"📍"):day.emoji,
          action:()=>{setDayIdx(di);setTab("trip");}
        });
      }
    });

    Object.entries(DEFAULT_PRETRIP).forEach(([date,tasks])=>{
      tasks.forEach(task=>{
        if(task.text.toLowerCase().includes(lq)){
          results.push({cat:"Pre-trip",label:fmtDate(date),text:task.text,icon:TYPE_ICONS[task.type]||"📋",action:()=>setTab("today")});
        }
      });
    });

    STILL_NEEDED_ITEMS.forEach(text=>{
      if(text.toLowerCase().includes(lq)){
        results.push({cat:"Needed",label:"Still to book",text,icon:"🎟️",action:()=>setTab("today")});
      }
    });

    Object.entries(MASTER_PACKING).forEach(([cat,items])=>{
      items.forEach(item=>{
        if(item.toLowerCase().includes(lq)){
          results.push({cat:"Master Pack",label:cat,text:item,icon:"🎒",action:()=>{setPackPerson("Master");setTab("pack");}});
        }
      });
    });

    Object.entries(INDIVIDUAL_PACKING).forEach(([person,items])=>{
      items.forEach(item=>{
        if(item.toLowerCase().includes(lq)){
          results.push({cat:`${person}'s Pack`,label:person,text:item,icon:"👜",action:()=>{setPackPerson(person);setTab("pack");}});
        }
      });
    });
  }

  return(
    <div>
      <div style={{position:"relative",marginBottom:16}}>
        <span style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",fontSize:17,opacity:0.45,pointerEvents:"none"}}>🔍</span>
        <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search activities, packing, tasks…" autoFocus
          style={{width:"100%",padding:"13px 42px 13px 46px",borderRadius:14,border:"1.5px solid #e2e8f0",fontSize:16,background:"white",boxShadow:"0 2px 10px rgba(0,0,0,0.07)",boxSizing:"border-box"}}/>
        {q&&<button onClick={()=>setQ("")} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#bbb",lineHeight:1,padding:0}}>×</button>}
      </div>

      {q.trim().length<2&&(
        <div style={{textAlign:"center",padding:"48px 20px",animation:"fadeIn 0.3s ease"}}>
          <div style={{fontSize:44,marginBottom:14}}>🔍</div>
          <div style={{fontSize:16,fontWeight:700,color:"#333",marginBottom:6}}>Search everything</div>
          <div style={{fontSize:13,color:"#aaa",lineHeight:1.7}}>Activities & itinerary<br/>Packing list items<br/>Pre-trip tasks & bookings</div>
        </div>
      )}

      {q.trim().length>=2&&results.length===0&&(
        <div style={{textAlign:"center",padding:"48px 20px",animation:"fadeIn 0.2s ease"}}>
          <div style={{fontSize:44,marginBottom:14}}>🤷</div>
          <div style={{fontSize:16,fontWeight:700,color:"#333"}}>No results for "{q}"</div>
          <div style={{fontSize:13,color:"#aaa",marginTop:6}}>Try a different search term</div>
        </div>
      )}

      {results.length>0&&(
        <div style={{animation:"fadeIn 0.2s ease"}}>
          <div style={{fontSize:12,color:"#aaa",marginBottom:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em"}}>{results.length} result{results.length!==1?"s":""}</div>
          {results.map((r,i)=>(
            <div key={i} onClick={r.action} style={{background:"white",borderRadius:14,padding:"13px 15px",marginBottom:8,boxShadow:"0 2px 10px rgba(0,0,0,0.07)",cursor:"pointer",display:"flex",gap:12,alignItems:"flex-start",border:"1px solid #f0f2f5"}}>
              <div style={{fontSize:22,flexShrink:0,marginTop:1}}>{r.icon}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
                  <span style={{fontSize:10,fontWeight:700,color:"#2d7dd2",background:"#e8f4fd",borderRadius:6,padding:"2px 7px",whiteSpace:"nowrap"}}>{r.cat}</span>
                  <span style={{fontSize:11,color:"#bbb",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.label}</span>
                </div>
                <div style={{fontSize:14,color:"#1a3a5c",fontWeight:500,lineHeight:1.4}}>{r.text}</div>
              </div>
              <div style={{color:"#d1d5db",fontSize:18,flexShrink:0,marginTop:2}}>›</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

              <div style={{fontSize:26,flexShrink:0}}>{s.e}</div>

        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:9}}>

              <span style={{fontSize:24}}>{qs.e}</span>

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App(){
  const phase=getPhase();
  const tripDayIdx=getTripDayIdx();
  const today=todayStr();

  const [tab,setTab]=useState("today");
  const [dayIdx,setDayIdx]=useState(tripDayIdx);
  const [preTripDate,setPreTripDate]=useState(today);

  const [customTasks,setCustomTasks]=useState({});
  const [checked,setChecked]=useState({});
  const [packChecked,setPackChecked]=useState({});
  const [customPackItems,setCustomPackItems]=useState({Master:{},Chris:{},McKenna:{},Sawyer:{},Pierce:{},Bennett:{}});
  const [deletedItems,setDeletedItems]=useState({});

  const [packPerson,setPackPerson]=useState("Master");
  const [addingTo,setAddingTo]=useState(null);
  const [taskText,setTaskText]=useState("");
  const [taskType,setTaskType]=useState("confirm");
  const [taskDate,setTaskDate]=useState(today);
  const [showCalendar,setShowCalendar]=useState(false);
  const [expandedDay,setExpandedDay]=useState(null);

  const [locLabel,setLocLabel]=useState(null);
  const [locError,setLocError]=useState(null);
  const [locLoading,setLocLoading]=useState(false);
  const [locAsked,setLocAsked]=useState(false);
  const [location,setLocation]=useState(null);

  const [syncStatus,setSyncStatus]=useState("idle");
  const [syncLabel,setSyncLabel]=useState("Tap ↻ to sync");
  const [lastBy,setLastBy]=useState(null);

  const reverseGeocode=async(lat,lng)=>{
    const fb=`${lat.toFixed(4)}, ${lng.toFixed(4)}`;
    try{
      const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`,{headers:{"Accept-Language":"en"},signal:AbortSignal.timeout(6000)});
      if(r.ok){const d=await r.json();const city=d.address?.city||d.address?.town||d.address?.village||d.address?.suburb||d.address?.county||"";const state=d.address?.state_code||d.address?.state||"";return city?`${city}, ${state}`:fb;}
    }catch{}
    return fb;
  };

  const requestLocation=()=>{
    if(!navigator.geolocation){setLocError("GPS not available on this device");return;}
    setLocLoading(true);setLocError(null);setLocAsked(true);
    navigator.geolocation.getCurrentPosition(
      async pos=>{
        const{latitude:lat,longitude:lng}=pos.coords;
        setLocation({lat,lng});setLocLoading(false);
        const label=await reverseGeocode(lat,lng);
        setLocLabel(label);
      },
      err=>{
        setLocLoading(false);
        if(err.code===1)setLocError("Location denied — check iPhone Settings → Safari → Location");
        else if(err.code===2)setLocError("GPS signal lost — tap to retry");
        else setLocError("Location timed out — tap to retry");
      },
      {enableHighAccuracy:true,timeout:15000,maximumAge:60000}
    );
  };

  const getState=()=>({customTasks,checked,packChecked,customPackItems,deletedItems});

  const applyRemoteData=(data)=>{
    if(!data)return;
    if(data.customTasks)setCustomTasks(data.customTasks);
    if(data.checked)setChecked(data.checked);
    if(data.packChecked)setPackChecked(data.packChecked);
    if(data.customPackItems)setCustomPackItems(data.customPackItems);
    if(data.deletedItems)setDeletedItems(data.deletedItems);
    if(data._by){setLastBy(data._by);setTimeout(()=>setLastBy(null),4000);}
  };

  const syncNow=async(patch)=>{
    setSyncStatus("saving");setSyncLabel("Saving…");
    const local=loadLocal();
    const merged={...local,...patch,_by:"Someone",_at:Date.now()};
    saveLocal(merged);
    const ok=await cloudSave(merged);
    if(ok){setSyncStatus("ok");setSyncLabel("Synced ✓");}
    else{setSyncStatus("local");setSyncLabel("Saved locally");}
  };

  const pullSync=async()=>{
    setSyncStatus("loading");setSyncLabel("Syncing…");
    const remote=await cloudLoad();
    if(remote){
      const local=loadLocal();
      const useRemote=!local._at||(remote._at&&remote._at>local._at);
      if(useRemote){applyRemoteData(remote);saveLocal(remote);}
      setSyncStatus("ok");setSyncLabel("Synced ✓");
    } else {
      const local=loadLocal();
      if(local)applyRemoteData(local);
      setSyncStatus("local");setSyncLabel("Offline — local data");
    }
  };

  useEffect(()=>{pullSync();},[]);
  useEffect(()=>{const id=setInterval(()=>pullSync(),20000);return()=>clearInterval(id);},[]);

  const toggleCheck=key=>{setChecked(p=>{const n={...p,[key]:!p[key]};syncNow({...getState(),checked:n});return n;});};
  const togglePack=key=>{setPackChecked(p=>{const n={...p,[key]:!p[key]};syncNow({...getState(),packChecked:n});return n;});};
  const deleteItem=key=>{if(!window.confirm("Delete this item permanently?"))return;setDeletedItems(p=>{const n={...p,[key]:true};syncNow({...getState(),deletedItems:n});return n;});};
  const handleAddTask=()=>{
    if(!taskText.trim())return;
    const target=taskDate||today;
    setCustomTasks(p=>{const n={...p,[target]:[...(p[target]||[]),{text:taskText.trim(),type:taskType}]};syncNow({...getState(),customTasks:n});return n;});
    setTaskText("");setAddingTo(null);
  };
  const removeTask=(date,idx)=>{
    if(!window.confirm("Remove this task?"))return;
    setCustomTasks(p=>{const n={...p,[date]:(p[date]||[]).filter((_,i)=>i!==idx)};syncNow({...getState(),customTasks:n});return n;});
  };
  const editTask=(date,idx,upd)=>{
    setCustomTasks(p=>{const n={...p,[date]:(p[date]||[]).map((t,i)=>i===idx?{...t,...upd}:t)};syncNow({...getState(),customTasks:n});return n;});
  };
  const updatePackItems=fn=>{
    setCustomPackItems(p=>{const n=typeof fn==="function"?fn(p):fn;syncNow({...getState(),customPackItems:n});return n;});
  };

  const openAddForm=dateKey=>{setAddingTo(dateKey);setTaskDate(dateKey);setTaskText("");setTaskType("confirm");};
  const allPreDates=()=>[...new Set([...Object.keys(DEFAULT_PRETRIP),...Object.keys(customTasks)])].sort();
  const tasksForDate=d=>({def:DEFAULT_PRETRIP[d]||[],cust:customTasks[d]||[]});
  const markedDates=allPreDates();

  const tabs=[
    {id:"today",label:phase==="pretrip"?"Pre-Trip":"Today"},
    {id:"trip",label:"Trip"},
    {id:"pack",label:"🎒"},
    {id:"search",label:"🔍"},
    {id:"nearby",label:"📍"},
  ];

  return(
    <div style={{fontFamily:"-apple-system,BlinkMacSystemFont,'Inter',system-ui,sans-serif",background:"#f0f4f8",minHeight:"100vh",maxWidth:480,margin:"0 auto"}}>

      {showCalendar&&<MiniCalendar markedDates={markedDates} selectedDate={taskDate} onSelect={d=>{setTaskDate(d);setShowCalendar(false);}} onClose={()=>setShowCalendar(false)}/>}

      {/* ── HEADER ── */}
      <div style={{background:"linear-gradient(135deg,#1a3a5c 0%,#2464a0 100%)",padding:"env(safe-area-inset-top,18px) 16px 0",color:"white",boxShadow:"0 4px 24px rgba(26,58,92,0.3)"}}>
        <div style={{paddingTop:"max(18px, env(safe-area-inset-top))"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
            <div>
              <div style={{fontSize:10,fontWeight:700,letterSpacing:"0.14em",opacity:0.6,textTransform:"uppercase"}}>East Coast Family Trip</div>
              <div style={{fontSize:21,fontWeight:900,marginTop:2,letterSpacing:"-0.3px"}}>Jul 9 – 24, 2026</div>
            </div>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <button onClick={pullSync} style={{background:"rgba(255,255,255,0.12)",border:"none",borderRadius:10,color:"white",fontSize:13,padding:"6px 10px",cursor:"pointer",display:"flex",alignItems:"center",gap:5}}>
                <span style={{width:7,height:7,borderRadius:"50%",background:syncStatus==="ok"?"#22c55e":syncStatus==="local"?"#fbbf24":"#93c5fd",display:"inline-block",flexShrink:0}}/>
                <span style={{fontSize:12,opacity:0.85}}>↻</span>
              </button>
            </div>
          </div>

          <div style={{fontSize:11,opacity:0.55,marginBottom:7,display:"flex",gap:8}}>
            <span>{syncLabel}</span>
            {lastBy&&<span>· {lastBy} just updated ✨</span>}
          </div>

          {/* Location bar */}
          <div style={{display:"flex",alignItems:"center",gap:6,background:"rgba(255,255,255,0.11)",borderRadius:10,padding:"7px 11px",marginBottom:10,fontSize:13,minHeight:36}}>
            {!locAsked&&!locLabel&&!locLoading&&(
              <div style={{display:"flex",alignItems:"center",width:"100%",gap:6}}>
                <button onClick={requestLocation} style={{background:"none",border:"none",color:"white",fontSize:13,cursor:"pointer",padding:0,display:"flex",alignItems:"center",gap:6,opacity:0.8,flex:1}}>
                  <span>📍</span><span>Tap to enable location</span>
                </button>
                <button onClick={()=>setLocAsked(true)} style={{background:"none",border:"none",color:"rgba(255,255,255,0.4)",fontSize:18,cursor:"pointer",padding:0,lineHeight:1}}>×</button>
              </div>
            )}
            {locLoading&&<><span>📍</span><span style={{opacity:0.7}}>Finding your location…</span></>}
            {locLabel&&!locError&&(
              <><span>📍</span><span style={{fontWeight:600,flex:1}}>{locLabel}</span>
              <button onClick={requestLocation} style={{background:"none",border:"none",color:"rgba(255,255,255,0.55)",fontSize:12,cursor:"pointer",padding:0}}>🔄</button>
              <a href={`https://maps.google.com/?q=${location?.lat},${location?.lng}`} target="_blank" rel="noreferrer" style={{color:"rgba(255,255,255,0.75)",fontSize:12,textDecoration:"none",marginLeft:4,fontWeight:600}}>Map →</a></>
            )}
            {locError&&(
              <><span>📍</span><span style={{opacity:0.75,fontSize:12,flex:1}}>{locError}</span>
              <button onClick={requestLocation} style={{background:"rgba(255,255,255,0.18)",border:"none",borderRadius:7,color:"white",fontSize:12,padding:"3px 9px",cursor:"pointer",flexShrink:0}}>Retry</button></>
            )}
          </div>

          {/* Tab bar */}
          <div style={{display:"flex",gap:2}}>
            {tabs.map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)}
                style={{flex:1,padding:"9px 4px",border:"none",cursor:"pointer",
                  background:tab===t.id?"white":"transparent",
                  color:tab===t.id?"#1a3a5c":"rgba(255,255,255,0.7)",
                  fontWeight:tab===t.id?700:500,fontSize:13,
                  borderRadius:"9px 9px 0 0",transition:"all 0.18s",
                  boxShadow:tab===t.id?"0 -2px 8px rgba(0,0,0,0.08)":"none"}}>
                {t.label}
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* ── CONTENT ── */}
      <div style={{padding:"14px",paddingBottom:44}} key={tab}>

        {/* PRE-TRIP / TODAY TAB */}
        {tab==="today"&&(
          <div style={{animation:"fadeIn 0.2s ease"}}>
            {phase==="pretrip"&&(()=>{
              const{def,cust}=tasksForDate(preTripDate);
              const hasTasks=def.length+cust.length>0;
              return(
                <div>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
                    <button onClick={()=>{const d=new Date(preTripDate+"T12:00:00");d.setDate(d.getDate()-1);const s=d.toISOString().split("T")[0];if(s>=today)setPreTripDate(s);}}
                      disabled={preTripDate<=today} style={{width:38,height:38,borderRadius:11,border:"1px solid #ddd",background:"white",cursor:"pointer",fontSize:18,opacity:preTripDate<=today?0.35:1,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>‹</button>
                    <div style={{flex:1,textAlign:"center"}}>
                      <div style={{fontWeight:700,fontSize:15,color:"#1a3a5c"}}>{preTripDate===today?"📋 Today's To-Dos":`📋 ${fmtDate(preTripDate)}`}</div>
                      {preTripDate!==today&&<div style={{fontSize:11,color:"#888",marginTop:1}}>{getDaysBetween(preTripDate)>0?`in ${getDaysBetween(preTripDate)} days`:`${Math.abs(getDaysBetween(preTripDate))} days ago`}</div>}
                    </div>
                    <button onClick={()=>{const d=new Date(preTripDate+"T12:00:00");d.setDate(d.getDate()+1);const s=d.toISOString().split("T")[0];if(s<TRIP_START)setPreTripDate(s);}}
                      disabled={preTripDate>=new Date(new Date(TRIP_START+"T12:00:00").getTime()-86400000).toISOString().split("T")[0]}
                      style={{width:38,height:38,borderRadius:11,border:"1px solid #ddd",background:"white",cursor:"pointer",fontSize:18,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>›</button>
                  </div>

                  {preTripDate===today&&<CountdownCard/>}

                  {preTripDate===today&&(()=>{
                    const rollover=[];
                    Object.entries(DEFAULT_PRETRIP).forEach(([date,tasks])=>{
                      if(date<today)tasks.forEach((t,i)=>{
                        if(!checked[`${date}-def-${i}`]&&!deletedItems[`pretrip-def-${date}-${i}`])
                          rollover.push({...t,_checkKey:`${date}-def-${i}`,_delKey:`pretrip-def-${date}-${i}`,_dateLabel:fmtDate(date)});
                      });
                    });
                    Object.entries(customTasks).forEach(([date,tasks])=>{
                      if(date<today)tasks.forEach((t,i)=>{
                        if(!checked[`${date}-cust-${i}`]&&!deletedItems[`pretrip-cust-${date}-${i}`])
                          rollover.push({...t,_checkKey:`${date}-cust-${i}`,_delKey:`pretrip-cust-${date}-${i}`,_dateLabel:fmtDate(date)});
                      });
                    });
                    STILL_NEEDED_ITEMS.forEach((text,i)=>{
                      if(!checked[`booking-${i}`]&&!deletedItems[`stillneeded-${i}`])
                        rollover.push({text,type:"booking",_checkKey:`booking-${i}`,_delKey:`stillneeded-${i}`,_dateLabel:"Still needed"});
                    });
                    if(!rollover.length)return null;
                    return(
                      <div style={{marginBottom:14}}>
                        <div style={{fontWeight:700,fontSize:11,color:"#e07b39",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8}}>⚠️ Overdue — Rolled Forward</div>
                        {rollover.map((item,idx)=>{
                          const colors=TYPE_COLORS[item.type]||TYPE_COLORS.tip;
                          return(
                            <div key={idx} style={{display:"flex",alignItems:"flex-start",gap:10,background:colors.bg,border:`1px solid ${colors.border}`,borderRadius:12,padding:"12px 13px",marginBottom:8}}>
                              <div onClick={()=>toggleCheck(item._checkKey)} style={{width:24,height:24,borderRadius:7,border:`2px solid ${colors.border}`,background:"white",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1,cursor:"pointer"}}/>
                              <div style={{flex:1,cursor:"pointer"}} onClick={()=>toggleCheck(item._checkKey)}>
                                <div style={{fontSize:15,color:colors.text,lineHeight:1.4}}><span style={{marginRight:5}}>{TYPE_ICONS[item.type]||"•"}</span>{item.text}</div>
                                <div style={{fontSize:11,color:"#bbb",marginTop:3}}>{item._dateLabel}</div>
                              </div>
                              <span onClick={()=>deleteItem(item._delKey)} style={{color:"#d1d5db",fontSize:22,cursor:"pointer",lineHeight:1,flexShrink:0,padding:"0 2px"}}>×</span>
                            </div>
                          );
                        })}
                      </div>
                    );
                  })()}

                  {hasTasks?(
                    <>
                      <div style={{fontWeight:700,fontSize:11,color:"#888",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8}}>{preTripDate===today?"Due Today":"Tasks for this date"}</div>
                      {def.map((t,i)=>deletedItems[`pretrip-def-${preTripDate}-${i}`]?null:<TaskItem key={`d${i}`} task={t} checkKey={`${preTripDate}-def-${i}`} checked={checked} onToggle={toggleCheck} onRemove={()=>deleteItem(`pretrip-def-${preTripDate}-${i}`)}/>)}
                      {cust.map((t,i)=><TaskItem key={`c${i}`} task={t} checkKey={`${preTripDate}-cust-${i}`} checked={checked} onToggle={toggleCheck} onRemove={()=>removeTask(preTripDate,i)} onEdit={u=>editTask(preTripDate,i,u)}/>)}
                    </>
                  ):(
                    <div style={{background:"white",borderRadius:16,padding:"24px 18px",textAlign:"center",marginBottom:12,boxShadow:"0 2px 12px rgba(0,0,0,0.07)"}}>
                      <div style={{fontSize:32,marginBottom:10}}>{preTripDate===today?"🌴":"📭"}</div>
                      <div style={{fontWeight:700,fontSize:15,color:"#333"}}>{preTripDate===today?"Nothing due today!":"No tasks on this date"}</div>
                      <div style={{fontSize:13,color:"#aaa",marginTop:5}}>{preTripDate===today?"Enjoy the calm before the adventure.":"Add one below, or browse with ‹ ›"}</div>
                    </div>
                  )}

                  {addingTo===preTripDate?(
                    <AddTaskForm taskText={taskText} setTaskText={setTaskText} taskType={taskType} setTaskType={setTaskType} taskDate={taskDate} today={today} onAdd={handleAddTask} onCancel={()=>{setAddingTo(null);setTaskText("");}}/>
                  ):(
                    <button onClick={()=>openAddForm(preTripDate)} style={{width:"100%",padding:"12px",background:"white",color:"#1a3a5c",border:"2px dashed #b8ccdf",borderRadius:12,fontSize:14,fontWeight:600,cursor:"pointer",marginBottom:12,boxShadow:"0 1px 4px rgba(0,0,0,0.04)"}}>+ Add a task</button>
                  )}

                  {preTripDate===today&&(()=>{
                    const up=allPreDates().filter(d=>d>today).slice(0,2);
                    if(!up.length)return null;
                    return(
                      <div style={{background:"white",borderRadius:16,padding:"14px 16px",boxShadow:"0 2px 12px rgba(0,0,0,0.07)",marginTop:4}}>
                        <div style={{fontWeight:700,fontSize:11,color:"#aaa",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10}}>Coming Up</div>
                        {up.map(d=>{
                          const{def:df,cust:ct}=tasksForDate(d);
                          const tot=df.length+ct.length;
                          return(
                            <div key={d} onClick={()=>setPreTripDate(d)} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:"1px solid #f3f4f6",cursor:"pointer"}}>
                              <div style={{width:46,textAlign:"center",background:"#f0f4f8",borderRadius:10,padding:"5px 0"}}>
                                <div style={{fontSize:11,fontWeight:600,color:"#888"}}>{fmtDate(d).split(",")[0]}</div>
                                <div style={{fontSize:11,color:"#2d7dd2",fontWeight:700}}>in {getDaysBetween(d)}d</div>
                              </div>
                              <div style={{flex:1}}><div style={{fontSize:14,color:"#333",fontWeight:600}}>{tot} task{tot!==1?"s":""} due</div><div style={{fontSize:12,color:"#aaa",marginTop:1}}>{(df[0]||ct[0])?.text?.slice(0,44)}…</div></div>
                              <div style={{color:"#ccc",fontSize:18}}>›</div>
                            </div>
                          );
                        })}
                      </div>
                    );
                  })()}

                  {preTripDate!==today&&<button onClick={()=>setPreTripDate(today)} style={{width:"100%",marginTop:8,padding:"12px",background:"#1a3a5c",color:"white",border:"none",borderRadius:12,fontSize:14,fontWeight:600,cursor:"pointer"}}>Back to Today</button>}
                </div>
              );
            })()}

            {phase==="trip"&&(
              <div>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                  <button onClick={()=>setDayIdx(Math.max(0,dayIdx-1))} disabled={dayIdx===0} style={{width:38,height:38,borderRadius:11,border:"1px solid #ddd",background:"white",cursor:"pointer",fontSize:18,opacity:dayIdx===0?0.35:1,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>‹</button>
                  <div style={{flex:1,textAlign:"center"}}>
                    <div style={{fontWeight:700,fontSize:15,color:"#1a3a5c"}}>{ITINERARY[dayIdx].emoji} {ITINERARY[dayIdx].label} — {ITINERARY[dayIdx].city}</div>
                    <div style={{fontSize:11,color:getDaysBetween(ITINERARY[dayIdx].date)===0?"#2d7dd2":"#888",marginTop:1}}>{getDaysBetween(ITINERARY[dayIdx].date)===0?"Today!":getDaysBetween(ITINERARY[dayIdx].date)>0?`in ${getDaysBetween(ITINERARY[dayIdx].date)} days`:`${Math.abs(getDaysBetween(ITINERARY[dayIdx].date))} days ago`}</div>
                  </div>
                  <button onClick={()=>setDayIdx(Math.min(ITINERARY.length-1,dayIdx+1))} disabled={dayIdx===ITINERARY.length-1} style={{width:38,height:38,borderRadius:11,border:"1px solid #ddd",background:"white",cursor:"pointer",fontSize:18,opacity:dayIdx===ITINERARY.length-1?0.35:1,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>›</button>
                </div>
                <div style={{background:"white",borderRadius:16,padding:"15px 17px",marginBottom:10,boxShadow:"0 2px 12px rgba(0,0,0,0.08)"}}>
                  <div style={{fontWeight:800,fontSize:19,color:"#1a3a5c"}}>{ITINERARY[dayIdx].title}</div>
                  <div style={{fontSize:13,color:"#666",marginTop:3,lineHeight:1.4}}>{ITINERARY[dayIdx].summary}</div>
                  {ITINERARY[dayIdx].lodging&&<div style={{marginTop:9,fontSize:12,color:"#888",background:"#f8f9fa",borderRadius:8,padding:"7px 11px"}}>🏨 {ITINERARY[dayIdx].lodging}</div>}
                  {ITINERARY[dayIdx].transit&&<div style={{marginTop:6,fontSize:12,color:"#888",background:"#f8f9fa",borderRadius:8,padding:"7px 11px"}}>🚌 {ITINERARY[dayIdx].transit}</div>}
                </div>
                {ITINERARY[dayIdx].confirmations?.map((c,i)=>(
                  <div key={i} style={{background:"#e8f4fd",borderRadius:12,padding:"11px 15px",marginBottom:8,border:"1px solid #b3d9f5"}}>
                    <div style={{fontWeight:600,fontSize:13,color:"#1a3a5c"}}>✅ {c.label}</div>
                    <div style={{fontSize:12,color:"#555",marginTop:2}}>{c.detail}</div>
                  </div>
                ))}
                <div style={{fontWeight:700,fontSize:11,color:"#aaa",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8}}>Plan for the day</div>
                {ITINERARY[dayIdx].items.map((it,i)=>deletedItems[`itinerary-${ITINERARY[dayIdx].date}-${i}`]?null:<TaskItem key={i} task={it} checkKey={`trip-${ITINERARY[dayIdx].date}-${i}`} checked={checked} onToggle={toggleCheck} onRemove={()=>deleteItem(`itinerary-${ITINERARY[dayIdx].date}-${i}`)}/>)}
                {(customTasks[ITINERARY[dayIdx].date]||[]).map((t,i)=>(
                  <TaskItem key={`c${i}`} task={t} checkKey={`trip-${ITINERARY[dayIdx].date}-c${i}`} checked={checked} onToggle={toggleCheck} onRemove={()=>removeTask(ITINERARY[dayIdx].date,i)} onEdit={u=>editTask(ITINERARY[dayIdx].date,i,u)}/>
                ))}
                {addingTo===ITINERARY[dayIdx].date?(
                  <AddTaskForm taskText={taskText} setTaskText={setTaskText} taskType={taskType} setTaskType={setTaskType} taskDate={taskDate} today={today} onAdd={handleAddTask} onCancel={()=>{setAddingTo(null);setTaskText("");}}/>
                ):(
                  <button onClick={()=>openAddForm(ITINERARY[dayIdx].date)} style={{width:"100%",padding:"12px",background:"white",color:"#1a3a5c",border:"2px dashed #b8ccdf",borderRadius:12,fontSize:14,fontWeight:600,cursor:"pointer",marginBottom:12}}>+ Add a task</button>
                )}
                {dayIdx!==tripDayIdx&&<button onClick={()=>setDayIdx(tripDayIdx)} style={{width:"100%",marginTop:4,padding:"12px",background:"#1a3a5c",color:"white",border:"none",borderRadius:12,fontSize:14,fontWeight:600,cursor:"pointer"}}>Jump to Today</button>}
              </div>
            )}

            {phase==="posttrip"&&(
              <div style={{textAlign:"center",padding:"52px 20px"}}>
                <div style={{fontSize:56,marginBottom:14}}>🏠</div>
                <div style={{fontWeight:800,fontSize:22,color:"#1a3a5c"}}>Trip Complete!</div>
                <div style={{fontSize:14,color:"#888",marginTop:8}}>Hope it was amazing. 🌊🗽🍫</div>
              </div>
            )}
          </div>
        )}

        {/* TRIP TAB */}
        {tab==="trip"&&(
          <div style={{animation:"fadeIn 0.2s ease"}}>
            <div style={{fontWeight:700,fontSize:11,color:"#aaa",textTransform:"uppercase",letterSpacing:"0.1em",margin:"8px 0 5px"}}>Full Trip Plan</div>
            <div style={{fontSize:12,color:"#bbb",marginBottom:12}}>Tap any day to expand · add or edit tasks</div>
            {ITINERARY.map((day,i)=>{
              const diff=getDaysBetween(day.date);
              const isPast=diff<0,isToday=diff===0,isOpen=expandedDay===i;
              const cust=customTasks[day.date]||[];
              const total=day.items.length+cust.length;
              const done=[...day.items.map((_,j)=>checked[`trip-${day.date}-${j}`]),...cust.map((_,j)=>checked[`trip-${day.date}-c${j}`])].filter(Boolean).length;
              return(
                <div key={i} style={{background:"white",borderRadius:14,marginBottom:8,overflow:"hidden",border:isToday?"2px solid #2d6a9f":"1px solid #edeef0",boxShadow:"0 2px 10px rgba(0,0,0,0.07)"}}>
                  <div onClick={()=>setExpandedDay(isOpen?null:i)} style={{display:"flex",alignItems:"center",gap:10,padding:"13px 14px",cursor:"pointer",background:isToday?"#e8f4fd":isPast?"#fafafa":"white"}}>
                    <div style={{fontSize:22,flexShrink:0}}>{day.emoji}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                        <div style={{fontWeight:700,fontSize:14,color:isPast?"#bbb":"#1a3a5c"}}>{day.label}</div>
                        {isToday&&<span style={{fontSize:10,fontWeight:700,color:"white",background:"#2d6a9f",borderRadius:6,padding:"2px 7px"}}>TODAY</span>}
                        {!isPast&&!isToday&&diff<=5&&<span style={{fontSize:10,fontWeight:700,color:"#e07b39",background:"#fef0e6",borderRadius:6,padding:"2px 7px"}}>in {diff}d</span>}
                      </div>
                      <div style={{fontSize:12,color:isPast?"#ccc":"#555",marginTop:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{day.title}</div>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
                      {done>0&&<div style={{fontSize:11,color:"#22c55e",fontWeight:700}}>{done}/{total}</div>}
                      <div style={{color:"#d1d5db",fontSize:18,transition:"transform 0.2s",transform:isOpen?"rotate(90deg)":"none"}}>›</div>
                    </div>
                  </div>
                  {isOpen&&(
                    <div style={{padding:"0 14px 14px",borderTop:"1px solid #f3f4f6"}}>
                      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:10,marginBottom:10}}>
                        {day.lodging&&<div style={{fontSize:11,background:"#eff6ff",color:"#1e40af",borderRadius:7,padding:"4px 9px"}}>🏨 {day.lodging}</div>}
                        {day.transit&&<div style={{fontSize:11,background:"#f0fdf4",color:"#166634",borderRadius:7,padding:"4px 9px"}}>🚌 {day.transit}</div>}
                      </div>
                      {day.confirmations?.map((c,ci)=>(
                        <div key={ci} style={{background:"#e8f4fd",borderRadius:10,padding:"9px 13px",marginBottom:8,border:"1px solid #b3d9f5"}}>
                          <div style={{fontWeight:600,fontSize:12,color:"#1a3a5c"}}>✅ {c.label}</div>
                          <div style={{fontSize:11,color:"#555",marginTop:1}}>{c.detail}</div>
                        </div>
                      ))}
                      <div style={{fontWeight:700,fontSize:11,color:"#bbb",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6}}>Activities</div>
                      {day.items.map((it,j)=>deletedItems[`itinerary-${day.date}-${j}`]?null:<TaskItem key={j} task={it} checkKey={`trip-${day.date}-${j}`} checked={checked} onToggle={toggleCheck} onRemove={()=>deleteItem(`itinerary-${day.date}-${j}`)}/>)}
                      {cust.length>0&&<div style={{fontWeight:700,fontSize:11,color:"#bbb",textTransform:"uppercase",letterSpacing:"0.08em",margin:"10px 0 6px"}}>Added by family</div>}
                      {cust.map((t,j)=>(
                        <TaskItem key={`c${j}`} task={t} checkKey={`trip-${day.date}-c${j}`} checked={checked} onToggle={toggleCheck} onRemove={()=>removeTask(day.date,j)} onEdit={u=>editTask(day.date,j,u)}/>
                      ))}
                      {addingTo===day.date?(
                        <AddTaskForm taskText={taskText} setTaskText={setTaskText} taskType={taskType} setTaskType={setTaskType} taskDate={taskDate} today={today} onAdd={handleAddTask} onCancel={()=>{setAddingTo(null);setTaskText("");}}/>
                      ):(
                        <button onClick={()=>openAddForm(day.date)} style={{width:"100%",marginTop:8,padding:"10px",background:"#f8fafc",color:"#2d6a9f",border:"2px dashed #b8ccdf",borderRadius:10,fontSize:13,fontWeight:600,cursor:"pointer"}}>+ Add task to this day</button>
                      )}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}

        {/* PACKING TAB */}
        {tab==="pack"&&(
          <div style={{animation:"fadeIn 0.2s ease"}}>
            <PackingTab packChecked={packChecked} onTogglePack={togglePack} customPackItems={customPackItems} setCustomPackItems={updatePackItems} packPerson={packPerson} setPackPerson={setPackPerson} deletedItems={deletedItems} onDeleteItem={deleteItem}/>
          </div>
        )}

        {/* SEARCH TAB */}
        {tab==="search"&&(
          <div style={{animation:"fadeIn 0.2s ease"}}>
            <SearchTab setTab={setTab} setDayIdx={setDayIdx} setPackPerson={setPackPerson}/>
          </div>
        )}

        {/* NEARBY TAB */}
        {tab==="nearby"&&(
          <div style={{animation:"fadeIn 0.2s ease"}}>
            <NearbyTab tripDayIdx={tripDayIdx}/>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
