const getDaysBetween=d=>{const t=new Date();t.setHours(0,0,0,0);const x=new Date(d);x.setHours(0,0,0,0);return Math.round((x-t)/86400000);};
const getPhase=()=>{const t=todayStr();if(t<TRIP_START)return"pretrip";if(t>TRIP_END)return"posttrip";return"trip";};
const getTripDayIdx=()=>{const t=todayStr();const i=ITINERARY.findIndex(d=>d.date===t);return i>=0?i:0;};

// ── SOUND EFFECTS ─────────────────────────────────────────────────────────────
const EMOJI_SFX={"🌴":"palm","✈️":"plane","🗽":"liberty","🏖️":"beach","🍕":"pizza","🍫":"choc","🚂":"train","🌊":"wave","🎉":"party"};
const _sfxLast={};
function playSfx(key){
  if(!key)return;
  const now=Date.now();
  if(_sfxLast[key]&&now-_sfxLast[key]<550)return;
  _sfxLast[key]=now;
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    ctx.resume().then(()=>{
      const t=ctx.currentTime;
      const note=(type,freq,start,dur,vol=0.35)=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.type=type;o.frequency.setValueAtTime(freq,t+start);
        g.gain.setValueAtTime(vol,t+start);g.gain.exponentialRampToValueAtTime(0.001,t+start+dur);
        o.start(t+start);o.stop(t+start+dur);
      };
      if(key==="palm"){
        note("sine",880,0,0.35,0.5);note("sine",1320,0,0.18,0.15);
      } else if(key==="plane"){
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.type="sawtooth";o.frequency.setValueAtTime(300,t);o.frequency.linearRampToValueAtTime(700,t+0.7);
        g.gain.setValueAtTime(0.28,t);g.gain.linearRampToValueAtTime(0.001,t+0.7);
        o.start(t);o.stop(t+0.7);
      } else if(key==="liberty"){
        note("sine",1047,0,0.7,0.4);note("sine",1319,0.07,0.65,0.25);note("sine",1568,0.14,0.55,0.15);
      } else if(key==="beach"){
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.type="sine";o.frequency.setValueAtTime(220,t);o.frequency.exponentialRampToValueAtTime(60,t+0.3);
        g.gain.setValueAtTime(0.7,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.35);
        o.start(t);o.stop(t+0.35);
      } else if(key==="pizza"){
        note("square",880,0,0.1,0.3);note("sine",440,0.04,0.12,0.12);
      } else if(key==="choc"){
        note("sine",523,0,0.22,0.35);note("sine",659,0.15,0.3,0.3);
      } else if(key==="train"){
        note("sawtooth",330,0,0.22,0.3);note("sawtooth",392,0.2,0.28,0.28);
      } else if(key==="wave"){
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.type="sawtooth";o.frequency.setValueAtTime(600,t);o.frequency.exponentialRampToValueAtTime(180,t+0.65);
        g.gain.setValueAtTime(0.28,t);g.gain.linearRampToValueAtTime(0.001,t+0.65);
        o.start(t);o.stop(t+0.65);
      } else if(key==="party"){
        note("sine",523,0,0.2,0.4);note("sine",659,0.16,0.22,0.38);note("sine",784,0.3,0.25,0.35);
      } else if(key==="tab"){
        note("sine",1200,0,0.22,0.25);
      }
      setTimeout(()=>{try{ctx.close();}catch{}},1500);
    });
  } catch(e){}
}

// ── TASK ITEM ─────────────────────────────────────────────────────────────────
function TaskItem({task,checkKey,checked,onToggle,onRemove,onEdit,isCore,onToggleCore,fitWarning,showDueDateEdit}){
  const [editing,setEditing]=useState(false);
  const [editText,setEditText]=useState(task.text);
  const [editType,setEditType]=useState(task.type);
  const [editDueDate,setEditDueDate]=useState(task.dueDate||"");
  const done=!!checked[checkKey];
  const bColor=isCore?"#f59e0b":(TYPE_BORDER[task.type]||"#94a3b8");
  const save=()=>{if(editText.trim()){const upd={text:editText.trim(),type:editType};if(showDueDateEdit)upd.dueDate=editDueDate||null;onEdit&&onEdit(upd);}setEditing(false);};

  if(editing) return(
    <div style={{...S.cardSm,padding:"14px 15px",marginBottom:8,borderLeft:`4px solid ${S.accent}`}}>
      <input value={editText} onChange={e=>setEditText(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")save();if(e.key==="Escape")setEditing(false);}} autoFocus
        style={{width:"100%",padding:"10px 13px",borderRadius:10,border:"1.5px solid #e2e8f0",fontSize:15,marginBottom:9,boxSizing:"border-box",background:"#f8fafc"}}/>
      <div style={{display:"flex",gap:5,marginBottom:10,flexWrap:"wrap"}}>
        {[["booking","🎟️"],["confirm","📞"],["pack","🎒"],["activity","🎯"],["food","🍽️"],["tip","💡"]].map(([v,ic])=>(
          <button key={v} onClick={()=>setEditType(v)} style={{padding:"5px 11px",borderRadius:20,border:`1.5px solid ${editType===v?S.navy:"#e2e8f0"}`,fontSize:12,fontWeight:editType===v?700:400,background:editType===v?S.navy:"white",color:editType===v?"white":"#64748b"}}>{ic} {v}</button>
        ))}
      </div>
      {showDueDateEdit&&(
        <div style={{marginBottom:10}}>
          <div style={{fontSize:10,fontWeight:800,color:"#94a3b8",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:5}}>Due date (optional)</div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <input type="date" value={editDueDate} onChange={e=>setEditDueDate(e.target.value)}
              style={{flex:1,padding:"9px 13px",borderRadius:10,border:"1.5px solid #e2e8f0",fontSize:14,boxSizing:"border-box",background:"#f8fafc"}}/>
            {editDueDate&&<button onClick={()=>setEditDueDate("")} style={{padding:"9px 12px",background:"#f1f5f9",color:"#94a3b8",border:"none",borderRadius:10,fontSize:12,fontWeight:600,flexShrink:0}}>Clear</button>}
          </div>
        </div>
      )}
      <div style={{display:"flex",gap:8}}>
        <button onClick={save} style={{flex:1,padding:"10px",background:S.navy,color:"white",border:"none",borderRadius:11,fontSize:14,fontWeight:700}}>Save</button>
        <button onClick={()=>setEditing(false)} style={{padding:"10px 16px",background:"#f1f5f9",color:"#64748b",border:"none",borderRadius:11,fontSize:14,fontWeight:600}}>Cancel</button>
      </div>
    </div>
  );

  return(
    <div style={{marginBottom:8}}>
      <div style={{display:"flex",alignItems:"flex-start",gap:12,...S.cardSm,padding:"13px 14px 13px 15px",borderLeft:`4px solid ${done?"#e2e8f0":bColor}`,background:done?"#f8fafc":"white",transition:"all 0.18s",borderRadius:fitWarning?"14px 14px 0 0":14}}>
        <div onClick={()=>onToggle(checkKey)} style={{width:24,height:24,borderRadius:7,border:done?"none":`2px solid ${bColor}`,background:done?"#22c55e":"white",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1,cursor:"pointer",boxShadow:done?"0 2px 8px rgba(34,197,94,0.35)":"none",transition:"all 0.15s"}}>
          {done&&<span style={{color:"white",fontSize:13,fontWeight:900,lineHeight:1}}>✓</span>}
        </div>
        <div style={{flex:1,fontSize:15,color:done?"#94a3b8":"#1e293b",lineHeight:1.45,textDecoration:done?"line-through":"none",textDecorationColor:"#cbd5e1",cursor:"pointer"}} onClick={()=>onToggle(checkKey)}>
          <span onClick={e=>{e.stopPropagation();playSfx(EMOJI_SFX[TYPE_ICONS[task.type]]||'tab');}} style={{marginRight:6,cursor:"pointer"}}>{TYPE_ICONS[task.type]||"•"}</span>{task.text}
          {isCore&&!done&&<span style={{marginLeft:6,fontSize:10,fontWeight:800,color:"#d97706",background:"#fef3c7",borderRadius:5,padding:"1px 6px",verticalAlign:"middle"}}>CORE</span>}
          {showDueDateEdit&&task.dueDate&&!done&&<div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>📅 {fmtDate(task.dueDate)}</div>}
        </div>
        <div style={{display:"flex",gap:5,flexShrink:0,alignItems:"center",marginTop:1}}>
          {onToggleCore&&<span onClick={e=>{e.stopPropagation();onToggleCore(checkKey);}} style={{fontSize:14,cursor:"pointer",opacity:isCore?1:0.22,lineHeight:1}}>⭐</span>}
          {onEdit&&!done&&<span onClick={()=>{setEditText(task.text);setEditType(task.type);if(showDueDateEdit)setEditDueDate(task.dueDate||"");setEditing(true);}} style={{fontSize:14,cursor:"pointer",opacity:0.3,lineHeight:1}}>✏️</span>}
          {onRemove&&<span onClick={onRemove} style={{color:"#cbd5e1",fontSize:22,cursor:"pointer",lineHeight:1,padding:"0 2px",fontWeight:300}}>×</span>}
        </div>
      </div>
      {fitWarning&&<div style={{fontSize:12,color:"#92400e",background:"#fef3c7",padding:"6px 14px 7px 15px",borderLeft:"4px solid #f59e0b",borderRadius:"0 0 14px 14px"}}>⚠️ {fitWarning}</div>}
    </div>
  );
}

function MiniCalendar({markedDates,onSelect,selectedDate,onClose}){
  const [vy,setVy]=useState(2026);
  const [vm,setVm]=useState(5);
  const dim=new Date(vy,vm+1,0).getDate();
  const fd=new Date(vy,vm,1).getDay();
  const mn=new Date(vy,vm,1).toLocaleDateString("en-US",{month:"long",year:"numeric"});
  const cells=[];for(let i=0;i<fd;i++)cells.push(null);for(let d=1;d<=dim;d++)cells.push(d);
  const pm=()=>vm===0?setVm(11)||setVy(y=>y-1):setVm(m=>m-1);
  const nm=()=>vm===11?setVm(0)||setVy(y=>y+1):setVm(m=>m+1);
  const td=todayStr();
  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div onClick={e=>e.stopPropagation()} style={{...S.card,padding:22,width:"100%",maxWidth:340}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <button onClick={pm} style={{width:38,height:38,borderRadius:12,border:"1.5px solid #e2e8f0",background:"white",fontSize:18,color:"#334155"}}>‹</button>
          <div style={{fontWeight:800,fontSize:16,color:S.navy}}>{mn}</div>
          <button onClick={nm} style={{width:38,height:38,borderRadius:12,border:"1.5px solid #e2e8f0",background:"white",fontSize:18,color:"#334155"}}>›</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
          {["Su","Mo","Tu","We","Th","Fr","Sa"].map(d=><div key={d} style={{textAlign:"center",fontSize:11,fontWeight:700,color:"#94a3b8",padding:"2px 0"}}>{d}</div>)}
          {cells.map((day,i)=>{
            if(!day)return<div key={`e${i}`}/>;
            const ds=`${vy}-${String(vm+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
            const isTrip=ds>=TRIP_START&&ds<=TRIP_END,isMarked=markedDates.includes(ds);
            const isToday=ds===td,isSel=ds===selectedDate,isPast=ds<td;
            return(
              <div key={day} onClick={()=>!isPast&&onSelect(ds)} style={{textAlign:"center",padding:"6px 2px",borderRadius:9,fontSize:14,fontWeight:isMarked||isToday?700:400,
                background:isSel?S.navy:isTrip?"#eff6ff":isMarked?"#fdf4ff":"transparent",
                color:isSel?"white":isPast?"#cbd5e1":isToday?S.accent:"#334155",cursor:isPast?"default":"pointer",
                border:isMarked&&!isSel?"2px solid #d8b4fe":isToday&&!isSel?`2px solid ${S.accent}`:"2px solid transparent"}}>
                {day}
              </div>
            );
          })}
        </div>
        <button onClick={onClose} style={{width:"100%",marginTop:16,padding:"13px",background:"#f1f5f9",border:"none",borderRadius:13,fontSize:14,fontWeight:700,color:"#64748b"}}>Close</button>
      </div>
    </div>
  );
}

// ── COUNTDOWN CARD ────────────────────────────────────────────────────────────
function CountdownCard(){
  const days=getDaysBetween(TRIP_START);
  if(days<=0)return null;
  const planStart=new Date("2026-01-01T00:00:00");
  const tripDate=new Date(TRIP_START+"T00:00:00");
  const now=new Date();
  const pct=Math.max(0,Math.min(1,(now-planStart)/(tripDate-planStart)));
  const r=56,circ=2*Math.PI*r;
  const emojis=["🌴","✈️","🗽","🏖️","🍕","🍫","🚂","🌊","🎉"];
  return(
    <div style={{background:"linear-gradient(155deg,#0a1e3a 0%,#0f2c52 40%,#1a4b88 100%)",borderRadius:24,padding:"24px 20px",color:"white",marginBottom:16,boxShadow:"0 12px 40px rgba(10,30,58,0.4)",overflow:"hidden",position:"relative"}}>

      </div>
      <div style={{display:"flex",justifyContent:"center",marginBottom:10,position:"relative"}}>
        <div style={{position:"relative",width:148,height:148}}>
          <svg width="148" height="148" style={{transform:"rotate(-90deg)"}}>
            <circle cx="74" cy="74" r={r} fill="none" stroke="rgba(255,255,255,0.1)" strokeWidth="9"/>
            <circle cx="74" cy="74" r={r} fill="none" stroke="rgba(99,179,237,0.75)" strokeWidth="9"

            <div style={{fontSize:52,fontWeight:900,lineHeight:1,letterSpacing:"-3px"}}>{days}</div>
            <div style={{fontSize:11,fontWeight:700,opacity:0.6,letterSpacing:"0.1em",marginTop:2}}>DAYS TO GO</div>
          </div>
        </div>

      <div style={{background:"rgba(255,255,255,0.12)",borderRadius:14,padding:"10px 16px",fontSize:13,textAlign:"center",fontWeight:500,backdropFilter:"blur(8px)"}}>
        ✈️ Departs SLC · Thu Jul 9, 2:05pm
      </div>
    </div>
  );
}

// ── TRAVEL CARD ───────────────────────────────────────────────────────────────
function TravelItemForm({item,dayDate,onSave,onCancel}){
  const [iconType,setIconType]=useState(item?.iconType||"flight");
  const [label,setLabel]=useState(item?.label||"");
  const [confirmNum,setConfirmNum]=useState(item?.confirmNum||"");
  const [time,setTime]=useState(item?.time||"");
  const [startDate,setStartDate]=useState(item?.startDate||dayDate||"");
  const [endDate,setEndDate]=useState(item?.endDate||"");
  const [location,setLocation]=useState(item?.location||"");
  const [notes,setNotes]=useState(item?.notes||"");
  const save=()=>{
    if(!label.trim())return;
    const t=TRAVEL_TYPES.find(t=>t.key===iconType)||TRAVEL_TYPES[0];
    onSave({iconType,icon:t.icon,label:label.trim(),confirmNum:confirmNum.trim(),time:time.trim(),startDate,endDate,location:location.trim(),notes:notes.trim()});
  };
  const inp={width:"100%",padding:"10px 12px",border:"1.5px solid #cbd5e1",borderRadius:10,fontSize:14,boxSizing:"border-box",marginBottom:8,fontFamily:"inherit"};
  return(
    <div style={{background:"#f0f9ff",borderRadius:14,padding:"14px",marginBottom:8,border:"1.5px solid #bfdbfe"}}>
      <div style={{marginBottom:10}}>
        <div style={{fontSize:10,fontWeight:800,color:"#1e40af",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:6}}>Type</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
          {TRAVEL_TYPES.map(t=>(
            <button key={t.key} onClick={()=>setIconType(t.key)} style={{padding:"5px 9px",borderRadius:8,fontSize:12,fontWeight:700,border:"1.5px solid",borderColor:iconType===t.key?"#3b82f6":"#cbd5e1",background:iconType===t.key?"#eff6ff":"white",color:iconType===t.key?"#1e40af":"#64748b",cursor:"pointer"}}>{t.icon} {t.label}</button>
          ))}
        </div>
      </div>
      <input value={label} onChange={e=>setLabel(e.target.value)} placeholder="Name / description *" style={inp}/>
      <div style={{display:"flex",gap:8,marginBottom:8}}>
        <input value={confirmNum} onChange={e=>setConfirmNum(e.target.value)} placeholder="Confirmation #" style={{...inp,flex:1,marginBottom:0}}/>
        <input value={time} onChange={e=>setTime(e.target.value)} placeholder="Time" style={{...inp,flex:1,marginBottom:0}}/>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:8}}>
        <div style={{flex:1}}>
          <div style={{fontSize:11,color:"#64748b",marginBottom:3}}>Start date</div>
          <input type="date" value={startDate} onChange={e=>setStartDate(e.target.value)} style={{...inp,marginBottom:0}}/>
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:11,color:"#64748b",marginBottom:3}}>End date (optional)</div>
          <input type="date" value={endDate} onChange={e=>setEndDate(e.target.value)} style={{...inp,marginBottom:0}}/>
        </div>
      </div>
      <input value={location} onChange={e=>setLocation(e.target.value)} placeholder="Location / address (for Directions button)" style={inp}/>
      <input value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Notes (optional)" style={{...inp,marginBottom:10}}/>
      <div style={{display:"flex",gap:8}}>
        <button onClick={save} style={{flex:1,padding:"11px",background:"#0f2444",color:"white",border:"none",borderRadius:10,fontSize:14,fontWeight:700,cursor:"pointer"}}>Save</button>
        <button onClick={onCancel} style={{padding:"11px 16px",background:"#f1f5f9",color:"#64748b",border:"none",borderRadius:10,fontSize:14,fontWeight:600,cursor:"pointer"}}>Cancel</button>
      </div>
    </div>
  );

function TravelCard({dayDate,travelItems,onAdd,onEdit,onDelete}){
  const [open,setOpen]=useState(false);
  const [editId,setEditId]=useState(null);
  const [adding,setAdding]=useState(false);
  const dayItems=(travelItems||[]).filter(item=>{
    const end=item.endDate||item.startDate;
    return item.startDate<=dayDate&&dayDate<=end;
  });
  if(!dayItems.length&&!adding){
    return(
      <div style={{marginBottom:14}}>
        <button onClick={()=>setAdding(true)} style={{width:"100%",padding:"11px",background:"transparent",color:"#93c5fd",border:"1.5px dashed #bfdbfe",borderRadius:14,fontSize:13,fontWeight:700,cursor:"pointer"}}>+ Add travel & reservations</button>
      </div>
    );
  }
  if(!dayItems.length&&adding){
    return(
      <div style={{marginBottom:14}}>
        <TravelItemForm dayDate={dayDate} onSave={data=>{onAdd(data);setAdding(false);}} onCancel={()=>setAdding(false)}/>
      </div>
    );
  }
  const first=dayItems[0];
  const summaryText=`${first.icon} ${first.label}${first.time?" · "+first.time:""}${dayItems.length>1?" +"+(dayItems.length-1)+" more":""}`;
  return(
    <div style={{background:"linear-gradient(135deg,#eff6ff 0%,#f0f9ff 100%)",borderRadius:16,marginBottom:14,border:"1.5px solid #bfdbfe",overflow:"hidden"}}>
      <div onClick={()=>setOpen(o=>!o)} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",cursor:"pointer"}}>
        <div style={{width:32,height:32,borderRadius:10,background:"#dbeafe",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>🗂️</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:10,fontWeight:800,color:"#1e40af",textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:1}}>Travel & Reservations</div>
          <div style={{fontSize:12,color:"#334155",fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{summaryText}</div>
        </div>
        <div style={{color:"#93c5fd",fontSize:18,transition:"transform 0.2s",transform:open?"rotate(90deg)":"none",flexShrink:0}}>›</div>
      </div>
      {open&&(
        <div style={{borderTop:"1px solid #dbeafe",padding:"8px 14px 12px"}}>
          {dayItems.map((item,i)=>(
            <div key={item.id}>
              {editId===item.id?(
                <TravelItemForm item={item} dayDate={dayDate} onSave={data=>{onEdit(item.id,data);setEditId(null);}} onCancel={()=>setEditId(null)}/>
              ):(
                <div style={{display:"flex",alignItems:"flex-start",gap:10,paddingTop:10,paddingBottom:10,borderBottom:i<dayItems.length-1?"1px solid #e0f2fe":"none"}}>
                  <div style={{width:36,height:36,borderRadius:11,background:"#dbeafe",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0,marginTop:1}}>{item.icon}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:700,color:"#1e293b",lineHeight:1.3}}>{item.label}</div>
                    {item.confirmNum&&<div style={{fontSize:11,color:"#64748b",marginTop:2}}>Conf: <span style={{fontFamily:"monospace",fontWeight:700,color:"#1e40af"}}>{item.confirmNum}</span></div>}
                    {item.time&&<div style={{fontSize:11,color:"#64748b",marginTop:2}}>{item.time}</div>}
                    {item.location&&<div style={{fontSize:11,color:"#64748b",marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.location}</div>}
                    {item.endDate&&item.endDate!==item.startDate&&<div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>Through {fmtDate(item.endDate)}</div>}
                    {item.notes&&<div style={{fontSize:11,color:"#94a3b8",marginTop:3,lineHeight:1.4}}>{item.notes}</div>}
                    {item.location&&(
                      <div style={{marginTop:7}}>
                        <a href={`https://maps.google.com/?q=${encodeURIComponent(item.location)}`} target="_blank" rel="noreferrer" style={{fontSize:11,fontWeight:700,color:"#1e40af",background:"white",borderRadius:20,padding:"5px 11px",textDecoration:"none",border:"1.5px solid #bfdbfe",display:"inline-block"}}>Directions →</a>
                      </div>

                    <span onClick={()=>{setEditId(item.id);setOpen(true);}} style={{fontSize:14,cursor:"pointer",opacity:0.45,lineHeight:1}}>✏️</span>

                  </div>

              )}

          ))}
          {adding?(
            <TravelItemForm dayDate={dayDate} onSave={data=>{onAdd(data);setAdding(false);}} onCancel={()=>setAdding(false)}/>
          ):(
            <button onClick={()=>setAdding(true)} style={{width:"100%",marginTop:8,padding:"10px",background:"transparent",color:"#60a5fa",border:"1.5px dashed #bfdbfe",borderRadius:12,fontSize:13,fontWeight:700,cursor:"pointer"}}>+ Add to this day</button>
          )}
        </div>
      )}
    </div>
  );
}

// ── WEATHER CHIP ──────────────────────────────────────────────────────────────
// Module-level cache: { [date]: {status:"ok"|"too-far"|"error", hi, lo, code, fetchedAt} }
// Not React state — persists for the session without triggering extra renders or syncing.
const _wxCache={};
const WX_TTL=3600000; // 1 hour in ms
const WX_WINDOW_DAYS=16;

const wmoIcon=code=>{
  if(code===0)return"☀️";
  if(code<=2)return"🌤️";
  if(code<=3)return"⛅";
  if(code<=48)return"☁️";
  if(code<=57)return"🌦️";
  if(code<=67)return"🌧️";
  if(code<=77)return"❄️";
  if(code<=82)return"🌧️";
  if(code<=86)return"❄️";
  return"⛈️";
};

function WeatherChip({date,coords}){
  const [wx,setWx]=useState(()=>_wxCache[date]||null);
  useEffect(()=>{
    if(!coords)return;
    // Check if date is beyond forecast window
    const t=new Date();t.setHours(0,0,0,0);
    const d=new Date(date+"T00:00:00");
    const daysOut=Math.round((d-t)/86400000);
    if(daysOut>WX_WINDOW_DAYS){
      const v={status:"too-far"};_wxCache[date]=v;setWx(v);return;
    }
    // Cache hit check (skip if too-far or fresh ok)
    const cached=_wxCache[date];
    if(cached&&(cached.status==="too-far"||(cached.status==="ok"&&Date.now()-cached.fetchedAt<WX_TTL))){
      setWx(cached);return;
    }
    // Fetch from Open-Meteo (no API key required)
    const[lat,lon]=coords;
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,weathercode&temperature_unit=fahrenheit&timezone=auto&start_date=${date}&end_date=${date}`;
    setWx({status:"loading"});
    fetch(url,{signal:AbortSignal.timeout(8000)})
      .then(r=>r.json())
      .then(data=>{
        const hi=Math.round(data.daily.temperature_2m_max[0]);
        const lo=Math.round(data.daily.temperature_2m_min[0]);
        const code=data.daily.weathercode[0];
        const v={status:"ok",hi,lo,code,fetchedAt:Date.now()};
        _wxCache[date]=v;setWx(v);
      })
      .catch(()=>{setWx({status:"error"});});
  },[date]);
  if(!coords)return null;
  if(!wx||wx.status==="loading")return(
    <span style={{fontSize:11,color:"#94a3b8",fontStyle:"italic",whiteSpace:"nowrap"}}>weather…</span>
  );
  if(wx.status==="too-far")return(
    <span style={{fontSize:11,color:"#94a3b8",fontStyle:"italic",whiteSpace:"nowrap"}}>Forecast closer to date</span>
  );
  if(wx.status==="error")return null;
  return(
    <span style={{display:"inline-flex",alignItems:"center",gap:3,padding:"3px 9px",borderRadius:20,background:"#f0f9ff",border:"1px solid #bae6fd",fontSize:12,fontWeight:700,color:"#0369a1",whiteSpace:"nowrap",flexShrink:0}}>
      {wmoIcon(wx.code)} {wx.hi}° / {wx.lo}°
    </span>
  );
}

// ── HOME WATCH COMPONENTS ─────────────────────────────────────────────────────
function HomeCareModal({entry,onSave,onClose}){
  const isNew=!entry;
  const [name,setName]=React.useState(entry?.name||"");
  const [startDate,setStartDate]=React.useState(entry?.startDate||"2026-07-09");
  const [endDate,setEndDate]=React.useState(entry?.endDate||"2026-07-09");
  const [category,setCategory]=React.useState(entry?.category||"dog");
  const [notes,setNotes]=React.useState(entry?.notes||"");
  const canPick=typeof navigator!=="undefined"&&navigator.contacts!=null&&typeof navigator.contacts.select==="function";
  const pickContact=async()=>{
    try{
      const results=await navigator.contacts.select(["name"],{multiple:false});
      if(results.length>0&&results[0].name?.length>0)setName(results[0].name[0]);
    }catch(e){}
  };
  const valid=name.trim()&&startDate&&endDate&&startDate<=endDate;
  const handleSave=()=>{
    if(!valid)return;
    onSave({id:entry?.id||`hc-${Date.now()}`,name:name.trim(),startDate,endDate,category,notes:notes.trim()});
  };
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",zIndex:9000,display:"flex",alignItems:"flex-end"}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{width:"100%",maxWidth:480,margin:"0 auto",background:"#fff",borderRadius:"20px 20px 0 0",padding:"24px 20px 32px",boxShadow:"0 -4px 32px rgba(0,0,0,0.18)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
          <div style={{fontWeight:800,fontSize:18,color:S.navy}}>{isNew?"Add Home Watch Entry":"Edit Entry"}</div>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#64748b",lineHeight:1}}>×</button>
        </div>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:700,color:"#64748b",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.05em"}}>Person's Name</div>
          <div style={{display:"flex",gap:8}}>
            <input value={name} onChange={e=>setName(e.target.value)} placeholder="Name" style={{flex:1,padding:"10px 14px",border:"1.5px solid #cbd5e1",borderRadius:10,fontSize:15,outline:"none"}}/>
            {canPick&&<button onClick={pickContact} style={{padding:"10px 14px",background:S.blue,color:"#fff",border:"none",borderRadius:10,fontSize:14,cursor:"pointer"}}>📱</button>}
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
          <div>
            <div style={{fontSize:12,fontWeight:700,color:"#64748b",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.05em"}}>Start Date</div>
            <input type="date" value={startDate} onChange={e=>setStartDate(e.target.value)} style={{width:"100%",padding:"10px 10px",border:"1.5px solid #cbd5e1",borderRadius:10,fontSize:14,outline:"none",boxSizing:"border-box"}}/>
          </div>
          <div>
            <div style={{fontSize:12,fontWeight:700,color:"#64748b",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.05em"}}>End Date</div>
            <input type="date" value={endDate} onChange={e=>setEndDate(e.target.value)} style={{width:"100%",padding:"10px 10px",border:"1.5px solid #cbd5e1",borderRadius:10,fontSize:14,outline:"none",boxSizing:"border-box"}}/>
          </div>
        </div>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:700,color:"#64748b",marginBottom:8,textTransform:"uppercase",letterSpacing:"0.05em"}}>Category</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {Object.entries(HOME_CARE_CATEGORIES).map(([k,v])=>(
              <button key={k} onClick={()=>setCategory(k)}
                style={{padding:"7px 16px",borderRadius:20,border:`2px solid ${category===k?S.blue:"#cbd5e1"}`,background:category===k?S.blue:"transparent",color:category===k?"#fff":"#475569",fontWeight:700,fontSize:13,cursor:"pointer"}}>
                {v.icon} {v.label}
              </button>
            ))}
          </div>
        </div>
        <div style={{marginBottom:20}}>
          <div style={{fontSize:12,fontWeight:700,color:"#64748b",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.05em"}}>Notes (optional)</div>
          <textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Any instructions or notes…" rows={2}
            style={{width:"100%",padding:"10px 14px",border:"1.5px solid #cbd5e1",borderRadius:10,fontSize:14,resize:"none",outline:"none",boxSizing:"border-box"}}/>
        </div>
        {startDate>endDate&&<div style={{fontSize:12,color:"#dc2626",marginBottom:10,textAlign:"center"}}>End date must be on or after start date</div>}
        <button onClick={handleSave} disabled={!valid}
          style={{width:"100%",padding:"13px",background:valid?S.blue:"#e2e8f0",color:valid?"#fff":"#94a3b8",border:"none",borderRadius:12,fontSize:15,fontWeight:800,cursor:valid?"pointer":"default"}}>
          {isNew?"Add Entry":"Save Changes"}
        </button>
      </div>
    </div>
  );
}

// ── UNIVERSAL COMMAND BAR ──────────────────────────────────────────────────────
function UniversalCommandBar({
  customTasks,checked,coreTasks,packChecked,customPackItems,deletedItems,editedItems,travelItems,preTripCustom,preTripEdits,
  toggleCheck,toggleCore,silentDeleteItem,
  addPreTripTask,editPreTripCustom,silentRemovePreTripCustom,
  editBuiltinPreTrip,
  editTask,addCustomTask,silentRemoveTask,
  editBuiltinItem,updatePackItems,
  addTravelItem,editTravelItem
}){
  const [open,setOpen]=useState(false);
  const [cmd,setCmd]=useState("");
  const [status,setStatus]=useState("idle");
  const [actions,setActions]=useState([]);
  const [selected,setSelected]=useState({});
  const [results,setResults]=useState([]);
  const [errMsg,setErrMsg]=useState("");

  const norml=s=>s.toLowerCase().replace(/[^a-z0-9]/g," ").replace(/\s+/g," ").trim();
  const fuzzyScore=(q,t)=>{
    const nq=norml(q),nt=norml(t);
    if(nt.includes(nq)||nq.includes(nt))return 1;
    const qw=nq.split(" ").filter(w=>w.length>2);
    const tw=nt.split(" ").filter(w=>w.length>2);
    if(!qw.length||!tw.length)return 0;
    const ov=qw.filter(w=>tw.some(t2=>t2.includes(w)||w.includes(t2))).length;
    return ov/Math.max(qw.length,tw.length,1);
  };

  const buildContext=()=>{
    const preTripTasks=[];
    Object.entries(DEFAULT_PRETRIP||{}).forEach(([date,tasks])=>{
      tasks.forEach((t,i)=>{
        if(deletedItems[`pretrip-def-${date}-${i}`])return;
        const ed=preTripEdits[`${date}-${i}`]||{};
        preTripTasks.push({key:`pretrip-${date}-${i}`,text:ed.text||t.text,date,done:!!checked[`pretrip-${date}-${i}`]});
      });
    });
    preTripCustom.forEach(t=>{
      preTripTasks.push({key:`ptc-${t.id}`,text:t.text,date:t.dueDate||"pretrip",done:!!checked[`ptc-${t.id}`]});
    });
    const tripTasks=[];
    ITINERARY.forEach(day=>{
      day.items.forEach((it,j)=>{
        if(deletedItems[`itinerary-${day.date}-${j}`])return;
        const ed=editedItems[`itinerary-${day.date}-${j}`]||{};
        tripTasks.push({key:`trip-${day.date}-${j}`,text:ed.text||it.text,date:day.date,city:day.city,done:!!checked[`trip-${day.date}-${j}`],isCore:!!coreTasks[`trip-${day.date}-${j}`]});
      });
      (customTasks[day.date]||[]).forEach((t,j)=>{
        tripTasks.push({key:`trip-${day.date}-c${j}`,text:t.text,date:day.date,city:day.city,done:!!checked[`trip-${day.date}-c${j}`],isCore:!!coreTasks[`trip-${day.date}-c${j}`]});
      });
    });
    const packItems={};
    ["General","Chris","McKenna","Sawyer","Pierce","Bennett"].forEach(person=>{
      packItems[person]={};
      if(person==="General"){
        Object.entries(MASTER_PACKING).forEach(([cat,items])=>{
          const arr=items.filter((_,i)=>!deletedItems[`pack-base-${person}-${cat}-${i}`]).map(item=>({text:item}));
          const cust=((customPackItems[person]||{})[cat]||[]).map(item=>({text:item}));
          if(arr.length||cust.length)packItems[person][cat]=[...arr,...cust];
        });
      } else {
        const ic=`👤 ${person}`;
        const base=INDIVIDUAL_PACKING[person]||[];
        const arr=base.filter((_,i)=>!deletedItems[`pack-base-${person}-${ic}-${i}`]).map(item=>({text:item}));
        const cust=((customPackItems[person]||{})[ic]||[]).map(item=>({text:item}));
        if(arr.length||cust.length)packItems[person][ic]=[...arr,...cust];
      }
      Object.entries(customPackItems[person]||{}).forEach(([cat,items])=>{
        if(!packItems[person][cat]&&items&&items.length)packItems[person][cat]=items.map(item=>({text:item}));
      });
    });
    const reservations=travelItems.map(r=>({id:r.id,title:r.title,type:r.type,date:r.startDate||r.date||"",confirmNum:r.confirmNum||""}));
    return {preTripTasks,tripTasks,packItems,reservations};
  };

  const resolveAll=rawActions=>{
    const ctx=buildContext();
    return rawActions.map(a=>{
      const r={...a};let warn=null;
      if(["taskToggle","taskDelete","taskEdit","coreToggle"].includes(a.type)){
        const all=[...ctx.preTripTasks,...ctx.tripTasks];
        let found=all.find(t=>t.key===a.key);
        if(!found&&a.label){
          const sc=all.map(t=>({...t,s:fuzzyScore(a.label,t.text)})).filter(t=>t.s>0.25).sort((x,y)=>y.s-x.s);
          found=sc[0];
          if(found&&found.s<0.8)warn=`Matched "${found.text}" (fuzzy)`;
        }
        if(found){r.key=found.key;r._label=found.text;r._date=found.date;r._isPretrip=found.key.startsWith("pretrip")||found.key.startsWith("ptc");}
        else{warn=a.label?`No match for "${a.label}"`:"No match found";r._notFound=true;}
      }
      if(a.type==="packRemove"){
        const people=a.person==="everyone"?["General","Chris","McKenna","Sawyer","Pierce","Bennett"]:[a.person];
        let best=null,bScore=0,bPerson=null;
        people.forEach(p=>{Object.values(ctx.packItems[p]||{}).flat().forEach(item=>{const s=fuzzyScore(a.item,item.text);if(s>bScore){bScore=s;best=item.text;bPerson=p;}});});
        if(best&&bScore>=0.25){r._matchedItem=best;r._matchedPerson=bPerson;if(bScore<0.8)warn=`Matched "${best}" in ${bPerson}'s list`;}
        else{warn=`"${a.item}" not found in packing lists`;r._notFound=true;}
      }
      if(a.type==="reservationEdit"){
        const all=ctx.reservations;
        const found=all.find(res=>res.id===a.id)||(a.label?[...all].sort((x,y)=>fuzzyScore(a.label,y.title)-fuzzyScore(a.label,x.title))[0]:null);
        if(found){r.id=found.id;r._label=found.title;}
        else{warn="Reservation not found";r._notFound=true;}
      }
      r._warning=warn;return r;
    });
  };

  const runCommand=async()=>{
    const c=cmd.trim();
    if(!c||status==="loading")return;
    setStatus("loading");setErrMsg("");
    try{
      const context=buildContext();
      const resp=await fetch(WORKER_URL,{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({action:"universalCommand",command:c,context}),signal:AbortSignal.timeout(30000)});
      if(!resp.ok)throw new Error("Worker error "+resp.status);
      const data=await resp.json();
      if(data.error)throw new Error(data.error);
      const raw=data.actions||[];
      if(!raw.length){setStatus("error");setErrMsg("No actions found — try rephrasing.");return;}
      const resolved=resolveAll(raw);
      setActions(resolved);
      const sel={};resolved.forEach((a,i)=>{sel[i]=!a._notFound;});
      setSelected(sel);setStatus("preview");
    }catch(e){console.error("UCB:",e);setStatus("error");setErrMsg(e.message||"Something went wrong.");}
  };

  const applySelected=()=>{
    const toApply=actions.filter((_,i)=>selected[i]);
    const packBatch={};const res=[];
    toApply.forEach(a=>{
      try{
        if(a.type==="taskToggle"){
          toggleCheck(a.key);
          res.push({ok:true,label:`Toggled "${a._label||a.key}"`});
        } else if(a.type==="coreToggle"){
          toggleCore(a.key);
          res.push({ok:true,label:`${a.isCore?"Starred":"Unstarred"} "${a._label||a.key}"`});
        } else if(a.type==="taskDelete"){
          if(a._isPretrip){
            if(a.key.startsWith("ptc-"))silentRemovePreTripCustom(a.key.replace("ptc-",""));
            else{const m=a.key.match(/^pretrip-(\d{4}-\d{2}-\d{2})-(\d+)$/);if(m)silentDeleteItem(`pretrip-def-${m[1]}-${m[2]}`);}
          } else {
            if(a.key.includes("-c")){const m=a.key.match(/^trip-(\d{4}-\d{2}-\d{2})-c(\d+)$/);if(m)silentRemoveTask(m[1],parseInt(m[2]));}
            else{const m=a.key.match(/^trip-(\d{4}-\d{2}-\d{2})-(\d+)$/);if(m)silentDeleteItem(`itinerary-${m[1]}-${m[2]}`);}
          }
          res.push({ok:true,label:`Deleted "${a._label||a.key}"`});
        } else if(a.type==="taskEdit"){
          if(a._isPretrip){
            if(a.key.startsWith("ptc-"))editPreTripCustom(a.key.replace("ptc-",""),{text:a.newText});
            else{const m=a.key.match(/^pretrip-(\d{4}-\d{2}-\d{2})-(\d+)$/);if(m)editBuiltinPreTrip(m[1],parseInt(m[2]),{text:a.newText});}
          } else {
            if(a.key.includes("-c")){const m=a.key.match(/^trip-(\d{4}-\d{2}-\d{2})-c(\d+)$/);if(m)editTask(m[1],parseInt(m[2]),{text:a.newText});}
            else editBuiltinItem(a.key.replace("trip-","itinerary-"),{text:a.newText});
          }
          res.push({ok:true,label:`Edited to "${a.newText}"`});
        } else if(a.type==="taskAdd"){
          if(a.date==="pretrip")addPreTripTask(a.text,a.taskType||"reminder",null);
          else addCustomTask(a.date,a.text,a.taskType||"activity");
          res.push({ok:true,label:`Added "${a.text}"`});
        } else if(a.type==="packAdd"){
          const people=a.person==="everyone"?["Chris","McKenna","Sawyer","Pierce","Bennett"]:[a.person];
          people.forEach(p=>{const cat=p==="General"?(a.category||Object.keys(MASTER_PACKING)[0]):`👤 ${p}`;packBatch[p]=packBatch[p]||{};packBatch[p][cat]=[...(packBatch[p][cat]||[]),a.item];});
          res.push({ok:true,label:`Added "${a.item}" → ${a.person==="everyone"?"everyone":a.person}`});
        } else if(a.type==="packRemove"){
          const person=a._matchedPerson||a.person;const item=a._matchedItem||a.item;
          let removed=false;
          if(person==="General"){
            Object.entries(MASTER_PACKING).forEach(([cat,items])=>{items.forEach((it,idx)=>{if(!removed&&norml(it)===norml(item)){silentDeleteItem(`pack-base-${person}-${cat}-${idx}`);removed=true;}});});
          } else {
            const ic=`👤 ${person}`;(INDIVIDUAL_PACKING[person]||[]).forEach((it,idx)=>{if(!removed&&norml(it)===norml(item)){silentDeleteItem(`pack-base-${person}-${ic}-${idx}`);removed=true;}});
          }
          if(!removed)updatePackItems(p=>{const n={...p,[person]:{...(p[person]||{})}};Object.keys(n[person]).forEach(cat=>{n[person][cat]=(n[person][cat]||[]).filter(it=>norml(it)!==norml(item));});return n;});
          res.push({ok:true,label:`Removed "${item}" from ${person}`});
        } else if(a.type==="reservationAdd"){
          addTravelItem({title:a.title,type:a.travelType||"other",confirmNum:a.confirmNum||"",startDate:a.date||"",endDate:"",time:a.time||"",location:a.location||"",notes:a.notes||""});
          res.push({ok:true,label:`Added reservation "${a.title}"`});
        } else if(a.type==="reservationEdit"){
          editTravelItem(a.id,a.updates||{});
          res.push({ok:true,label:`Updated "${a._label||a.id}"`});
        }
      }catch(err){res.push({ok:false,label:a._label||a.type,err:err.message});}
    });
    if(Object.keys(packBatch).length)updatePackItems(p=>{const n={...p};Object.entries(packBatch).forEach(([person,cats])=>{n[person]={...(n[person]||{})};Object.entries(cats).forEach(([cat,items])=>{n[person][cat]=[...(n[person][cat]||[]),...items];});});return n;});
    setResults(res);setStatus("done");
  };

  const reset=()=>{setCmd("");setStatus("idle");setActions([]);setSelected({});setResults([]);setErrMsg("");};
  const close=()=>{setOpen(false);reset();};

  const actionLabel=a=>{
    if(a.type==="taskToggle")return `${a.done===false?"↩ Uncheck":"✓ Check"}: ${a._label||a.key}`;
    if(a.type==="coreToggle")return `${a.isCore?"⭐ Star":"☆ Unstar"} as core: ${a._label||a.key}`;
    if(a.type==="taskDelete")return `🗑 Delete: ${a._label||a.key}`;
    if(a.type==="taskEdit")return `✏️ Edit: "${a._label||a.key}" → "${a.newText}"`;
    if(a.type==="taskAdd")return `➕ Add task: "${a.text}"${a.date&&a.date!=="pretrip"?" ("+a.date+")":""}`;
    if(a.type==="packAdd")return `📦 Pack for ${a.person==="everyone"?"everyone":a.person}: "${a.item}"`;
    if(a.type==="packRemove")return `🗑 Unpack: "${a._matchedItem||a.item}" (${a._matchedPerson||a.person})`;
    if(a.type==="reservationAdd")return `📋 Add reservation: "${a.title}"`;
    if(a.type==="reservationEdit")return `✏️ Update reservation: "${a._label||a.id}"`;
    return `${a.type}: ${a._label||a.key||""}`;
  };

  if(!open)return(
    <button onClick={()=>setOpen(true)} title="AI Command Bar"
      style={{position:"fixed",bottom:24,right:24,width:54,height:54,borderRadius:"50%",border:"none",
        background:"linear-gradient(135deg,#4f46e5,#7c3aed)",color:"white",fontSize:22,cursor:"pointer",
        boxShadow:"0 4px 20px rgba(79,70,229,0.45)",zIndex:9999,display:"flex",alignItems:"center",
        justifyContent:"center",transition:"transform 0.15s,box-shadow 0.15s"}}
      onMouseEnter={e=>{e.currentTarget.style.transform="scale(1.1)";e.currentTarget.style.boxShadow="0 6px 28px rgba(79,70,229,0.6)";}}
      onMouseLeave={e=>{e.currentTarget.style.transform="scale(1)";e.currentTarget.style.boxShadow="0 4px 20px rgba(79,70,229,0.45)";}}>
      ✨
    </button>
  );

  return(
    <div style={{position:"fixed",inset:0,zIndex:9999}}>
      <div onClick={close} style={{position:"absolute",inset:0,background:"rgba(15,36,68,0.45)",backdropFilter:"blur(2px)"}}/>
      <div style={{position:"absolute",bottom:0,left:0,right:0,background:"white",borderRadius:"20px 20px 0 0",
        maxHeight:"85vh",display:"flex",flexDirection:"column",boxShadow:"0 -8px 40px rgba(15,36,68,0.2)",
        animation:"slideUp 0.28s cubic-bezier(0.22,1,0.36,1)"}}>
        <div style={{textAlign:"center",padding:"12px 0 4px"}}>
          <div style={{width:36,height:4,borderRadius:99,background:"#e2e8f0",display:"inline-block"}}/>
        </div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"4px 20px 14px"}}>
          <div>
            <div style={{fontSize:16,fontWeight:800,color:"#4f46e5"}}>✨ AI Assistant</div>
            <div style={{fontSize:12,color:"#94a3b8",marginTop:1}}>Tasks, packing, reservations — just type what you need</div>
          </div>

                disabled={status==="loading"}
                placeholder={"e.g. \"Mark Empire State Building as done, add sunscreen to General, remove blazer from Chris\""}
                rows={3}
                style={{width:"100%",fontSize:14,padding:"12px 14px",borderRadius:12,border:"1.5px solid #e0e7ff",
                  background:status==="loading"?"#f8faff":"white",color:"#1e1b4b",resize:"none",
                  boxSizing:"border-box",fontFamily:"inherit",outline:"none"}}/>
              <div style={{fontSize:11,color:"#94a3b8",margin:"6px 0 12px",textAlign:"right"}}>⌘↵ or Ctrl+↵ to send</div>
              <button onClick={runCommand} disabled={!cmd.trim()||status==="loading"}

                  background:cmd.trim()&&status!=="loading"?"linear-gradient(135deg,#4f46e5,#7c3aed)":"#e2e8f0",
                  color:cmd.trim()&&status!=="loading"?"white":"#94a3b8",
                  fontWeight:700,fontSize:15,cursor:cmd.trim()&&status!=="loading"?"pointer":"default",
                  display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                {status==="loading"
                  ?<><span style={{display:"inline-block",animation:"spin 0.8s linear infinite"}}>◌</span> Thinking…</>
                  :"✨ Run Command"}
              </button>
            </div>
          )}
          {status==="preview"&&(
            <div>
              <div style={{fontSize:13,fontWeight:700,color:"#1e1b4b",marginBottom:12}}>Review {actions.length} action{actions.length!==1?"s":""}:</div>

                <div key={i}
                  onClick={e=>{if(e.target.type==="checkbox")return;if(!a._notFound)setSelected(s=>({...s,[i]:!s[i]}));}}
                  style={{display:"flex",alignItems:"flex-start",gap:10,padding:"10px 12px",borderRadius:11,
                    background:a._notFound?"#fff5f5":selected[i]?"#f0f4ff":"#f8faff",
                    border:`1.5px solid ${a._notFound?"#fca5a5":selected[i]?"#c7d2fe":"#e2e8f0"}`,
                    marginBottom:8,cursor:a._notFound?"default":"pointer"}}>
                  <input type="checkbox" checked={!!selected[i]} disabled={!!a._notFound}
                    onChange={e=>{e.stopPropagation();setSelected(s=>({...s,[i]:e.target.checked}));}}
                    style={{marginTop:2,width:16,height:16,accentColor:"#4f46e5",flexShrink:0}}/>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,color:a._notFound?"#ef4444":"#1e1b4b",fontWeight:500}}>{actionLabel(a)}</div>
                    {a._warning&&<div style={{fontSize:11,color:a._notFound?"#ef4444":"#b45309",marginTop:3}}>⚠ {a._warning}</div>}
                  </div>
                </div>
              ))}
              <div style={{display:"flex",gap:8,marginTop:16}}>
                <button onClick={applySelected} disabled={!Object.values(selected).some(Boolean)}
                  style={{flex:1,padding:"13px",borderRadius:12,border:"none",
                    background:Object.values(selected).some(Boolean)?"linear-gradient(135deg,#4f46e5,#7c3aed)":"#e2e8f0",
                    color:Object.values(selected).some(Boolean)?"white":"#94a3b8",
                    fontWeight:700,fontSize:14,cursor:Object.values(selected).some(Boolean)?"pointer":"default"}}>
                  Apply {Object.values(selected).filter(Boolean).length} Action{Object.values(selected).filter(Boolean).length!==1?"s":""}
                </button>
                <button onClick={reset} style={{padding:"13px 18px",borderRadius:12,border:"1.5px solid #e2e8f0",background:"white",color:"#64748b",fontWeight:600,fontSize:14,cursor:"pointer"}}>← Back</button>
              </div>
            </div>
          )}
          {status==="done"&&(
            <div>
              <div style={{fontSize:13,fontWeight:700,color:"#1e1b4b",marginBottom:12}}>Done! {results.filter(r=>r.ok).length}/{results.length} applied:</div>
              {results.map((r,i)=>(
                <div key={i} style={{fontSize:13,color:r.ok?"#166534":"#dc2626",padding:"7px 10px",borderRadius:9,
                  background:r.ok?"#f0fdf4":"#fff5f5",marginBottom:6,border:`1px solid ${r.ok?"#bbf7d0":"#fca5a5"}`}}>
                  {r.ok?"✅":"❌"} {r.label}{r.err?` — ${r.err}`:""}
                </div>
              ))}
              <button onClick={reset} style={{width:"100%",marginTop:14,padding:"13px",borderRadius:12,border:"1.5px solid #e0e7ff",background:"white",color:"#4f46e5",fontWeight:700,fontSize:14,cursor:"pointer"}}>✨ New Command</button>
            </div>
          )}
          {status==="error"&&(
            <div>
              <div style={{padding:"14px",borderRadius:12,background:"#fff5f5",border:"1.5px solid #fca5a5",color:"#dc2626",fontSize:13,marginBottom:12}}>⚠️ {errMsg||"Something went wrong."}</div>
              <button onClick={reset} style={{width:"100%",padding:"13px",borderRadius:12,border:"1.5px solid #e0e7ff",background:"white",color:"#4f46e5",fontWeight:700,fontSize:14,cursor:"pointer"}}>Try Again</button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── PACKING TAB ───────────────────────────────────────────────────────────────
function PackingTab({packChecked,onTogglePack,customPackItems,setCustomPackItems,packPerson,setPackPerson,deletedItems,onDeleteItem,silentDeleteItem}){
  const [addingCat,setAddingCat]=useState(null);
  const [newItem,setNewItem]=useState("");
  const persons=["General","Chris","McKenna","Sawyer","Pierce","Bennett"];
  const packData=packPerson==="General"?MASTER_PACKING:{[`👤 ${packPerson}`]:INDIVIDUAL_PACKING[packPerson]||[]};
  const custom=customPackItems[packPerson]||{};
  const isBaseDeleted=(cat,i)=>!!deletedItems[`pack-base-${packPerson}-${cat}-${i}`];
  const total=Object.entries(packData).reduce((a,[c,it])=>a+it.filter((_,i)=>!isBaseDeleted(c,i)).length+((custom[c]||[]).length),0);
  const done=Object.entries(packData).reduce((a,[c,it])=>{
    const cust2=custom[c]||[];const all=[...it,...cust2];
    return a+all.filter((_,i)=>{const isBase=i<it.length;return(!isBase||!isBaseDeleted(c,i))&&packChecked[`pack-${packPerson}-${c}-${i}`];}).length;
  },0);
  const pct=total>0?Math.round((done/total)*100):0;
  const addIt=(cat)=>{if(!newItem.trim())return;setCustomPackItems(p=>({...p,[packPerson]:{...(p[packPerson]||{}),[cat]:[...((p[packPerson]||{})[cat]||[]),newItem.trim()]}}));setNewItem("");setAddingCat(null);};
  const removeIt=(cat,idx,bl)=>{const ci=idx-bl;setCustomPackItems(p=>({...p,[packPerson]:{...(p[packPerson]||{}),[cat]:((p[packPerson]||{})[cat]||[]).filter((_,i)=>i!==ci)}}));};
  return(
    <div>
      <div style={{display:"flex",gap:7,overflowX:"auto",paddingBottom:8,marginBottom:14}}>
        {persons.map(p=>(
          <button key={p} onClick={()=>setPackPerson(p)} style={{whiteSpace:"nowrap",padding:"8px 17px",borderRadius:22,border:`1.5px solid ${packPerson===p?S.navy:"#e2e8f0"}`,fontSize:13,fontWeight:packPerson===p?700:500,background:packPerson===p?S.navy:"white",color:packPerson===p?"white":"#64748b",flexShrink:0,boxShadow:packPerson===p?"0 4px 12px rgba(15,36,68,0.25)":"none"}}>
            {p==="General"?"📦 General":p==="Chris"?"👨 Chris":p==="McKenna"?"👩 McKenna":`👦 ${p}`}
          </button>
        ))}
      </div>
      <div style={{...S.card,padding:"15px 17px",marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style={{fontWeight:800,fontSize:15,color:S.navy}}>{packPerson==="General"?"General (Shared) List":`${packPerson}'s List`}</div>
          <div style={{fontSize:15,fontWeight:800,color:pct===100?"#16a34a":S.accent}}>{done}<span style={{color:"#94a3b8",fontWeight:500}}>/{total}</span></div>
        </div>
        <div style={{background:"#f1f5f9",borderRadius:99,height:10,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${pct}%`,background:pct===100?"linear-gradient(90deg,#22c55e,#16a34a)":"linear-gradient(90deg,#6366f1,#3b82f6)",borderRadius:99,transition:"width 0.5s ease"}}/>
        </div>
        {pct===100&&<div style={{fontSize:13,color:"#16a34a",marginTop:8,textAlign:"center",fontWeight:700,animation:"popIn 0.3s ease"}}>🎉 All packed!</div>}
      </div>
      {Object.entries(packData).map(([cat,base])=>{
        const cust=(custom[cat]||[]),all=[...base,...cust];
        const activeAll=all.filter((_,i)=>!(i<base.length&&isBaseDeleted(cat,i)));
        const cd=all.reduce((acc,_,i)=>{const isBase=i<base.length;if(isBase&&isBaseDeleted(cat,i))return acc;return acc+(packChecked[`pack-${packPerson}-${cat}-${i}`]?1:0);},0);
        return(
          <div key={cat} style={{...S.card,marginBottom:10,overflow:"hidden"}}>
            <div style={{background:"linear-gradient(90deg,#f8fafc,#f1f5f9)",padding:"11px 16px",borderBottom:"1px solid #f1f5f9",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontWeight:800,fontSize:14,color:S.navy}}>{cat}</div>
              <div style={{fontSize:13,fontWeight:700,color:cd===activeAll.length&&activeAll.length>0?"#16a34a":"#94a3b8"}}>{cd}/{activeAll.length}</div>
            </div>
            <div style={{padding:"8px 16px"}}>
              {all.map((item,i)=>{
                const isBase=i<base.length;
                if(isBase&&isBaseDeleted(cat,i))return null;
                const key=`pack-${packPerson}-${cat}-${i}`;
                const dk=!!packChecked[key];
                const visibleAll=all.filter((_,j)=>!(j<base.length&&isBaseDeleted(cat,j)));
                const visIdx=visibleAll.indexOf(item);
                return(
                  <div key={i} onClick={()=>onTogglePack(key)} style={{display:"flex",alignItems:"center",gap:11,padding:"10px 0",borderBottom:visIdx<visibleAll.length-1?"1px solid #f8fafc":"none",cursor:"pointer"}}>
                    <div style={{width:22,height:22,borderRadius:7,border:dk?"none":"2px solid #e2e8f0",background:dk?"#22c55e":"white",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all 0.15s",boxShadow:dk?"0 2px 6px rgba(34,197,94,0.3)":"none"}}>
                      {dk&&<span style={{color:"white",fontSize:12,fontWeight:900}}>✓</span>}
                    </div>
                    <div style={{fontSize:14,color:dk?"#94a3b8":"#334155",textDecoration:dk?"line-through":"none",textDecorationColor:"#cbd5e1",flex:1,lineHeight:1.4}}>{item}</div>
                    {isBase
                      ?<span onClick={e=>{e.stopPropagation();onDeleteItem(`pack-base-${packPerson}-${cat}-${i}`);}} style={{color:"#e2e8f0",fontSize:20,cursor:"pointer",flexShrink:0,lineHeight:1}}>×</span>
                      :<span onClick={e=>{e.stopPropagation();removeIt(cat,i,base.length);}} style={{color:"#e2e8f0",fontSize:20,cursor:"pointer",flexShrink:0,lineHeight:1}}>×</span>
                    }
                  </div>
                );
              })}
              {addingCat===`${packPerson}-${cat}`?(
                <div style={{display:"flex",gap:8,marginTop:9}}>
                  <input value={newItem} onChange={e=>setNewItem(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addIt(cat)} placeholder="Add item..." autoFocus
                    style={{flex:1,padding:"9px 12px",borderRadius:10,border:"1.5px solid #e2e8f0",fontSize:14,background:"#f8fafc"}}/>
                  <button onClick={()=>addIt(cat)} style={{padding:"9px 15px",background:S.navy,color:"white",border:"none",borderRadius:10,fontSize:14,fontWeight:700}}>+</button>
                  <button onClick={()=>{setAddingCat(null);setNewItem("");}} style={{padding:"9px 13px",background:"#f1f5f9",color:"#94a3b8",border:"none",borderRadius:10,fontSize:14}}>✕</button>
                </div>
              ):(
                <button onClick={()=>setAddingCat(`${packPerson}-${cat}`)} style={{width:"100%",marginTop:6,padding:"7px",background:"transparent",color:S.accent,border:"none",fontSize:13,fontWeight:700,textAlign:"left"}}>+ Add item</button>
              )}
            </div>
          </div>
        );
      })}
    </div>
  );
}

  catch{return{unlockedWorld:0,highScores:{}};}
